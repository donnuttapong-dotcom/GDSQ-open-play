<!doctype html>
<html lang="th" x-data="app()" x-init="init()">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GDSQ Tournament</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{background:#11161b;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif}.cut{clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}.card{background:#222931;border:1px solid #39434d}.soft{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.1);border-radius:16px}.lime{color:#c7ff2e}.bg-lime{background:#c7ff2e;color:#111}.btn{border:1px solid rgba(255,255,255,.14);font-weight:900}input,select{background:#10151b!important;color:white!important;border-color:#3a424a!important}.mini{font-size:12px;color:#94a3b8}.chip{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;text-align:center}.bar{height:10px;background:#0f151b;border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}.bar>div{height:100%;background:#c7ff2e}[x-cloak]{display:none!important}</style>
</head>
<body>
<header class="sticky top-0 z-50 bg-[#0d1217]/95 border-b border-white/10 p-3"><div class="max-w-6xl mx-auto flex justify-between items-center gap-2"><div class="flex items-center gap-2"><a class="cut bg-lime px-3 py-2 font-black" href="./">← HOME</a><div><div class="text-[10px] tracking-[.25em] lime">GDSQ PICKLEBALL</div><b x-text="tui('title')"></b></div></div><div class="flex gap-2"><button class="cut btn bg-white/5 px-3 py-2 text-xs" @click="newTournament()" x-text="tui('new')"></button><button class="cut bg-orange-400 text-black px-4 py-2 font-black" @click="toggleLang()" x-text="lang==='th'?'EN':'TH'"></button></div></div></header>
<main class="max-w-6xl mx-auto p-3">
<nav class="grid grid-cols-5 gap-2 text-xs font-black text-center mb-4"><template x-for="(s,i) in steps" :key="s"><button class="cut btn py-3" :class="step===i?'bg-lime':'bg-white/5'" @click="step=i" x-text="(i+1)+'. '+tui(s)"></button></template></nav>
<div class="cut card p-3 mb-4" x-show="matches.length"><div class="flex justify-between text-xs font-black"><span x-text="tui('progress')+' '+done().length+'/'+playableCount()"></span><span x-text="progressPct()+'%'"></span></div><div class="bar mt-2"><div :style="'width:'+progressPct()+'%'"></div></div></div>
<div x-show="msg" class="mb-3 p-3 rounded-xl border border-lime-300/40 bg-lime-300/10 text-lime-200 whitespace-pre-wrap" x-text="msg"></div>

<section x-show="step===0" x-cloak><div class="grid lg:grid-cols-[1fr_.8fr] gap-4"><div class="cut card p-4"><h1 class="text-3xl font-black" x-text="'1. '+tui('setupTitle')"></h1><p class="mini mt-1" x-text="tui('setupHelp')"></p><div class="grid sm:grid-cols-2 gap-3 mt-4"><div><div class="mini" x-text="tui('tourName')"></div><input class="w-full rounded-lg border p-3 mt-1" x-model="t.name"></div><div><div class="mini" x-text="tui('time')"></div><input class="w-full rounded-lg border p-3 mt-1" x-model="t.time"></div><div><div class="mini" x-text="tui('venue')"></div><input class="w-full rounded-lg border p-3 mt-1" x-model="t.venue"></div><div><div class="mini" x-text="tui('courts')"></div><input type="number" min="1" max="12" class="w-full rounded-lg border p-3 mt-1" x-model.number="t.courts"></div><div><div class="mini" x-text="tui('format')"></div><select class="w-full rounded-lg border p-3 mt-1" x-model="t.format" @change="clearSchedule()"><option value="single">Single Elimination / แพ้ตกรอบ</option><option value="roundrobin">Round Robin / เจอกันหมด</option></select></div><div><div class="mini" x-text="tui('scoreTo')"></div><input type="number" min="5" max="21" class="w-full rounded-lg border p-3 mt-1" x-model.number="t.scoreTo"></div></div><div class="grid sm:grid-cols-3 gap-2 mt-4"><button class="cut bg-lime p-4 font-black" @click="save();step=1" x-text="tui('saveNext')"></button><button class="cut bg-sky-300 text-black p-4 font-black" @click="saveCloud()" x-text="tui('saveCloud')"></button><button class="cut btn bg-white/5 p-4" @click="loadCloudList()" x-text="tui('loadCloud')"></button></div></div><aside class="cut card p-4"><h2 class="text-xl font-black lime" x-text="tui('onlineData')"></h2><p class="mini mt-1 break-all" x-text="t.id"></p><div class="grid gap-2 mt-3"><button class="cut btn bg-white/5 p-3" @click="loadCloudList()" x-text="tui('refresh')"></button><template x-for="c in cloudList" :key="c.id"><div class="soft p-3"><b x-text="c.name"></b><div class="mini" x-text="(c.venue||'-')+' · '+(c.event_time||'-')+' · '+c.status"></div><div class="grid grid-cols-3 gap-2 mt-2"><button class="cut bg-lime p-2 text-xs font-black" @click="loadCloud(c.id)" x-text="tui('load')"></button><button class="cut btn bg-white/5 p-2 text-xs" @click="copyPublicLink(c.id)" x-text="tui('copyLink')"></button><button class="cut bg-red-600 p-2 text-xs font-black" @click="deleteCloud(c.id)" x-text="tui('delete')"></button></div></div></template></div></aside></div></section>

<section x-show="step===1" x-cloak><div class="grid lg:grid-cols-[.8fr_1.2fr] gap-4"><div class="cut card p-4"><h1 class="text-3xl font-black" x-text="'2. '+tui('teamsTitle')"></h1><div class="grid gap-2 mt-4"><input class="rounded-lg border p-3" x-model="form.team" :placeholder="tui('teamName')"><input class="rounded-lg border p-3" x-model="form.p1" :placeholder="tui('player1')"><input class="rounded-lg border p-3" x-model="form.p2" :placeholder="tui('player2')"><select class="rounded-lg border p-3" x-model.number="form.rating"><option value="2">2.0 Beginner</option><option value="2.5">2.5 Social Beginner</option><option value="3">3.0 Social Player</option><option value="3.5">3.5 Intermediate</option><option value="4">4.0 Strong Player</option></select><button class="cut bg-lime p-4 font-black" @click="addTeam()" x-text="tui('addTeam')"></button></div><div class="grid grid-cols-2 gap-2 mt-3"><button class="cut btn bg-white/5 p-3" @click="demoTeams()">DEMO 8</button><button class="cut bg-orange-400 text-black p-3 font-black" @click="generate()" x-text="tui('createSchedule')"></button></div></div><div class="cut card p-4"><div class="flex justify-between"><h2 class="text-xl font-black lime" x-text="tui('allTeams')"></h2><span class="mini" x-text="teams.length+' teams'"></span></div><div class="grid sm:grid-cols-2 gap-2 mt-3"><template x-for="(team,i) in teams" :key="team.id"><div class="soft p-3"><div class="flex justify-between gap-2"><div><b x-text="(i+1)+'. '+team.name"></b><div class="mini" x-text="team.p1+' + '+team.p2+' · Rating '+team.rating.toFixed(1)"></div></div><button class="rounded bg-red-600 px-2 text-xs font-black" @click="removeTeam(team.id)">X</button></div></div></template></div></div></div></section>

<section x-show="step===2" x-cloak><div class="cut card p-4 mb-4"><div class="flex flex-wrap justify-between gap-3"><div><h1 class="text-3xl font-black" x-text="'3. '+tui('drawTitle')"></h1><p class="mini" x-text="formatName()"></p></div><div class="flex gap-2"><button class="cut bg-orange-400 text-black px-4 py-3 font-black" @click="generate()" x-text="tui('generate')"></button><button class="cut bg-lime px-4 py-3 font-black" @click="step=3" x-text="tui('goScore')"></button></div></div></div><template x-if="!matches.length"><div class="cut card p-8 text-center"><h2 class="text-2xl font-black lime" x-text="tui('noSchedule')"></h2><p class="mini mt-2" x-text="tui('noScheduleHelp')"></p></div></template><template x-if="t.format==='single'&&matches.length"><div class="grid md:grid-cols-3 gap-4"><template x-for="r in rounds()" :key="r"><div class="cut card p-4"><h3 class="font-black lime" x-text="r"></h3><div class="grid gap-2 mt-3"><template x-for="m in matchesByRound(r)" :key="m.id"><div class="soft p-3"><div class="mini" x-text="'Match '+m.no+' · '+statusText(m.status)+' '+scoreLine(m)"></div><b x-text="name(m.a)"></b><div class="text-slate-500">vs</div><b x-text="name(m.b)"></b><div class="text-lime-300 font-black mt-1" x-show="m.winner" x-text="tui('winner')+': '+name(m.winner)"></div></div></template></div></div></template></div></template><template x-if="t.format==='roundrobin'&&matches.length"><div class="grid lg:grid-cols-[1fr_.8fr] gap-4"><div class="cut card p-4"><h3 class="font-black lime" x-text="tui('matchSchedule')"></h3><div class="grid gap-2 mt-3"><template x-for="m in matches" :key="m.id"><div class="soft p-3"><div class="flex justify-between"><b x-text="name(m.a)+' vs '+name(m.b)"></b><span class="mini" x-text="statusText(m.status)+' '+scoreLine(m)"></span></div></div></template></div></div><div class="cut card p-4"><h3 class="font-black lime" x-text="tui('ranking')"></h3><table class="w-full text-sm mt-3"><thead class="mini"><tr><th class="text-left">Team</th><th>W</th><th>L</th><th>Diff</th></tr></thead><tbody><template x-for="s in standings()" :key="s.id"><tr class="border-t border-white/10"><td class="py-2" x-text="s.name"></td><td class="text-center" x-text="s.w"></td><td class="text-center" x-text="s.l"></td><td class="text-center" x-text="s.diff"></td></tr></template></tbody></table></div></div></template></section>

<section x-show="step===3" x-cloak><div class="grid lg:grid-cols-[1fr_.8fr] gap-4"><div class="cut card p-4"><h1 class="text-3xl font-black" x-text="'4. '+tui('scoreTitle')"></h1><p class="mini mt-1" x-text="tui('scoreHelp')"></p><div class="grid gap-3 mt-4"><template x-for="m in playable()" :key="m.id"><div class="soft p-3"><div class="flex justify-between gap-2"><div><b x-text="m.round+' · Match '+m.no"></b><div class="mini" x-text="statusText(m.status)+' '+scoreLine(m)"></div></div><button class="cut btn bg-white/5 px-3 py-2 text-xs" @click="select(m)" x-text="tui('enterScore')"></button></div><div class="grid grid-cols-2 gap-2 mt-3"><div class="rounded-lg border border-orange-400/40 p-3"><b class="text-orange-300" x-text="name(m.a)"></b></div><div class="rounded-lg border border-lime-300/40 p-3"><b class="lime" x-text="name(m.b)"></b></div></div></div></template></div></div><div class="cut card p-4"><h2 class="text-xl font-black lime" x-text="tui('scoreControl')"></h2><template x-if="!active"><div class="soft p-4 mt-3 text-slate-400" x-text="tui('selectMatch')"></div></template><template x-if="active"><div class="mt-3"><div class="grid grid-cols-2 gap-2"><div class="soft p-3"><b x-text="name(active.a)"></b><input type="number" class="w-full rounded-lg border p-3 mt-2 text-center text-2xl font-black" x-model.number="scoreA"></div><div class="soft p-3"><b x-text="name(active.b)"></b><input type="number" class="w-full rounded-lg border p-3 mt-2 text-center text-2xl font-black" x-model.number="scoreB"></div></div><button class="cut bg-lime p-4 font-black w-full mt-3" @click="confirmScore()" x-text="tui('confirmResult')"></button><button class="cut bg-red-600 p-3 font-black w-full mt-2" @click="resetMatch(active)" x-text="tui('resetMatch')"></button><button class="cut btn bg-white/5 p-3 w-full mt-2" @click="active=null" x-text="tui('close')"></button></div></template><div class="grid grid-cols-2 gap-2 mt-4"><button class="cut bg-sky-300 text-black p-4 font-black" @click="step=4" x-text="tui('viewResult')"></button><button class="cut bg-lime p-4 font-black" @click="saveCloud()" x-text="tui('saveCloud')"></button></div></div></div></section>

<section x-show="step===4" x-cloak><div class="grid lg:grid-cols-[.8fr_1.2fr] gap-4"><div class="cut card p-4"><h1 class="text-3xl font-black lime" x-text="'5. '+tui('resultTitle')"></h1><div class="grid grid-cols-3 gap-2 my-3"><div class="chip"><b x-text="progressPct()+'%'"></b><div class="mini" x-text="tui('progress')"></div></div><div class="chip"><b x-text="done().length"></b><div class="mini" x-text="tui('completed')"></div></div><div class="chip"><b x-text="playableCount()"></b><div class="mini">Total</div></div></div><pre class="mt-3 rounded-xl bg-black/30 p-3 text-sm whitespace-pre-wrap" x-text="summary()"></pre><div class="grid grid-cols-2 gap-2 mt-3"><button class="cut bg-lime p-4 font-black" @click="copySummary()" x-text="tui('copySummary')"></button><button class="cut bg-sky-300 text-black p-4 font-black" @click="finish()" x-text="tui('finishSave')"></button></div><div class="grid grid-cols-2 gap-2 mt-2"><button class="cut btn bg-white/5 p-4" @click="copyPublicLink()" x-text="tui('copyPublic')"></button><button class="cut btn bg-white/5 p-4" @click="newTournament()" x-text="tui('newTour')"></button></div></div><div class="cut card p-4"><h2 class="text-xl font-black">Result</h2><div class="grid sm:grid-cols-2 gap-2 mt-3"><div class="chip"><b class="text-xl" x-text="champion()?champion().name:'-' "></b><div class="mini">Champion</div></div><div class="chip"><b class="text-xl" x-text="runnerUp()?runnerUp().name:'-' "></b><div class="mini">Runner-up</div></div><div class="chip"><b class="text-xl" x-text="done().length"></b><div class="mini" x-text="tui('completed')"></div></div><div class="chip"><b class="text-xl" x-text="teams.length"></b><div class="mini">Teams</div></div></div><div class="mt-4"><h3 class="font-black lime" x-text="tui('matchHistory')"></h3><div class="grid gap-2 mt-2"><template x-for="m in done()" :key="m.id"><div class="soft p-3"><div class="mini" x-text="m.round+' · Match '+m.no"></div><b x-text="name(m.a)+' '+m.scoreA+' - '+m.scoreB+' '+name(m.b)"></b><div class="text-lime-300 text-sm font-black" x-text="tui('winner')+': '+name(m.winner)"></div></div></template></div></div></div></div></section>
</main>
<script>
function app(){return{url:'https://zzeikmrrlfvwnwsprmjy.supabase.co',key:'sb_publishable_xSAZX5dgZ_3Qr3nzoOtqYA_Z0l8yOaX',db:null,lang:localStorage.gdsq_tsimple_lang||'th',step:0,msg:'',active:null,scoreA:'',scoreB:'',cloudList:[],t:{id:crypto.randomUUID(),name:'GDSQ Mini Tournament',time:'',venue:'',courts:2,format:'single',scoreTo:11,status:'draft'},teams:[],matches:[],form:{team:'',p1:'',p2:'',rating:3},steps:['setup','teams','draw','score','result'],d:{th:{title:'TOURNAMENT',new:'NEW',setup:'ตั้งค่า',teams:'เพิ่มทีม',draw:'สร้างสาย',score:'ใส่คะแนน',result:'สรุปผล',progress:'ความคืบหน้า',setupTitle:'ตั้งค่าการแข่งขัน',setupHelp:'ตั้งค่ารายการ แข่งแบบแพ้ตกรอบหรือเจอกันหมด แล้วบันทึกออนไลน์ได้',tourName:'ชื่อรายการ',time:'วัน / เวลา',venue:'สถานที่',courts:'จำนวนคอร์ท',format:'รูปแบบการแข่งขัน',scoreTo:'คะแนนที่ใช้แข่ง',saveNext:'บันทึก / ต่อ',saveCloud:'บันทึกออนไลน์',loadCloud:'โหลดออนไลน์',onlineData:'ข้อมูลออนไลน์',refresh:'รีเฟรชรายการ',load:'โหลด',delete:'ลบ',copyLink:'คัดลอกลิงก์',teamsTitle:'เพิ่มทีม / คู่แข่งขัน',teamName:'ชื่อทีม เช่น Team Lime',player1:'ผู้เล่น 1',player2:'ผู้เล่น 2',addTeam:'+ เพิ่มทีม',createSchedule:'สร้างสาย / ตารางแข่ง',allTeams:'ทีมทั้งหมด',drawTitle:'สร้างสาย / ตารางแข่ง',generate:'สร้างใหม่',goScore:'ไปใส่คะแนน',noSchedule:'ยังไม่มีตารางแข่ง',noScheduleHelp:'กดสร้างใหม่เพื่อสร้างสายแข่ง',winner:'ผู้ชนะ',matchSchedule:'ตารางแข่ง',ranking:'อันดับ',scoreTitle:'ใส่คะแนน',scoreHelp:'เลือกแมตช์ แล้วกรอกคะแนน',enterScore:'ใส่คะแนน',scoreControl:'ควบคุมคะแนน',selectMatch:'เลือกแมตช์ทางซ้าย',confirmResult:'ยืนยันผล',resetMatch:'รีเซ็ตแมตช์',close:'ปิด',viewResult:'ดูสรุปผล',resultTitle:'สรุปผล',completed:'แข่งจบ',copySummary:'คัดลอกสรุป',finishSave:'จบและบันทึก',copyPublic:'คัดลอกลิงก์ดูผล',newTour:'รายการใหม่',matchHistory:'ประวัติแมตช์',publicCopied:'คัดลอกลิงก์ดูผลแล้ว'},en:{title:'TOURNAMENT',new:'NEW',setup:'Setup',teams:'Teams',draw:'Draw',score:'Scores',result:'Result',progress:'Progress',setupTitle:'Tournament Setup',setupHelp:'Set up a single elimination or round robin tournament, then save it online.',tourName:'Tournament name',time:'Date / Time',venue:'Venue',courts:'Courts',format:'Format',scoreTo:'Score to',saveNext:'Save / Next',saveCloud:'Save Cloud',loadCloud:'Load Cloud',onlineData:'Online Data',refresh:'Refresh List',load:'Load',delete:'Delete',copyLink:'Copy Link',teamsTitle:'Add Teams',teamName:'Team name e.g. Team Lime',player1:'Player 1',player2:'Player 2',addTeam:'+ Add Team',createSchedule:'Create Schedule',allTeams:'All Teams',drawTitle:'Create Draw / Schedule',generate:'Generate',goScore:'Go to Scores',noSchedule:'No schedule yet',noScheduleHelp:'Tap Generate to create the schedule.',winner:'Winner',matchSchedule:'Match Schedule',ranking:'Ranking',scoreTitle:'Enter Scores',scoreHelp:'Select a match and enter the score.',enterScore:'Enter Score',scoreControl:'Score Control',selectMatch:'Select a match on the left',confirmResult:'Confirm Result',resetMatch:'Reset Match',close:'Close',viewResult:'View Result',resultTitle:'Result Summary',completed:'Completed',copySummary:'Copy Summary',finishSave:'Finish & Save',copyPublic:'Copy Public Link',newTour:'New Tournament',matchHistory:'Match History',publicCopied:'Public link copied'}},async init(){this.db=supabase.createClient(this.url,this.key);let raw=localStorage.gdsq_tournament_simple_v1;if(raw){try{Object.assign(this,JSON.parse(raw));if(!this.t.id)this.t.id=crypto.randomUUID()}catch(e){}}await this.loadCloudList(false)},tui(k){return this.d[this.lang][k]||k},toggleLang(){this.lang=this.lang==='th'?'en':'th';localStorage.gdsq_tsimple_lang=this.lang},flash(m){this.msg=m;setTimeout(()=>this.msg='',3000)},save(){localStorage.gdsq_tournament_simple_v1=JSON.stringify({t:this.t,teams:this.teams,matches:this.matches})},async chk(label,p){let r=await p;if(r.error){this.flash(label+' failed: '+r.error.message);throw r.error}return r},newTournament(){if(!confirm('Start new tournament?'))return;this.t={id:crypto.randomUUID(),name:'GDSQ Mini Tournament',time:'',venue:'',courts:2,format:'single',scoreTo:11,status:'draft'};this.teams=[];this.matches=[];this.form={team:'',p1:'',p2:'',rating:3};this.active=null;this.save();this.step=0},clearSchedule(){this.matches=[];this.active=null;this.t.status='draft';this.save()},formatName(){return this.t.format==='single'?'Single Elimination / แพ้ตกรอบ':'Round Robin / เจอกันหมด'},addTeam(){let n=this.form.team.trim();if(!n)return this.flash(this.lang==='th'?'ใส่ชื่อทีมก่อน':'Enter team name first');this.teams.push({id:crypto.randomUUID(),name:n,p1:this.form.p1||'-',p2:this.form.p2||'-',rating:+this.form.rating});this.form={team:'',p1:'',p2:'',rating:3};this.clearSchedule()},removeTeam(id){this.teams=this.teams.filter(t=>t.id!==id);this.clearSchedule()},demoTeams(){['Team Lime','Team Navy','Team White','Team Orange','Team Dink','Team Kitchen','Team Smash','Team Reset'].forEach((n,i)=>{if(!this.teams.find(t=>t.name===n))this.teams.push({id:crypto.randomUUID(),name:n,p1:'P'+(i*2+1),p2:'P'+(i*2+2),rating:2.5+(i%4)*.5})});this.clearSchedule()},shuffle(a){return [...a].sort(()=>Math.random()-.5)},generate(){if(this.teams.length<2)return this.flash(this.lang==='th'?'ต้องมีอย่างน้อย 2 ทีม':'Need at least 2 teams');if(this.matches.length&&!confirm('Regenerate will delete scores'))return;this.matches=[];this.active=null;this.t.status='live';this.t.format==='single'?this.genSingle():this.genRR();this.save();this.step=2},genSingle(){let ids=this.shuffle(this.teams.map(t=>t.id)),size=1;while(size<ids.length)size*=2;while(ids.length<size)ids.push(null);let no=1;for(let i=0;i<ids.length;i+=2){let a=ids[i],b=ids[i+1],w=b?null:a;this.matches.push({id:crypto.randomUUID(),no:no++,round:'Round 1',roundIndex:1,a,b,scoreA:null,scoreB:null,winner:w,status:w?'completed':'scheduled',next:null})}let count=ids.length/2,round=2;while(count>1){for(let i=0;i<count/2;i++)this.matches.push({id:crypto.randomUUID(),no:no++,round:count/2===1?'Final':'Round '+round,roundIndex:round,a:null,b:null,scoreA:null,scoreB:null,winner:null,status:'locked',next:null});count/=2;round++}this.link();this.advanceByes()},link(){let rs=this.rounds();for(let i=0;i<rs.length-1;i++){let cur=this.matchesByRound(rs[i]),next=this.matchesByRound(rs[i+1]);cur.forEach((m,idx)=>m.next=next[Math.floor(idx/2)]?.no||null)}},advanceByes(){let changed=true;while(changed){changed=false;this.matches.filter(m=>m.winner&&m.next).forEach(m=>{let n=this.matches.find(x=>x.no===m.next);if(n){if(!n.a){n.a=m.winner;changed=true}else if(!n.b&&n.a!==m.winner){n.b=m.winner;changed=true}if(n.a&&n.b&&n.status==='locked')n.status='scheduled'}})}},genRR(){let ids=this.teams.map(t=>t.id),no=1;for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++)this.matches.push({id:crypto.randomUUID(),no:no++,round:'Round Robin',roundIndex:1,a:ids[i],b:ids[j],scoreA:null,scoreB:null,winner:null,status:'scheduled',next:null})},rounds(){return [...new Set(this.matches.map(m=>m.round))].sort((a,b)=>(this.matches.find(m=>m.round===a)?.roundIndex||0)-(this.matches.find(m=>m.round===b)?.roundIndex||0))},matchesByRound(r){return this.matches.filter(m=>m.round===r)},name(id){if(!id)return 'BYE / TBD';return this.teams.find(t=>t.id===id)?.name||'TBD'},statusText(s){return this.lang==='th'?({scheduled:'รอแข่ง',completed:'จบแล้ว',locked:'รอผู้ชนะ'}[s]||s):s},scoreLine(m){return m.scoreA!==null&&m.scoreB!==null?`(${m.scoreA}-${m.scoreB})`:''},playable(){return this.matches.filter(m=>m.a&&m.b&&['scheduled','completed'].includes(m.status)).sort((a,b)=>a.roundIndex-b.roundIndex||a.no-b.no)},playableCount(){return this.matches.filter(m=>m.a&&m.b).length},progressPct(){let total=this.playableCount();return total?Math.round(this.done().length/total*100):0},select(m){this.active=m;this.scoreA=m.scoreA??'';this.scoreB=m.scoreB??''},confirmScore(){let m=this.active;if(!m)return;if(this.scoreA===''||this.scoreB===''||+this.scoreA===+this.scoreB)return this.flash(this.lang==='th'?'คะแนนไม่ถูกต้อง':'Invalid score');let old=m.winner;if(m.status==='completed'&&this.t.format==='single')this.clearDown(m,old);m.scoreA=+this.scoreA;m.scoreB=+this.scoreB;m.winner=m.scoreA>m.scoreB?m.a:m.b;m.status='completed';if(this.t.format==='single'&&m.next){let n=this.matches.find(x=>x.no===m.next);if(n){if(!n.a)n.a=m.winner;else if(!n.b)n.b=m.winner;if(n.a&&n.b)n.status='scheduled'}}this.active=null;this.save();this.flash(this.lang==='th'?'บันทึกผลแล้ว':'Result saved')},clearDown(m,old=m.winner){if(!m.next)return;let n=this.matches.find(x=>x.no===m.next);if(!n)return;if(n.a===old)n.a=null;if(n.b===old)n.b=null;let nextOld=n.winner;n.scoreA=null;n.scoreB=null;n.winner=null;n.status=(n.a&&n.b)?'scheduled':'locked';this.clearDown(n,nextOld)},resetMatch(m){if(!m||!confirm('Reset match?'))return;let old=m.winner;if(this.t.format==='single')this.clearDown(m,old);m.scoreA=null;m.scoreB=null;m.winner=null;m.status=(m.a&&m.b)?'scheduled':'locked';this.active=null;this.save()},done(){return this.matches.filter(m=>m.status==='completed'&&m.a&&m.b)},allDone(){let p=this.matches.filter(m=>m.a&&m.b);return p.length&&p.every(m=>m.status==='completed')},standings(){let rows=this.teams.map(t=>({id:t.id,name:t.name,w:0,l:0,pf:0,pa:0,diff:0}));this.done().forEach(m=>{let a=rows.find(r=>r.id===m.a),b=rows.find(r=>r.id===m.b);if(!a||!b)return;a.pf+=m.scoreA;a.pa+=m.scoreB;b.pf+=m.scoreB;b.pa+=m.scoreA;if(m.winner===m.a){a.w++;b.l++}else{b.w++;a.l++}});rows.forEach(r=>r.diff=r.pf-r.pa);return rows.sort((a,b)=>b.w-a.w||b.diff-a.diff||b.pf-a.pf)},champion(){if(this.t.format==='single'){let f=this.matches.find(m=>m.round==='Final');return f&&f.winner?this.teams.find(t=>t.id===f.winner):null}let s=this.standings()[0];return this.allDone()&&s?this.teams.find(t=>t.id===s.id):null},runnerUp(){if(this.t.format==='single'){let f=this.matches.find(m=>m.round==='Final');if(f&&f.winner)return this.teams.find(t=>t.id===(f.winner===f.a?f.b:f.a))}let s=this.standings()[1];return this.allDone()&&s?this.teams.find(t=>t.id===s.id):null},matchHistoryText(){return this.done().map((m,i)=>`${i+1}. ${this.name(m.a)} ${m.scoreA}-${m.scoreB} ${this.name(m.b)} · ${this.tui('winner')}: ${this.name(m.winner)}`).join('\n')},rankingText(){if(this.t.format!=='roundrobin')return'';return '\n\nRanking:\n'+this.standings().map((s,i)=>`${i+1}. ${s.name} · W${s.w}/L${s.l} · Diff ${s.diff}`).join('\n')},summary(){let c=this.champion(),r=this.runnerUp();return`🏆 ${this.t.name}\n${this.t.venue||'-'} ${this.t.time||''}\nFormat: ${this.formatName()}\nProgress: ${this.done().length}/${this.playableCount()} (${this.progressPct()}%)\nTeams: ${this.teams.length}\n\nChampion: ${c?c.name:'-'}\nRunner-up: ${r?r.name:'-'}${this.rankingText()}\n\nMatch History:\n${this.matchHistoryText()||'-'}`},copySummary(){navigator.clipboard.writeText(this.summary());this.flash('Copied')},copyPublicLink(id=this.t.id){let link=location.origin+location.pathname.replace('tournament.html','tournament-view.html')+'?id='+id;navigator.clipboard.writeText(link);this.flash(this.tui('publicCopied')+'\n'+link)},finish(){if(!this.allDone())return this.flash(this.lang==='th'?'กรอกคะแนนให้ครบก่อน':'Complete all matches first');this.t.status='completed';this.save();this.saveCloud();this.flash(this.lang==='th'?'จบรายการและบันทึกแล้ว':'Tournament completed and saved')},async saveCloud(){try{this.save();let tour={id:this.t.id,name:this.t.name,venue:this.t.venue,event_time:this.t.time,format:this.t.format,score_to:+this.t.scoreTo||11,courts_count:+this.t.courts||1,status:this.t.status,summary:this.summary(),completed_at:this.t.status==='completed'?new Date().toISOString():null,updated_at:new Date().toISOString()};await this.chk('save tournament',this.db.from('psh_tournaments').upsert(tour));await this.chk('clear matches',this.db.from('psh_tournament_matches').delete().eq('tournament_id',this.t.id));await this.chk('clear teams',this.db.from('psh_tournament_teams').delete().eq('tournament_id',this.t.id));if(this.teams.length)await this.chk('save teams',this.db.from('psh_tournament_t
