<!DOCTYPE html>
<html lang="en" x-data="app()" x-init="init()" :class="{'th':lang==='th'}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PICKLEBALL SYSTEMS HUB - ALPHA 04.1</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#1a1d20;--panel:#242a30;--line:#3b434d;--lime:#c7ff2e;--orange:#ff7a18;--cyan:#3ee7ff}html,body{background:var(--bg);color:#fff;min-height:100%}body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.th body,.th *{font-family:ui-sans-serif,system-ui,"Noto Sans Thai",sans-serif}.chamfer{clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}.chamfer-sm{clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px)}.hazard{background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.16) 0 8px,transparent 8px 16px)}.grid-bg{background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:30px 30px}input,select,textarea{background:#101418!important;color:#fff!important;border-color:#3b434d!important}input::placeholder{color:#64748b!important}[x-cloak]{display:none!important}.btn{border:1px solid rgba(255,255,255,.14);padding:.72rem .9rem;font-weight:900;font-size:.78rem}.card{border:1px solid rgba(255,255,255,.12);background:rgba(36,42,48,.8)}
</style>
</head>
<body class="grid-bg">
<div class="min-h-screen pb-24">
<header class="sticky top-0 z-50 border-b border-white/10 bg-[#15181b]/95 backdrop-blur">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-3 py-3 sm:px-5">
    <button @click="tab='events'" class="text-left">
      <div class="text-[10px] tracking-[.28em] text-lime-300">PICKLEBALL SYSTEMS HUB</div>
      <div class="text-sm font-black sm:text-lg">ALPHA 04.1 · ONLINE REAL-TIME</div>
    </button>
    <div class="flex items-center gap-2">
      <div class="hidden rounded-full border border-lime-300/30 px-3 py-1 text-[11px] font-bold text-lime-300 sm:block">SUPABASE LIVE</div>
      <button @click="lang=lang==='th'?'en':'th';localStorage.psh_lang=lang" class="chamfer-sm btn bg-white/5"><span x-text="lang==='th'?'EN':'TH'"></span></button>
    </div>
  </div>
</header>

<main class="mx-auto max-w-7xl px-3 py-4 sm:px-5">
  <div class="mb-4 grid grid-cols-4 gap-2 text-center text-[11px] font-black uppercase sm:text-xs">
    <button @click="tab='events'" :class="tab==='events'?'bg-lime-300 text-black':'bg-white/5 text-slate-300'" class="chamfer-sm btn" x-text="tr('events')"></button>
    <button @click="tab='player'" :class="tab==='player'?'bg-lime-300 text-black':'bg-white/5 text-slate-300'" class="chamfer-sm btn" x-text="tr('player')"></button>
    <button @click="tab='organizer'" :class="tab==='organizer'?'bg-lime-300 text-black':'bg-white/5 text-slate-300'" class="chamfer-sm btn" x-text="tr('organizer')"></button>
    <button @click="tab='stats'" :class="tab==='stats'?'bg-lime-300 text-black':'bg-white/5 text-slate-300'" class="chamfer-sm btn" x-text="tr('stats')"></button>
  </div>

  <template x-if="msg"><div class="mb-3 rounded-xl border border-lime-300/30 bg-lime-300/10 p-3 text-sm text-lime-200" x-text="msg"></div></template>

  <section x-show="tab==='events'" x-cloak>
    <div class="mb-4 flex items-end justify-between gap-3">
      <div><h1 class="text-2xl font-black" x-text="tr('selectEvent')"></h1><p class="text-sm text-slate-400" x-text="tr('selectEventHint')"></p></div>
      <button @click="reload()" class="chamfer-sm btn bg-white/5">REFRESH</button>
    </div>
    <div class="grid gap-4 md:grid-cols-3">
      <template x-for="e in events" :key="e.id">
        <div class="chamfer card p-4" :class="selectedEventId===e.id?'ring-2 ring-lime-300':''">
          <div class="hazard mb-3 h-2 opacity-70"></div>
          <div class="mb-2 flex items-center justify-between"><span class="rounded-full px-2 py-1 text-[10px] font-black" :class="e.status==='live'?'bg-lime-300 text-black':e.status==='completed'?'bg-slate-600 text-white':'bg-orange-400 text-black'" x-text="e.status.toUpperCase()"></span><span class="text-xs text-slate-400" x-text="e.courts_count+' COURTS'"></span></div>
          <h2 class="text-xl font-black" x-text="lang==='th'?e.name_th:e.name_en"></h2>
          <p class="mt-2 text-sm text-slate-300"><b x-text="tr('time')"></b>: <span x-text="e.event_time||'-'"></span></p>
          <p class="text-sm text-slate-300"><b x-text="tr('venue')"></b>: <span x-text="e.venue||'-'"></span></p>
          <div class="mt-4 grid grid-cols-2 gap-2"><button @click="selectEvent(e);tab='player'" class="chamfer-sm btn bg-lime-300 text-black" x-text="tr('joinEvent')"></button><button @click="selectEvent(e);tab='stats'" class="chamfer-sm btn bg-white/5" x-text="tr('viewResults')"></button></div>
        </div>
      </template>
    </div>
  </section>

  <section x-show="tab==='player'" x-cloak>
    <div class="grid gap-4 lg:grid-cols-[1fr_.9fr]">
      <div class="chamfer card p-4">
        <div class="hazard mb-3 h-2"></div>
        <h2 class="text-xl font-black" x-text="tr('joinAsPlayer')"></h2>
        <p class="text-sm text-slate-400" x-text="selectedEvent?eventTitle(selectedEvent):tr('pickEventFirst')"></p>
        <div class="mt-4 grid gap-3 sm:grid-cols-2">
          <div><label class="text-xs font-bold text-slate-400" x-text="tr('nickname')"></label><input x-model="join.nickname" class="mt-1 w-full rounded-lg border px-3 py-3" :placeholder="tr('nicknamePh')"></div>
          <div><label class="text-xs font-bold text-slate-400" x-text="tr('selfRating')"></label><select x-model.number="join.self_rating" class="mt-1 w-full rounded-lg border px-3 py-3"><template x-for="lv in levelOptions" :key="lv.value"><option :value="lv.value" x-text="lv.value.toFixed(1)+' · '+(lang==='th'?lv.th:lv.en)"></option></template></select></div>
        </div>
        <div class="mt-3 rounded-xl border border-orange-300/20 bg-orange-950/20 p-3"><div class="flex flex-wrap items-center justify-between gap-2"><div><div class="font-black text-orange-200" x-text="tr('notSure')"></div><p class="text-sm text-slate-400" x-text="tr('assessmentHint')"></p></div><button @click="showAssess=!showAssess" class="chamfer-sm btn bg-orange-400 text-black" x-text="showAssess?tr('hide'):tr('takeAssessment')"></button></div></div>
        <div x-show="showAssess" x-cloak class="mt-4 grid gap-3">
          <template x-for="(q,i) in questions" :key="i"><div class="rounded-xl border border-white/10 bg-black/20 p-3"><div class="mb-2 text-sm font-bold" x-text="(i+1)+'. '+(lang==='th'?q.th:q.en)"></div><select x-model.number="answers[i]" class="w-full rounded-lg border px-3 py-2"><option value="0">-</option><option value="1">1 · Newbie</option><option value="2">2 · Beginner</option><option value="3">3 · Social</option><option value="4">4 · Strong</option><option value="5">5 · Advanced</option></select></div></template>
          <div class="rounded-xl border border-lime-300/20 bg-lime-950/10 p-3 text-sm"><b x-text="tr('aiEstimate')"></b>: <span x-text="estimate().toFixed(2)+' · '+levelName(estimate())"></span></div>
        </div>
        <button @click="savePlayer()" class="chamfer-sm mt-4 w-full bg-lime-300 px-4 py-4 font-black text-black" x-text="saving?tr('saving'):tr('addJoinQueue')"></button>
      </div>
      <div class="chamfer card p-4">
        <h3 class="text-lg font-black" x-text="tr('liveQueue')"></h3>
        <div class="mt-3 space-y-2"><template x-for="p in eventPlayers" :key="p.id"><div class="flex items-center justify-between gap-2 rounded-xl border border-white/10 bg-black/20 p-3"><button @click="openPlayer(p)" class="text-left"><div class="font-black" x-text="p.nickname"></div><div class="text-xs text-slate-400"><span x-text="levelName(p.estimated_level)"></span> · <span x-text="p.status"></span></div></button><div class="flex gap-2"><button @click="joinQueue(p)" class="rounded-lg bg-lime-300 px-3 py-2 text-xs font-black text-black" x-text="tr('joinQueue')"></button><button @click="pausePlayer(p)" class="rounded-lg bg-white/10 px-3 py-2 text-xs font-black" x-text="tr('pause')"></button></div></div></template></div>
      </div>
    </div>
  </section>

  <section x-show="tab==='organizer'" x-cloak>
    <template x-if="!isOrganizer"><div class="chamfer card p-4"><h2 class="text-xl font-black" x-text="tr('organizerMode')"></h2><p class="text-sm text-slate-400" x-text="tr('pinHint')"></p><div class="mt-4 flex gap-2"><input x-model="pin" class="w-40 rounded-lg border px-3 py-3" placeholder="PIN"><button @click="loginOrg()" class="chamfer-sm btn bg-lime-300 text-black">LOGIN</button></div></div></template>
    <template x-if="isOrganizer"><div class="grid gap-4 lg:grid-cols-[.8fr_1.2fr]">
      <div class="space-y-4">
        <div class="chamfer card p-4"><h2 class="text-xl font-black" x-text="tr('fieldControl')"></h2><div class="mt-3 grid grid-cols-4 gap-2 text-center"><div class="rounded-xl bg-black/20 p-3"><b x-text="eventPlayers.length"></b><div class="text-[10px] text-slate-400" x-text="tr('players')"></div></div><div class="rounded-xl bg-black/20 p-3"><b x-text="waiting.length"></b><div class="text-[10px] text-slate-400" x-text="tr('waiting')"></div></div><div class="rounded-xl bg-black/20 p-3"><b x-text="liveMatches.length"></b><div class="text-[10px] text-slate-400" x-text="tr('matches')"></div></div><div class="rounded-xl bg-black/20 p-3"><b x-text="selectedEvent?.courts_count||0"></b><div class="text-[10px] text-slate-400" x-text="tr('courts')"></div></div></div><button @click="matchNext()" class="chamfer-sm mt-4 w-full bg-lime-300 px-4 py-4 font-black text-black" x-text="tr('matchNext')"></button><button @click="specialMode=!specialMode" class="chamfer-sm mt-2 w-full border border-orange-300/40 bg-orange-400/10 px-4 py-3 font-black text-orange-200" x-text="tr('specialMatch')"></button></div>
        <div class="chamfer card p-4"><h3 class="font-black" x-text="tr('createEvent')"></h3><div class="mt-3 grid gap-2"><input x-model="newEvent.name" class="rounded-lg border px-3 py-3" :placeholder="tr('eventName')"><input x-model="newEvent.time" class="rounded-lg border px-3 py-3" :placeholder="tr('eventTime')"><input x-model="newEvent.venue" class="rounded-lg border px-3 py-3" :placeholder="tr('venue')"><div class="grid grid-cols-2 gap-2"><select x-model.number="newEvent.courts" class="rounded-lg border px-3 py-3"><template x-for="n in 8"><option :value="n" x-text="n+' courts'"></option></template></select><select x-model.number="newEvent.minutes" class="rounded-lg border px-3 py-3"><option value="10">10 min</option><option value="12">12 min</option><option value="15">15 min</option><option value="20">20 min</option></select></div><button @click="createEvent()" class="chamfer-sm btn bg-lime-300 text-black" x-text="tr('createEventBtn')"></button></div></div>
        <div class="chamfer card p-4"><h3 class="font-black" x-text="tr('eventTools')"></h3><p class="text-xs text-slate-400" x-text="tr('eventToolsHint')"></p><div class="mt-3 grid gap-2"><button @click="markCompleted()" class="chamfer-sm btn bg-white/10" x-text="tr('markCompleted')"></button><button @click="clearPlayers()" class="chamfer-sm btn bg-orange-400 text-black" x-text="tr('clearPlayers')"></button><button @click="deleteEvent()" class="chamfer-sm btn bg-red-500 text-white" x-text="tr('deleteEvent')"></button></div></div>
        <div class="chamfer card p-4"><h3 class="font-black" x-text="tr('waitingList')"></h3><div class="mt-3 space-y-2"><template x-for="p in eventPlayers" :key="p.id"><div class="flex items-center justify-between gap-2 rounded-xl border border-white/10 bg-black/20 p-3"><button @click="openPlayer(p)" class="text-left"><div class="font-black" x-text="p.nickname"></div><div class="text-xs text-slate-400"><span x-text="levelName(p.estimated_level)"></span> · <span x-text="p.status"></span></div></button><button @click="removePlayer(p)" class="rounded-lg bg-red-500/90 px-3 py-2 text-xs font-black" x-text="tr('remove')"></button></div></template></div></div>
      </div>
      <div class="space-y-4"><div class="grid gap-3 md:grid-cols-2"><template x-for="c in courtNumbers" :key="c"><div class="chamfer card p-4"><div class="mb-2 flex items-center justify-between"><h3 class="text-lg font-black" x-text="'COURT '+c"></h3><span class="text-xs text-lime-300" x-text="courtMatch(c)?formatTime(courtMatch(c)):tr('courtReady')"></span></div><template x-if="courtMatch(c)"><div><div class="grid grid-cols-2 gap-3"><div class="rounded-xl border border-orange-300/40 bg-orange-500/10 p-3"><div class="text-xs font-black text-orange-300">TEAM A</div><template x-for="p in teamPlayers(courtMatch(c),'A')"><div class="font-bold" x-text="p.nickname"></div></template></div><div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3"><div class="text-xs font-black text-lime-300">TEAM B</div><template x-for="p in teamPlayers(courtMatch(c),'B')"><div class="font-bold" x-text="p.nickname"></div></template></div></div><div class="mt-3 grid grid-cols-2 gap-2"><input type="number" min="0" x-model.number="scores[courtMatch(c).id]?.a" class="rounded-lg border px-3 py-3" placeholder="A"><input type="number" min="0" x-model.number="scores[courtMatch(c).id]?.b" class="rounded-lg border px-3 py-3" placeholder="B"></div><div class="mt-2 grid grid-cols-2 gap-2"><button @click="confirmScore(courtMatch(c))" class="chamfer-sm btn bg-lime-300 text-black" x-text="tr('confirmScore')"></button><button @click="cancelMatch(courtMatch(c))" class="chamfer-sm btn bg-white/10" x-text="tr('cancel')"></button></div></div></template></div></template></div>
      <div x-show="specialMode" class="chamfer card p-4"><h3 class="font-black text-orange-200" x-text="tr('specialMatch')"></h3><p class="text-sm text-slate-400" x-text="tr('pickFour')"></p><div class="mt-3 grid gap-2 sm:grid-cols-2"><template x-for="p in eventPlayers.filter(x=>x.status!=='playing'&&x.status!=='left')" :key="p.id"><label class="flex items-center gap-2 rounded-xl border border-white/10 bg-black/20 p-3"><input type="checkbox" :value="p.id" x-model="specialPick" class="h-5 w-5"><span x-text="p.nickname+' · '+levelName(p.estimated_level)"></span></label></template></div><button @click="createSpecial()" class="chamfer-sm mt-3 bg-orange-400 px-4 py-3 font-black text-black" x-text="tr('createSpecial')"></button></div></div>
    </div></template>
  </section>

  <section x-show="tab==='stats'" x-cloak>
    <div class="grid gap-4 lg:grid-cols-[1fr_.8fr]"><div class="chamfer card p-4"><h2 class="text-xl font-black" x-text="tr('leaderboard')"></h2><div class="mt-3 overflow-auto"><table class="w-full text-left text-sm"><thead class="text-xs text-slate-400"><tr><th>#</th><th>PLAYER</th><th>LEVEL</th><th>W-L</th><th>ELO</th><th></th></tr></thead><tbody><template x-for="(p,i) in leaderboard" :key="p.id"><tr class="border-t border-white/10"><td class="py-3 font-black" x-text="i+1"></td><td class="py-3 font-bold" x-text="p.nickname"></td><td x-text="levelName(p.estimated_level)"></td><td x-text="p.wins+'-'+p.losses"></td><td x-text="Math.round(p.elo)"></td><td><button @click="openPlayer(p)" class="rounded-lg bg-white/10 px-2 py-1 text-xs">DETAIL</button></td></tr></template></tbody></table></div></div><div class="chamfer card p-4"><h2 class="text-xl font-black" x-text="tr('eventSummary')"></h2><pre class="mt-3 whitespace-pre-wrap rounded-xl bg-black/30 p-3 text-sm text-slate-300" x-text="summaryText"></pre><button @click="copySummary()" class="chamfer-sm mt-3 btn bg-lime-300 text-black" x-text="tr('copySummary')"></button></div></div>
  </section>
</main>
</div>

<div x-show="detail" x-cloak class="fixed inset-0 z-[80] bg-black/70 p-4 backdrop-blur" @click.self="detail=null"><div class="mx-auto mt-10 max-w-lg chamfer card p-5"><div class="flex items-start justify-between gap-3"><div><h2 class="text-2xl font-black" x-text="detail?.nickname"></h2><p class="text-lime-300" x-text="detail?levelName(detail.estimated_level):''"></p></div><button @click="detail=null" class="rounded-lg bg-white/10 px-3 py-2 font-black">X</button></div><div class="mt-4 grid grid-cols-2 gap-3 text-sm"><div class="rounded-xl bg-black/30 p-3"><b x-text="detail?.self_rating"></b><div class="text-xs text-slate-400" x-text="tr('selfRating')"></div></div><div class="rounded-xl bg-black/30 p-3"><b x-text="Math.round(detail?.elo||0)"></b><div class="text-xs text-slate-400">ELO</div></div><div class="rounded-xl bg-black/30 p-3"><b x-text="detail?.matches_played"></b><div class="text-xs text-slate-400">MATCHES</div></div><div class="rounded-xl bg-black/30 p-3"><b x-text="winRate(detail)+'%' "></b><div class="text-xs text-slate-400">WIN RATE</div></div><div class="rounded-xl bg-black/30 p-3"><b x-text="detail?.rating_source"></b><div class="text-xs text-slate-400" x-text="tr('ratingSource')"></div></div><div class="rounded-xl bg-black/30 p-3"><b x-text="detail?.rating_confidence"></b><div class="text-xs text-slate-400" x-text="tr('confidence')"></div></div></div></div></div>
