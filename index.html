<!doctype html>
<html lang="th" x-data="app()" x-init="init()">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>GDSQ Open Play · Event History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{background:#1a1d20;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif}
    .cut{clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}
    .card{background:#242a30;border:1px solid #3a424a}.lime{color:#c7ff2e}.bg-lime{background:#c7ff2e;color:#111}
    input,select{background:#11161b!important;color:#fff!important;border-color:#3a424a!important}[x-cloak]{display:none!important}
  </style>
</head>
<body>
<header class="sticky top-0 z-50 bg-[#11161b]/95 border-b border-white/10 p-3">
  <div class="max-w-7xl mx-auto flex items-center justify-between gap-2">
    <button @click="tab='events'" class="text-left"><div class="text-[10px] tracking-[.25em] lime">GDSQ PICKLEBALL</div><b>OPEN PLAY · EVENT HISTORY</b></button>
    <button @click="lang=lang==='th'?'en':'th';localStorage.psh_lang=lang" class="cut bg-orange-400 text-black px-4 py-2 font-black" x-text="lang==='th'?'EN':'TH'"></button>
  </div>
</header>
<main class="max-w-7xl mx-auto p-3">
  <nav class="grid grid-cols-4 gap-2 text-xs font-black text-center mb-4">
    <template x-for="n in ['events','join','manage','stats']"><button @click="tab=n" class="cut border border-white/10 py-3" :class="tab===n?'bg-lime':'bg-white/5'" x-text="tr(n)"></button></template>
  </nav>
  <div x-show="msg" class="mb-3 p-3 rounded-xl border border-lime-300/40 bg-lime-300/10 text-lime-200" x-text="msg"></div>

  <section x-show="tab==='events'" x-cloak>
    <div class="flex flex-wrap items-end justify-between gap-3 mb-4">
      <div><h1 class="text-2xl font-black" x-text="tr('events')"></h1><p class="text-sm text-slate-400" x-text="tr('eventHint')"></p></div>
      <div class="flex gap-2"><button @click="eventFilter='live'" class="cut px-3 py-2 border border-white/10" :class="eventFilter==='live'?'bg-lime text-black':'bg-white/5'" x-text="tr('liveEvents')"></button><button @click="eventFilter='completed'" class="cut px-3 py-2 border border-white/10" :class="eventFilter==='completed'?'bg-lime text-black':'bg-white/5'" x-text="tr('completedEvents')"></button><button @click="load()" class="cut px-3 py-2 border border-white/10 bg-white/5">REFRESH</button></div>
    </div>
    <div class="grid gap-4 md:grid-cols-3">
      <template x-for="e in filteredEvents()" :key="e.id">
        <div class="cut card p-4" :class="eventId===e.id?'ring-2 ring-lime-300':''">
          <div class="flex justify-between text-xs"><span class="rounded-full px-2 py-1 font-black" :class="e.status==='completed'?'bg-slate-600':'bg-lime text-black'" x-text="statusLabel(e.status)"></span><span x-text="'Round '+(e.current_round||0)"></span></div>
          <h2 class="text-xl font-black mt-3" x-text="e.name_th||e.name_en"></h2>
          <p class="text-sm text-slate-300" x-text="(e.event_time||'-')+' · '+(e.venue||'-')"></p>
          <p class="text-xs text-slate-400 mt-1" x-text="(e.courts_count||1)+' courts' "></p>
          <div class="grid grid-cols-2 gap-2 mt-4"><button @click="pick(e.id);tab=e.status==='completed'?'stats':'join'" class="cut bg-lime p-3 font-black" x-text="e.status==='completed'?tr('viewHistory'):tr('joinEvent')"></button><button @click="pick(e.id);tab='manage'" class="cut bg-white/5 border border-white/10 p-3" x-text="tr('manage')"></button></div>
        </div>
      </template>
      <div x-show="filteredEvents().length===0" class="cut card p-5 text-slate-400" x-text="tr('noEvents')"></div>
    </div>
  </section>

  <section x-show="tab==='join'" x-cloak>
    <div class="grid gap-4 lg:grid-cols-[1fr_.9fr]">
      <div class="cut card p-4"><h2 class="text-2xl font-black" x-text="tr('joinTitle')"></h2><p class="lime" x-text="event?event.name_th:tr('pickEvent')"></p>
        <div class="grid gap-3 sm:grid-cols-2 mt-4"><input x-model="join.nick" class="rounded-lg border p-3" :placeholder="tr('nickname')"><select x-model.number="join.level" class="rounded-lg border p-3"><template x-for="l in levels"><option :value="l.v" x-text="l.v.toFixed(1)+' · '+(lang==='th'?l.th:l.en)"></option></template></select></div>
        <button @click="showAssess=!showAssess" class="cut bg-orange-400 text-black p-3 mt-3 font-black" x-text="showAssess?tr('hide'):tr('assessment')"></button>
        <div x-show="showAssess" class="grid gap-2 mt-3"><template x-for="(q,i) in qs"><div class="rounded-xl border border-white/10 bg-black/20 p-3"><b x-text="(i+1)+'. '+q[lang]"></b><select x-model.number="ans[i]" class="w-full rounded-lg border p-2 mt-2"><option value="0">-</option><option value="1">1 Beginner</option><option value="2">2 Basic</option><option value="3">3 Average</option><option value="4">4 Good</option><option value="5">5 Excellent</option></select></div></template><div class="rounded-xl border border-lime-300/30 bg-lime-950/10 p-3">Assessment <b x-text="avg().toFixed(2)+' / 5'"></b> · Estimate <b x-text="estimate().toFixed(2)"></b></div></div>
        <button @click="savePlayer()" class="cut bg-lime w-full p-4 mt-4 font-black" x-text="tr('saveReady')"></button>
      </div>
      <div class="cut card p-4"><h3 class="text-xl font-black" x-text="tr('queue')"></h3><template x-for="(p,i) in waiting()" :key="p.id"><button @click="detail=p" class="w-full text-left rounded-xl border border-white/10 bg-black/20 p-3 mt-2"><b x-text="(i+1)+'. '+p.nickname"></b><div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tr('played')+' '+p.matches_played"></div></button></template></div>
    </div>
  </section>

  <section x-show="tab==='manage'" x-cloak>
    <div class="space-y-4">
      <div class="cut card p-4"><h2 class="text-2xl font-black" x-text="tr('eventControl')"></h2><p class="text-sm text-slate-400" x-text="tr('selectEventToManage')"></p>
        <select x-model="eventId" @change="pick(eventId)" class="w-full rounded-lg border p-3 mt-3"><template x-for="e in events" :key="e.id"><option :value="e.id" x-text="(e.status==='completed'?'[ENDED] ':'[LIVE] ')+(e.name_th||e.name_en)"></option></template></select>
        <div class="grid sm:grid-cols-4 gap-3 mt-4"><button @click="previewNext()" class="cut card p-4 text-left"><b>➜ <span x-text="tr('nextMatch')"></span></b><p class="text-xs text-slate-400 mt-2" x-text="tr('nextDesc')"></p></button><button @click="tab='join'" class="cut card p-4 text-left"><b>＋ <span x-text="tr('joinQueue')"></span></b></button><button @click="tab='stats'" class="cut card p-4 text-left"><b>▥ <span x-text="tr('summary')"></span></b></button><button @click="advanced=!advanced" class="cut card p-4 text-left"><b>⚙ <span x-text="tr('advanced')"></span></b></button></div>
        <div class="grid grid-cols-2 sm:grid-cols-6 gap-2 mt-4 text-center text-xs font-black"><div class="rounded-xl bg-black/25 p-3">Status<br><b class="text-xl" x-text="statusLabel(event?.status)"></b></div><div class="rounded-xl bg-black/25 p-3">Round<br><b class="text-xl lime" x-text="event?.current_round||0"></b></div><div class="rounded-xl bg-black/25 p-3">Players<br><b class="text-xl" x-text="players.length"></b></div><div class="rounded-xl bg-black/25 p-3">Matches<br><b class="text-xl" x-text="confirmedMatches().length"></b></div><div class="rounded-xl bg-black/25 p-3">Fairness<br><b class="text-xl" x-text="fairScore()+'%'"></b></div><div class="rounded-xl bg-black/25 p-3">Courts<br><input x-model.number="settings.courts" @change="saveSettings()" type="number" class="w-14 rounded border text-center"></div></div>
      </div>
      <div class="cut card p-4"><h3 class="font-black" x-text="tr('createEvent')"></h3><div class="grid sm:grid-cols-4 gap-2 mt-2"><input x-model="newEvent.name" class="rounded-lg border p-3" :placeholder="tr('eventName')"><input x-model="newEvent.time" class="rounded-lg border p-3" :placeholder="tr('eventTime')"><input x-model="newEvent.venue" class="rounded-lg border p-3" :placeholder="tr('venue')"><button @click="createEvent()" class="cut bg-lime p-3 font-black">CREATE EVENT</button></div></div>
      <div class="cut card p-4"><h3 class="font-black text-red-300" x-text="tr('eventActions')"></h3><p class="text-sm text-slate-400" x-text="tr('deleteWarning')"></p><div class="grid sm:grid-cols-4 gap-2 mt-3"><button @click="ask('Finish Event',tr('finishMsg'),finishEvent)" class="cut bg-lime p-3 font-black" x-text="tr('finishEvent')"></button><button @click="ask('Reopen Event',tr('reopenMsg'),reopenEvent)" class="cut bg-white/5 border border-white/10 p-3 font-black" x-text="tr('reopenEvent')"></button><button @click="ask('Clear Event Data',tr('clearMsg'),clearEventData)" class="cut bg-orange-400 text-black p-3 font-black" x-text="tr('clearData')"></button><button @click="ask('DELETE EVENT',tr('deleteMsg'),deleteSelectedEvent)" class="cut bg-red-500 p-3 font-black" x-text="tr('deleteEvent')"></button></div></div>
      <div x-show="preview" class="cut card p-4 border-lime-300/40"><div class="flex justify-between"><div><h3 class="text-xl font-black lime" x-text="tr('preview')"></h3><p class="text-xs text-slate-400" x-text="'Court '+preview.court+' · Round '+preview.round+' · Balance '+preview.balance+'%'"></p></div><button @click="preview=null" class="rounded bg-white/10 px-3">X</button></div><div class="grid md:grid-cols-2 gap-3 mt-3"><div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3"><b class="text-orange-300">TEAM A</b><template x-for="p in preview.A"><div x-text="p.nickname+' · '+levelName(p.estimated_level)"></div></template></div><div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3"><b class="lime">TEAM B</b><template x-for="p in preview.B"><div x-text="p.nickname+' · '+levelName(p.estimated_level)"></div></template></div></div><div class="mt-3 rounded-xl border border-white/10 bg-black/20 p-3"><b x-text="tr('reasons')"></b><template x-for="r in preview.reasons"><div class="text-sm text-slate-300">✓ <span x-text="r"></span></div></template></div><div class="grid sm:grid-cols-3 gap-2 mt-3"><button @click="confirmPreview()" class="cut bg-lime p-3 font-black">CONFIRM</button><button @click="previewNext()" class="cut bg-white/5 border border-white/10 p-3">REBALANCE</button><button @click="preview=null" class="cut bg-red-500 p-3 font-black">CANCEL</button></div></div>
      <div class="grid xl:grid-cols-[.85fr_1.15fr] gap-4"><aside><div class="cut card p-4"><h3 class="font-black" x-text="tr('allPlayers')"></h3><template x-for="p in sortedPlayers()" :key="p.id"><div class="rounded-xl border border-white/10 bg-black/20 p-3 mt-2"><div class="flex justify-between"><button @click="detail=p" class="text-left"><b x-text="p.nickname"></b><div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tr('played')+' '+p.matches_played"></div></button><button @click="ask(tr('remove'),tr('removePlayerMsg')+' '+p.nickname,()=>removePlayer(p))" class="rounded bg-red-500 px-3 text-xs font-black" x-text="tr('remove')"></button></div><div class="grid grid-cols-5 gap-1 mt-2"><template x-for="s in ['ready','waiting','not_ready','paused','left']"><button @click="setStatus(p,s)" class="rounded bg-white/10 py-2 text-[10px]" x-text="statusName(s)"></button></template></div></div></template></div></aside><div class="grid md:grid-cols-2 gap-3"><template x-for="c in courts()"><div class="cut card p-4"><div class="flex justify-between mb-3"><h3 class="text-xl font-black" x-text="'COURT '+c"></h3><span class="lime" x-text="courtMatch(c)?elapsed(courtMatch(c)):'READY'"></span></div><template x-if="courtMatch(c)"><div><div class="grid grid-cols-2 gap-3"><div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3"><b class="text-orange-300">TEAM A</b><template x-for="p in team(courtMatch(c),'A')"><button @click="detail=p" class="block" x-text="p.nickname"></button></template></div><div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3"><b class="lime">TEAM B</b><template x-for="p in team(courtMatch(c),'B')"><button @click="detail=p" class="block" x-text="p.nickname"></button></template></div></div><div class="grid grid-cols-2 gap-2 mt-3"><input type="number" x-model.number="score[courtMatch(c).id].a" class="rounded-lg border p-3 text-center text-xl font-black" placeholder="A"><input type="number" x-model.number="score[courtMatch(c).id].b" class="rounded-lg border p-3 text-center text-xl font-black" placeholder="B"></div><div class="grid grid-cols-2 gap-2 mt-2"><button @click="confirmScore(courtMatch(c))" class="cut bg-lime p-3 font-black">CONFIRM</button><button @click="cancelMatch(courtMatch(c))" class="cut bg-white/5 border border-white/10 p-3">CANCEL</button></div></div></template></div></template></div></div>
    </div>
  </section>

  <section x-show="tab==='stats'" x-cloak>
    <div class="grid lg:grid-cols-[1fr_.8fr] gap-4"><div class="cut card p-4"><h2 class="text-2xl font-black" x-text="tr('ranking')"></h2><p class="text-xs text-slate-400" x-text="tr('rankRule')"></p><div class="overflow-auto"><table class="mt-3 w-full min-w-[720px] text-sm text-left"><thead class="text-slate-400 text-xs"><tr><th>#</th><th>Player</th><th>Score</th><th>W-L</th><th>Win%</th><th>Diff</th><th>Played</th><th>Skill</th></tr></thead><tbody><template x-for="(p,i) in ranking()"><tr class="border-t border-white/10"><td class="py-3" x-text="i+1"></td><td><button @click="detail=p" class="font-bold" x-text="p.nickname"></button></td><td class="lime font-black" x-text="eventScore(p)"></td><td x-text="p.wins+'-'+p.losses"></td><td x-text="winRate(p)+'%'"></td><td x-text="diff(p)"></td><td x-text="p.matches_played"></td><td x-text="levelName(p.estimated_level)"></td></tr></template></tbody></table></div></div><div class="cut card p-4"><h2 class="text-xl font-black" x-text="tr('summary')"></h2><div class="grid grid-cols-2 gap-2 mt-3"><template x-for="b in boxes()"><div class="rounded-xl bg-black/25 p-3 text-center"><b class="text-xl" x-text="b.v"></b><div class="text-xs text-slate-400" x-text="b.k"></div></div></template></div><h3 class="mt-4 font-black lime" x-text="tr('highlights')"></h3><template x-for="a in awards()"><div class="rounded-xl border border-white/10 bg-black/20 p-3 mt-2 text-sm"><b x-text="a.title"></b>: <span x-text="a.name"></span><div class="text-xs text-slate-400" x-text="a.note"></div></div></template><pre class="mt-3 rounded-xl bg-black/30 p-3 text-sm whitespace-pre-wrap" x-text="summary()"></pre><button @click="copySummary()" class="cut bg-lime p-3 font-black w-full mt-2">COPY LINE</button></div></div>
    <div class="cut card p-4 mt-4"><div class="flex items-end justify-between"><div><h2 class="text-2xl font-black" x-text="tr('matchHistory')"></h2><p class="text-xs text-slate-400" x-text="tr('matchHistoryHint')"></p></div><button @click="copyMatchHistory()" class="cut bg-white/5 border border-white/10 px-3 py-2 text-xs">COPY HISTORY</button></div><div class="mt-3 grid gap-3"><template x-for="(m,i) in confirmedMatches()" :key="m.id"><div class="rounded-xl border border-white/10 bg-black/20 p-3"><div class="flex justify-between gap-2"><div><b x-text="'#'+(confirmedMatches().length-i)+' · Court '+(m.court_number||'-')+' · Round '+(m.round_number||'-')"></b><div class="text-xs text-slate-400" x-text="matchDuration(m)+' · '+formatDate(m.ended_at||m.created_at)"></div></div><div class="text-xl font-black lime" x-text="(m.team_a_score??'-')+' - '+(m.team_b_score??'-')"></div></div><div class="grid md:grid-cols-2 gap-2 mt-3"><div class="rounded-lg border border-orange-400/40 bg-orange-500/10 p-3"><div class="text-xs text-orange-300 font-black">TEAM A</div><div x-text="teamNames(m,'A')"></div></div><div class="rounded-lg border border-lime-300/40 bg-lime-500/10 p-3"><div class="text-xs text-lime-300 font-black">TEAM B</div><div x-text="teamNames(m,'B')"></div></div></div><div class="mt-2 text-xs text-slate-400" x-text="matchSummaryLine(m)"></div></div></template><div x-show="confirmedMatches().length===0" class="rounded-xl border border-white/10 bg-black/20 p-4 text-slate-400" x-text="tr('noMatchHistory')"></div></div></div>
  </section>
</main>
<div x-show="detail" x-cloak class="fixed inset-0 bg-black/70 p-4 z-50 overflow-auto" @click.self="detail=null"><div class="cut card max-w-3xl mx-auto mt-8 p-5"><div class="flex justify-between"><div><div class="text-[10px] tracking-[.25em] lime" x-text="tr('playerSummary')"></div><h2 class="text-3xl font-black" x-text="detail?.nickname"></h2><p class="lime" x-text="detail?levelName(detail.estimated_level):''"></p></div><button @click="detail=null" class="bg-white/10 rounded px-3">X</button></div><div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-4"><template x-for="b in playerBoxes(detail)"><div class="rounded-xl bg-black/25 p-3 text-center"><b x-text="b.v"></b><div class="text-xs text-slate-400" x-text="b.k"></div></div></template></div><p class="mt-4 rounded-xl bg-black/30 p-3 text-sm" x-text="insight(detail)"></p><div class="mt-4"><div class="flex justify-between"><h3 class="text-xl font-black lime" x-text="tr('playerMatchHistory')"></h3><button @click="copyPlayerHistory(detail)" class="cut bg-white/5 border border-white/10 px-3 py-2 text-xs">COPY</button></div><template x-for="h in playerHistory(detail)" :key="h.match.id"><div class="rounded-xl border border-white/10 bg-black/20 p-3 mt-2"><div class="flex justify-between"><div><b x-text="h.result+' · '+h.score"></b><div class="text-xs text-slate-400" x-text="'Court '+(h.match.court_number||'-')+' · Round '+(h.match.round_number||'-')+' · '+matchDuration(h.match)"></div></div><div class="text-xs" :class="h.result==='WIN'?'text-lime-300':'text-red-300'" x-text="h.pointDiff"></div></div><div class="mt-2 text-sm" x-text="tr('partner')+': '+h.partner"></div><div class="text-sm text-slate-300" x-text="tr('opponents')+': '+h.opponents"></div></div></template><div x-show="detail && playerHistory(detail).length===0" class="rounded-xl border border-white/10 bg-black/20 p-3 mt-2 text-slate-400" x-text="tr('noPlayerHistory')"></div></div></div></div>
<div x-show="modal.open" x-cloak class="fixed inset-0 bg-black/80 p-4 z-[60]" @click.self="modal.open=false"><div class="cut max-w-md mx-auto mt-24 p-5 border border-red-500 bg-[#2a1111]"><h3 class="text-xl font-black text-red-300" x-text="modal.title"></h3><p class="text-sm text-slate-300 mt-2" x-text="modal.msg"></p><div class="grid grid-cols-2 gap-2 mt-4"><button @click="modal.open=false" class="cut bg-white/5 border border-white/10 p-3">CANCEL</button><button @click="runModal()" class="cut bg-red-500 p-3 font-black">CONFIRM</button></div></div></div>
