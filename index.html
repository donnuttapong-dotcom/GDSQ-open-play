<!DOCTYPE html>
<html lang="th" x-data="app()" x-init="init()">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GDSQ Open Play Field UI Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{background:#1a1d20;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif}
    .cut{clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}
    .card{background:#242a30;border:1px solid #3a424a}
    .btn{font-weight:900;border:1px solid #3a424a}
    .lime{color:#c7ff2e}.bg-lime{background:#c7ff2e;color:#111}
    .ico{display:inline-flex;width:36px;height:36px;align-items:center;justify-content:center;border:1px solid #3a424a;background:#fff;color:#111;border-radius:10px;font-weight:900}
    .haz{background:repeating-linear-gradient(135deg,rgba(255,255,255,.18) 0 8px,transparent 8px 16px)}
    input,select{background:#11161b!important;color:#fff!important;border-color:#3a424a!important}
    [x-cloak]{display:none!important}
  </style>
</head>
<body>
<header class="sticky top-0 z-50 bg-[#11161b]/95 border-b border-white/10 p-3">
  <div class="max-w-7xl mx-auto flex justify-between items-center gap-2">
    <button @click="tab='events'" class="text-left">
      <div class="text-[10px] tracking-[.25em] lime">GDSQ PICKLEBALL</div>
      <b x-text="tr('title')"></b>
    </button>
    <button @click="toggleLang()" class="cut bg-orange-400 text-black px-4 py-2 font-black" x-text="lang==='th'?'EN':'TH'"></button>
  </div>
</header>

<main class="max-w-7xl mx-auto p-3">
  <nav class="grid grid-cols-4 gap-2 text-xs font-black text-center mb-4">
    <template x-for="n in ['events','join','manage','stats']">
      <button @click="tab=n" class="cut btn py-3" :class="tab===n?'bg-lime':'bg-white/5'" x-text="tr(n)"></button>
    </template>
  </nav>

  <div x-show="msg" class="mb-3 p-3 rounded-xl border border-lime-300/40 bg-lime-300/10 text-lime-200" x-text="msg"></div>

  <!-- EVENTS -->
  <section x-show="tab==='events'" x-cloak>
    <div class="mb-4 flex items-end justify-between">
      <div>
        <h1 class="text-2xl font-black" x-text="tr('selectEvent')"></h1>
        <p class="text-sm text-slate-400" x-text="tr('eventHint')"></p>
      </div>
      <button @click="load()" class="cut btn bg-white/5 px-3 py-2">REFRESH</button>
    </div>

    <div class="grid gap-4 md:grid-cols-3">
      <template x-for="e in events" :key="e.id">
        <div class="cut card p-4" :class="eventId===e.id?'ring-2 ring-lime-300':''">
          <div class="haz h-2 mb-3"></div>
          <div class="flex justify-between text-xs">
            <span class="rounded-full px-2 py-1 font-black" :class="e.status==='live'?'bg-lime':'bg-slate-600'" x-text="e.status"></span>
            <span x-text="tr('round')+' '+(e.current_round||0)"></span>
          </div>
          <h2 class="text-xl font-black mt-3" x-text="e.name_th||e.name_en"></h2>
          <p class="text-sm text-slate-300" x-text="(e.event_time||'-')+' · '+(e.venue||'-')"></p>
          <div class="grid grid-cols-2 gap-2 mt-4">
            <button @click="pick(e.id);tab='join'" class="cut bg-lime px-3 py-3 font-black" x-text="tr('joinEvent')"></button>
            <button @click="pick(e.id);tab='stats'" class="cut btn bg-white/5 px-3 py-3" x-text="tr('results')"></button>
          </div>
        </div>
      </template>
    </div>
  </section>

  <!-- JOIN -->
  <section x-show="tab==='join'" x-cloak>
    <div class="grid gap-4 lg:grid-cols-[1fr_.85fr]">
      <div class="cut card p-4">
        <div class="haz h-2 mb-3"></div>
        <h2 class="text-2xl font-black" x-text="tr('joinTitle')"></h2>
        <p class="lime text-sm" x-text="event ? event.name_th : tr('pickEvent')"></p>

        <div class="grid gap-3 mt-4 sm:grid-cols-2">
          <input x-model="join.nick" class="rounded-lg border p-3" :placeholder="tr('nickname')">
          <select x-model.number="join.level" class="rounded-lg border p-3">
            <template x-for="l in levels">
              <option :value="l.v" x-text="l.v.toFixed(1)+' · '+(lang==='th'?l.th:l.en)"></option>
            </template>
          </select>
        </div>

        <div class="mt-3 rounded-xl border border-orange-300/30 bg-orange-950/20 p-3 flex justify-between gap-2">
          <div>
            <b class="text-orange-200" x-text="tr('assessmentTitle')"></b>
            <p class="text-sm text-slate-400" x-text="tr('assessmentHint')"></p>
          </div>
          <button @click="showAssess=!showAssess" class="cut bg-orange-400 text-black px-3 py-2 font-black" x-text="showAssess?tr('hide'):tr('open')"></button>
        </div>

        <div x-show="showAssess" class="grid gap-2 mt-3">
          <template x-for="(q,i) in questions">
            <div class="rounded-xl border border-white/10 bg-black/20 p-3">
              <div class="flex gap-2 mb-2">
                <span class="ico" x-text="q.i"></span>
                <div>
                  <b x-text="(i+1)+'. '+q[lang]"></b>
                  <div class="text-xs text-slate-400" x-text="q.note[lang]"></div>
                </div>
              </div>
              <select x-model.number="ans[i]" class="w-full rounded-lg border p-2">
                <option value="0">-</option>
                <option value="1">1 · Beginner / ทำได้น้อย</option>
                <option value="2">2 · Basic / พอทำได้</option>
                <option value="3">3 · Average / ปานกลาง</option>
                <option value="4">4 · Good / ดี</option>
                <option value="5">5 · Excellent / ดีมาก</option>
              </select>
            </div>
          </template>
          <div class="rounded-xl border border-lime-300/30 bg-lime-950/10 p-3">
            Assessment: <b x-text="avg().toFixed(2)+' / 5'"></b> · Estimate <b x-text="estimate().toFixed(2)"></b>
          </div>
        </div>

        <button @click="savePlayer()" class="cut w-full bg-lime mt-4 p-4 font-black" x-text="tr('saveReady')"></button>
      </div>

      <div class="cut card p-4">
        <h3 class="text-xl font-black" x-text="tr('queue')"></h3>
        <div class="space-y-2 mt-3">
          <template x-for="(p,i) in waiting()" :key="p.id">
            <button @click="detail=p" class="w-full text-left rounded-xl border border-white/10 bg-black/20 p-3">
              <b x-text="(i+1)+'. '+p.nickname"></b>
              <div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tr('played')+' '+p.matches_played"></div>
            </button>
          </template>
        </div>
      </div>
    </div>
  </section>

  <!-- MANAGE -->
  <section x-show="tab==='manage'" x-cloak>
    <div class="space-y-4">
      <div class="cut card p-4">
        <h2 class="text-2xl font-black" x-text="tr('quick')"></h2>
        <p class="text-sm text-slate-400" x-text="event?event.name_th:'-'"></p>

        <div class="grid gap-3 mt-4 sm:grid-cols-4">
          <button @click="previewNext()" class="cut card p-4 text-left">
            <span class="ico">➜</span><b class="ml-2" x-text="tr('nextMatch')"></b>
            <p class="text-xs text-slate-400 mt-2" x-text="tr('nextDesc')"></p>
          </button>
          <button @click="tab='join'" class="cut card p-4 text-left">
            <span class="ico">＋</span><b class="ml-2" x-text="tr('joinQueue')"></b>
            <p class="text-xs text-slate-400 mt-2" x-text="tr('joinDesc')"></p>
          </button>
          <button @click="tab='stats'" class="cut card p-4 text-left">
            <span class="ico">▥</span><b class="ml-2" x-text="tr('summary')"></b>
            <p class="text-xs text-slate-400 mt-2" x-text="tr('summaryDesc')"></p>
          </button>
          <button @click="advanced=!advanced" class="cut card p-4 text-left">
            <span class="ico">⚙</span><b class="ml-2" x-text="tr('advanced')"></b>
            <p class="text-xs text-slate-400 mt-2" x-text="tr('advancedDesc')"></p>
          </button>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-6 gap-2 mt-4 text-center text-xs font-black">
          <div class="rounded-xl bg-black/25 p-3">Round<br><b class="text-xl lime" x-text="event?.current_round||0"></b></div>
          <div class="rounded-xl bg-black/25 p-3">Players<br><b class="text-xl" x-text="players.length"></b></div>
          <div class="rounded-xl bg-black/25 p-3">Ready<br><b class="text-xl lime" x-text="waiting().length"></b></div>
          <div class="rounded-xl bg-black/25 p-3">Playing<br><b class="text-xl text-orange-300" x-text="players.filter(p=>p.status==='playing').length"></b></div>
          <div class="rounded-xl bg-black/25 p-3">Fairness<br><b class="text-xl" x-text="fairScore()+'%'"></b></div>
          <div class="rounded-xl bg-black/25 p-3">Mode<br><b class="text-xl" x-text="modeName(settings.mode)"></b></div>
        </div>

        <div class="grid gap-3 mt-4 sm:grid-cols-3">
          <label class="text-xs text-slate-400">Courts
            <input x-model.number="settings.courts" @change="saveSettings()" type="number" min="1" max="12" class="mt-1 w-full rounded-lg border p-3">
          </label>
          <label class="text-xs text-slate-400">Mode
            <select x-model="settings.mode" @change="saveSettings()" class="mt-1 w-full rounded-lg border p-3">
              <option value="social">Social</option>
              <option value="beginner">Beginner Friendly</option>
              <option value="competitive">Competitive</option>
              <option value="manual">Manual Only</option>
            </select>
          </label>
          <button @click="previewNext()" class="cut bg-lime p-3 font-black">PREVIEW NEXT</button>
        </div>
      </div>

      <div x-show="preview" class="cut card p-4 border-lime-300/40">
        <div class="flex justify-between">
          <div>
            <h3 class="text-xl font-black lime" x-text="tr('preview')"></h3>
            <p class="text-xs text-slate-400" x-text="'Court '+preview.court+' · Round '+preview.round+' · Balance '+preview.balance+'%'"></p>
          </div>
          <button @click="preview=null" class="rounded-lg bg-white/10 px-3 py-2">X</button>
        </div>
        <div class="grid gap-3 mt-3 md:grid-cols-2">
          <div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3">
            <b class="text-orange-300">TEAM A</b>
            <template x-for="p in preview.A"><div x-text="p.nickname+' · '+levelName(p.estimated_level)"></div></template>
          </div>
          <div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3">
            <b class="lime">TEAM B</b>
            <template x-for="p in preview.B"><div x-text="p.nickname+' · '+levelName(p.estimated_level)"></div></template>
          </div>
        </div>
        <div class="mt-3 rounded-xl border border-white/10 bg-black/20 p-3">
          <b x-text="tr('reasons')"></b>
          <template x-for="r in preview.reasons">
            <div class="text-sm text-slate-300">✓ <span x-text="r"></span></div>
          </template>
        </div>
        <div class="grid gap-2 mt-3 sm:grid-cols-3">
          <button @click="confirmPreview()" class="cut bg-lime p-3 font-black">CONFIRM</button>
          <button @click="previewNext()" class="cut btn bg-white/5 p-3">REBALANCE</button>
          <button @click="preview=null" class="cut bg-red-500 p-3 font-black">CANCEL</button>
        </div>
      </div>

      <div class="grid gap-4 xl:grid-cols-[.85fr_1.15fr]">
        <aside class="space-y-4">
          <div class="cut card p-4">
            <h3 class="font-black" x-text="tr('createEvent')"></h3>
            <div class="grid gap-2 mt-3">
              <input x-model="newEvent.name" class="rounded-lg border p-3" :placeholder="tr('eventName')">
              <input x-model="newEvent.time" class="rounded-lg border p-3" :placeholder="tr('eventTime')">
              <input x-model="newEvent.venue" class="rounded-lg border p-3" :placeholder="tr('venue')">
              <button @click="createEvent()" class="cut bg-lime p-3 font-black">CREATE EVENT</button>
            </div>
          </div>

          <div x-show="advanced" class="cut card p-4">
            <h3 class="font-black" x-text="tr('advanced')"></h3>
            <div class="grid gap-2 mt-3">
              <button @click="ask('Reset Stats',tr('resetMsg'),resetStats)" class="cut bg-orange-400 text-black p-3 font-black">RESET STATS</button>
              <button @click="ask('Clear Event',tr('clearMsg'),clearEvent)" class="cut bg-orange-400 text-black p-3 font-black">CLEAR PLAYERS + MATCHES</button>
              <button @click="ask('Remove Event',tr('removeEventMsg'),removeEvent)" class="cut bg-red-500 p-3 font-black">REMOVE EVENT</button>
            </div>
          </div>

          <div class="cut card p-4">
            <h3 class="font-black" x-text="tr('allPlayers')"></h3>
            <div class="space-y-2 mt-3">
              <template x-for="p in sortedPlayers()" :key="p.id">
                <div class="rounded-xl border border-white/10 bg-black/20 p-3">
                  <div class="flex justify-between">
                    <button @click="detail=p" class="text-left">
                      <b x-text="p.nickname"></b>
                      <div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tr('played')+' '+p.matches_played"></div>
                    </button>
                    <button @click="ask(tr('remove'),tr('removePlayerMsg')+' '+p.nickname,()=>removePlayer(p))" class="rounded-lg bg-red-500 px-3 text-xs font-black" x-text="tr('remove')"></button>
                  </div>
                  <div class="grid grid-cols-5 gap-1 mt-2">
                    <template x-for="s in ['ready','waiting','not_ready','paused','left']">
                      <button @click="setStatus(p,s)" class="rounded bg-white/10 py-2 text-[10px]" x-text="statusName(s)"></button>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </aside>

        <div class="space-y-4">
          <div class="grid gap-3 md:grid-cols-2">
            <template x-for="c in courts()">
              <div class="cut card p-4">
                <div class="flex justify-between mb-3">
                  <h3 class="text-xl font-black" x-text="'COURT '+c"></h3>
                  <span class="lime" x-text="courtMatch(c)?elapsed(courtMatch(c)):'READY'"></span>
                </div>
                <template x-if="courtMatch(c)">
                  <div>
                    <div class="grid grid-cols-2 gap-3">
                      <div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3">
                        <b class="text-orange-300">TEAM A</b>
                        <template x-for="p in team(courtMatch(c),'A')"><button @click="detail=p" class="block" x-text="p.nickname"></button></template>
                      </div>
                      <div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3">
                        <b class="lime">TEAM B</b>
                        <template x-for="p in team(courtMatch(c),'B')"><button @click="detail=p" class="block" x-text="p.nickname"></button></template>
                      </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-3">
                      <input type="number" x-model.number="score[courtMatch(c).id].a" class="rounded-lg border p-3 text-center text-xl font-black" placeholder="A">
                      <input type="number" x-model.number="score[courtMatch(c).id].b" class="rounded-lg border p-3 text-center text-xl font-black" placeholder="B">
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                      <button @click="confirmScore(courtMatch(c))" class="cut bg-lime p-3 font-black">CONFIRM</button>
                      <button @click="cancelMatch(courtMatch(c))" class="cut btn bg-white/5 p-3">CANCEL</button>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- STATS -->
  <section x-show="tab==='stats'" x-cloak>
    <div class="grid gap-4 lg:grid-cols-[1fr_.8fr]">
      <div class="cut card p-4">
        <h2 class="text-2xl font-black" x-text="tr('ranking')"></h2>
        <p class="text-xs text-slate-400" x-text="tr('rankRule')"></p>
        <div class="overflow-auto">
          <table class="mt-3 w-full min-w-[720px] text-sm text-left">
            <thead class="text-slate-400 text-xs"><tr><th>#</th><th>Player</th><th>Score</th><th>W-L</th><th>Win%</th><th>Diff</th><th>Played</th><th>Skill</th></tr></thead>
            <tbody>
              <template x-for="(p,i) in ranking()">
                <tr class="border-t border-white/10">
                  <td class="py-3" x-text="i+1"></td>
                  <td><button @click="detail=p" class="font-bold" x-text="p.nickname"></button></td>
                  <td class="lime font-black" x-text="eventScore(p)"></td>
                  <td x-text="p.wins+'-'+p.losses"></td>
                  <td x-text="winRate(p)+'%'"></td>
                  <td x-text="diff(p)"></td>
                  <td x-text="p.matches_played"></td>
                  <td x-text="levelName(p.estimated_level)"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

      <div class="cut card p-4">
        <h2 class="text-xl font-black" x-text="tr('summary')"></h2>
        <div class="grid grid-cols-2 gap-2 mt-3">
          <template x-for="b in boxes()"><div class="rounded-xl bg-black/25 p-3 text-center"><b class="text-xl" x-text="b.v"></b><div class="text-xs text-slate-400" x-text="b.k"></div></div></template>
        </div>
        <h3 class="mt-4 font-black lime" x-text="tr('highlights')"></h3>
        <template x-for="a in awards()"><div class="rounded-xl border border-white/10 bg-black/20 p-3 mt-2 text-sm"><b x-text="a.title"></b>: <span x-text="a.name"></span><div class="text-xs text-slate-400" x-text="a.note"></div></div></template>
        <pre class="mt-3 rounded-xl bg-black/30 p-3 text-sm whitespace-pre-wrap" x-text="summary()"></pre>
        <button @click="copySummary()" class="cut bg-lime p-3 font-black w-full mt-2">COPY LINE</button>
      </div>
    </div>
  </section>
</main>

<div x-show="detail" x-cloak class="fixed inset-0 bg-black/70 p-4 z-50" @click.self="detail=null">
  <div class="cut card max-w-2xl mx-auto mt-8 p-5">
    <div class="flex justify-between">
      <div><div class="text-[10px] tracking-[.25em] lime" x-text="tr('playerSummary')"></div><h2 class="text-3xl font-black" x-text="detail?.nickname"></h2><p class="lime" x-text="detail?levelName(detail.estimated_level):''"></p></div>
      <button @click="detail=null" class="bg-white/10 rounded-lg px-3">X</button>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-4">
      <template x-for="b in playerBoxes(detail)"><div class="rounded-xl bg-black/25 p-3 text-center"><b x-text="b.v"></b><div class="text-xs text-slate-400" x-text="b.k"></div></div></template>
    </div>
    <p class="mt-4 rounded-xl bg-black/30 p-3 text-sm" x-text="insight(detail)"></p>
  </div>
</div>

<div x-show="modal.open" x-cloak class="fixed inset-0 bg-black/80 p-4 z-[60]" @click.self="modal.open=false">
  <div class="cut max-w-md mx-auto mt-24 p-5 border border-red-500 bg-[#2a1111]">
    <h3 class="text-xl font-black text-red-300" x-text="modal.title"></h3>
    <p class="text-sm text-slate-300 mt-2" x-text="modal.msg"></p>
    <div class="grid grid-cols-2 gap-2 mt-4">
      <button @click="modal.open=false" class="cut btn bg-white/5 p-3">CANCEL</button>
      <button @click="runModal()" class="cut bg-red-500 p-3 font-black">CONFIRM</button>
    </div>
  </div>
</div>

async pick(id,save=true){this.eventId=id;if(save)localStorage.psh_event=id;this.event=this.events.find(e=>e.id===id);this.settings.courts=this.event?.courts_count||1;this.settings.mode=this.event?.event_mode||'social';let p=await this.db.from('psh_event_players').select('*').eq('event_id',id);this.players=p.data||[];let m=await this.db.from('psh_matches').select('*').eq('event_id',id).order('created_at',{ascending:false});this.matches=m.data||[];let ids=this.matches.map(x=>x.id);this.mps=ids.length?(await this.db.from('psh_match_players').select('*').in('match_id',ids)).data||[]:[];this.matches.forEach(m=>{if(!this.score[m.id])this.score[m.id]={a:m.team_a_score??'',b:m.team_b_score??''}})},

async savePlayer(){if(!this.eventId)return this.flash(this.tr('pickEvent'));let n=this.join.nick.trim();if(!n)return;let p=await this.db.from('psh_players').upsert({nickname:n,nickname_key:this.slug(n)},{onConflict:'nickname_key'}).select().single(),est=this.estimate(),ass=!!this.avg();await this.db.from('psh_event_players').upsert({event_id:this.eventId,player_id:p.data.id,nickname:n,self_rating:this.join.level,tech_score:this.tech(),tact_score:this.tact(),estimated_level:est,elo:900+est*180,rating_source:ass?'ai_assisted':'self_rated',rating_confidence:ass?'medium':'low',status:'ready',queue_joined_at:new Date().toISOString()},{onConflict:'event_id,player_id'});localStorage.last_nick=n;this.ans=Array(10).fill(0);this.flash('Ready');await this.pick(this.eventId)},

balance(f){let a=[...f].sort((x,y)=>this.power(y)-this.power(x)),opts=[[[0,3],[1,2]],[[0,2],[1,3]],[[0,1],[2,3]]],best=null,bd=1e9;for(let o of opts){let A=[a[o[0][0]],a[o[0][1]]],B=[a[o[1][0]],a[o[1][1]]],d=Math.abs(A.reduce((s,p)=>s+this.power(p),0)-B.reduce((s,p)=>s+this.power(p),0));if(d<bd){bd=d;best={A,B}}}return best},

previewNext(){let c=this.freeCourt(),four=this.chooseFour();if(!c)return this.flash('No free court');if(!four)return this.flash('Need 4 players');let b=this.balance(four),least=[...four].sort((a,b)=>a.matches_played-b.matches_played)[0],long=[...four].sort((a,b)=>new Date(a.queue_joined_at||a.created_at)-new Date(b.queue_joined_at||b.created_at))[0];this.preview={court:c,round:(this.event?.current_round||0)+1,A:b.A,B:b.B,balance:Math.max(0,Math.round(100-Math.abs(b.A.reduce((s,p)=>s+this.power(p),0)-b.B.reduce((s,p)=>s+this.power(p),0))/30)),reasons:[`${long.nickname} ${this.lang==='th'?'รอคิวนานที่สุด':'waited longest'}`,`${least.nickname} ${this.lang==='th'?'เล่นน้อยกว่ากลุ่ม':'played fewer games'}`,this.lang==='th'?'ทีม A/B มีพลังใกล้กัน':'Teams are balanced']}},

async createMatch(c,four,round){let b=this.balance(four),m=await this.db.from('psh_matches').insert({event_id:this.eventId,court_number:c,status:'live',match_type:'fair',started_at:new Date().toISOString(),round_number:round}).select().single(),rows=[...b.A.map(p=>({match_id:m.data.id,event_player_id:p.id,team:'A',rating_before:p.elo})),...b.B.map(p=>({match_id:m.data.id,event_player_id:p.id,team:'B',rating_before:p.elo}))];await this.db.from('psh_match_players').insert(rows);await this.db.from('psh_event_players').update({status:'playing'}).in('id',four.map(p=>p.id));await this.pick(this.eventId)},

async confirmScore(m){let s=this.score[m.id],a=+s.a,b=+s.b;if(isNaN(a)||isNaN(b)||a===b)return this.flash('Score?');let A=this.team(m,'A'),B=this.team(m,'B'),aWin=a>b,delta=Math.round((22+Math.min(Math.abs(a-b),10)*1.2)*((aWin?1:0)-this.expected(A.reduce((s,p)=>s+p.elo,0)/2,B.reduce((s,p)=>s+p.elo,0)/2))),round=m.round_number||0;for(let p of [...A,...B]){let isA=A.some(x=>x.id===p.id),won=isA?aWin:!aWin,pf=isA?a:b,pa=isA?b:a,newE=+p.elo+(isA?delta:-delta);await this.db.from('psh_event_players').update({status:'waiting',queue_joined_at:new Date().toISOString(),elo:newE,matches_played:p.matches_played+1,wins:p.wins+(won?1:0),losses:p.losses+(won?0:1),points_for:p.points_for+pf,points_against:p.points_against+pa,last_played_round:round,rest_until_round:round+1}).eq('id',p.id)}await this.db.from('psh_matches').update({status:'confirmed',team_a_score:a,team_b_score:b,ended_at:new Date().toISOString()}).eq('id',m.id);await this.pick(this.eventId)},

playerBoxes(p){if(!p)return[];let r=this.ranking().findIndex(x=>x.id===p.id)+1;return[{k:this.tr('ranking'),v:r||'-'},{k:'Score',v:this.eventScore(p)},{k:'Status',v:this.statusName(p.status)},{k:'Skill',v:this.levelName(p.estimated_level)},{k:'Played',v:p.matches_played},{k:'W-L',v:p.wins+'-'+p.losses},{k:'Win%',v:this.winRate(p)+'%'},{k:'Diff',v:this.diff(p)}]},
