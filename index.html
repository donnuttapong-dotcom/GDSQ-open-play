<!DOCTYPE html>
<html lang="en" x-data="pshApp()" x-init="init()" :class="{ 'th': lang==='th' }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PICKLEBALL SYSTEMS HUB - ALPHA 04.1 ONLINE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#1a1d20;--panel:#23282d;--line:#3a424a;--orange:#ff7a18;--lime:#c7ff2e;--cyan:#3ee7ff;--muted:#9ca3af;}
    html,body{background:var(--bg); color:#f5f5f5; min-height:100%;}
    body{font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;}
    .th body,.th *{font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", sans-serif;}
    .chamfer{clip-path: polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);}
    .chamfer-sm{clip-path: polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);}
    .hazard{background-image: repeating-linear-gradient(135deg,rgba(255,255,255,.14) 0 8px,transparent 8px 16px);}
    .grid-bg{background-image: linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px); background-size:32px 32px;}
    .glow-orange{box-shadow:0 0 0 1px rgba(255,122,24,.4),0 0 24px rgba(255,122,24,.12);}
    .glow-lime{box-shadow:0 0 0 1px rgba(199,255,46,.4),0 0 24px rgba(199,255,46,.12);}
    .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{scrollbar-width:none}
    [x-cloak]{display:none!important}
    input,select,textarea{background:#121519!important;color:#fff!important;border-color:#3a424a!important}
    input::placeholder{color:#64748b!important}
  </style>
</head>
<body class="grid-bg">
  <div class="min-h-screen pb-24">
    <header class="sticky top-0 z-50 border-b border-white/10 bg-[#15181b]/95 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-3 py-3 sm:px-5">
        <button @click="go('hub')" class="text-left">
          <div class="text-[10px] tracking-[0.28em] text-lime-300">PICKLEBALL SYSTEMS HUB</div>
          <div class="text-sm font-black tracking-wide sm:text-lg">ALPHA 04.1 · ONLINE FIELD MODE</div>
        </button>
        <div class="flex items-center gap-2">
          <div class="hidden rounded-full border border-white/10 px-3 py-1 text-[11px] text-slate-300 sm:block" :class="online ? 'text-lime-300' : 'text-orange-300'">
            <span x-text="online ? t('online') : t('setupNeeded')"></span>
          </div>
          <button @click="lang = lang === 'th' ? 'en' : 'th'; saveLocal()" class="chamfer-sm border border-white/15 bg-white/5 px-3 py-2 text-xs font-black hover:bg-white/10">
            <span x-text="lang === 'th' ? 'EN' : 'TH'"></span>
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-3 py-4 sm:px-5">
      <template x-if="!configured">
        <section class="chamfer border border-orange-400/50 bg-orange-950/20 p-4 shadow-2xl">
          <div class="hazard mb-3 h-2 w-full opacity-80"></div>
          <h1 class="text-xl font-black text-orange-300" x-text="t('setupTitle')"></h1>
          <p class="mt-2 text-sm leading-6 text-slate-300" x-text="t('setupDesc')"></p>
          <div class="mt-4 grid gap-3 md:grid-cols-2">
            <div>
              <label class="text-xs font-bold uppercase text-slate-400">Supabase URL</label>
              <input x-model="setup.url" class="mt-1 w-full rounded-lg border px-3 py-3 text-sm" placeholder="https://xxxxx.supabase.co" />
            </div>
            <div>
              <label class="text-xs font-bold uppercase text-slate-400">Publishable / Anon Key</label>
              <input x-model="setup.key" class="mt-1 w-full rounded-lg border px-3 py-3 text-sm" placeholder="sb_publishable_... or eyJ..." />
            </div>
          </div>
          <div class="mt-4 flex flex-wrap gap-2">
            <button @click="saveConfig()" class="chamfer-sm bg-lime-300 px-4 py-3 text-sm font-black text-black">SAVE CONFIG</button>
            <button @click="showSql = !showSql" class="chamfer-sm border border-white/20 px-4 py-3 text-sm font-black" x-text="showSql ? 'HIDE SQL' : 'SHOW SQL STEP'"></button>
          </div>
          <pre x-show="showSql" x-cloak class="mt-4 max-h-80 overflow-auto rounded-xl border border-white/10 bg-black/40 p-3 text-xs text-slate-300">1) Run supabase_alpha04_schema.sql in Supabase SQL Editor
2) Enable Realtime for psh_* tables if needed
3) Paste URL + publishable key here
4) Upload this file as index.html to GitHub Pages</pre>
        </section>
      </template>

      <template x-if="configured">
        <div>
          <nav class="mb-4 grid grid-cols-4 gap-2 text-center text-[11px] font-black uppercase sm:text-xs">
            <button @click="go('hub')" :class="tab==='hub' ? 'bg-lime-300 text-black' : 'bg-white/5 text-slate-300'" class="chamfer-sm border border-white/10 px-2 py-3" x-text="t('events')"></button>
            <button @click="go('player')" :class="tab==='player' ? 'bg-lime-300 text-black' : 'bg-white/5 text-slate-300'" class="chamfer-sm border border-white/10 px-2 py-3" x-text="t('player')"></button>
            <button @click="go('organizer')" :class="tab==='organizer' ? 'bg-lime-300 text-black' : 'bg-white/5 text-slate-300'" class="chamfer-sm border border-white/10 px-2 py-3" x-text="t('organizer')"></button>
            <button @click="go('stats')" :class="tab==='stats' ? 'bg-lime-300 text-black' : 'bg-white/5 text-slate-300'" class="chamfer-sm border border-white/10 px-2 py-3" x-text="t('stats')"></button>
          </nav>

          <template x-if="toast">
            <div class="mb-4 rounded-xl border border-lime-300/40 bg-lime-950/30 p-3 text-sm text-lime-200" x-text="toast"></div>
          </template>

          <section x-show="tab==='hub'" x-cloak>
            <div class="mb-4 flex items-end justify-between gap-3">
              <div>
                <h1 class="text-2xl font-black uppercase" x-text="t('selectEvent')"></h1>
                <p class="text-sm text-slate-400" x-text="t('selectEventHint')"></p>
              </div>
              <button @click="refreshAll()" class="chamfer-sm border border-white/15 bg-white/5 px-3 py-2 text-xs font-black">REFRESH</button>
            </div>
            <div class="grid gap-4 md:grid-cols-3">
              <template x-for="e in events" :key="e.id">
                <article class="chamfer border border-white/10 bg-[#22272d]/90 p-4" :class="selectedEventId===e.id ? 'glow-lime' : ''">
                  <div class="hazard mb-3 h-2 opacity-70"></div>
                  <div class="mb-3 flex items-center justify-between gap-2">
                    <span class="rounded-full px-2 py-1 text-[10px] font-black" :class="e.status==='live' ? 'bg-lime-300 text-black' : e.status==='completed' ? 'bg-slate-600 text-white' : 'bg-orange-400 text-black'" x-text="e.status.toUpperCase()"></span>
                    <span class="text-xs text-slate-400" x-text="e.courts_count + ' COURTS'"></span>
                  </div>
                  <h2 class="text-xl font-black" x-text="eventName(e)"></h2>
                  <p class="mt-2 text-sm text-slate-300"><b x-text="t('time')"></b>: <span x-text="e.event_time || '-'"></span></p>
                  <p class="text-sm text-slate-300"><b x-text="t('venue')"></b>: <span x-text="e.venue || '-'"></span></p>
                  <div class="mt-4 grid grid-cols-2 gap-2">
                    <button @click="selectEvent(e.id); go('player')" class="chamfer-sm bg-lime-300 px-3 py-3 text-xs font-black text-black" x-text="t('joinEvent')"></button>
                    <button @click="selectEvent(e.id); go('stats')" class="chamfer-sm border border-white/15 bg-white/5 px-3 py-3 text-xs font-black">RESULTS</button>
                  </div>
                </article>
              </template>
            </div>
          </section>

          <section x-show="tab==='player'" x-cloak>
            <div class="grid gap-4 lg:grid-cols-[1fr_.9fr]">
              <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                <div class="hazard mb-3 h-2"></div>
                <h2 class="text-2xl font-black uppercase" x-text="t('joinAsPlayer')"></h2>
                <p class="mt-1 text-sm text-slate-400" x-text="t('joinDesc')"></p>
                <p class="mt-2 text-xs text-lime-300" x-text="selectedEvent ? eventName(selectedEvent) : t('pickEventFirst')"></p>

                <div class="mt-4 grid gap-3 sm:grid-cols-2">
                  <div>
                    <label class="text-xs font-bold uppercase text-slate-400" x-text="t('nickname')"></label>
                    <input x-model="join.nickname" class="mt-1 w-full rounded-lg border px-3 py-3" :placeholder="t('nicknamePh')" />
                  </div>
                  <div>
                    <label class="text-xs font-bold uppercase text-slate-400" x-text="t('selfRating')"></label>
                    <select x-model.number="join.self_rating" class="mt-1 w-full rounded-lg border px-3 py-3">
                      <template x-for="lv in levelOptions" :key="lv.value">
                        <option :value="lv.value" x-text="lv.value.toFixed(1) + ' · ' + (lang==='th'?lv.th:lv.en)"></option>
                      </template>
                    </select>
                  </div>
                </div>

                <div class="mt-4 rounded-xl border border-orange-400/30 bg-orange-950/20 p-3">
                  <div class="flex flex-wrap items-center justify-between gap-3">
                    <div>
                      <div class="font-black text-orange-200" x-text="t('notSure')"></div>
                      <p class="text-sm text-slate-400" x-text="t('assessmentHint')"></p>
                    </div>
                    <button @click="showAssessment=!showAssessment" class="chamfer-sm bg-orange-400 px-3 py-2 text-xs font-black text-black" x-text="showAssessment ? t('hide') : t('takeAssessment')"></button>
                  </div>
                </div>

                <div x-show="showAssessment" x-cloak class="mt-4 grid gap-3">
                  <template x-for="(q,i) in questions" :key="i">
                    <div class="rounded-xl border border-white/10 bg-black/20 p-3">
                      <div class="mb-2 text-sm font-bold" x-text="(i+1)+'. '+(lang==='th'?q.th:q.en)"></div>
                      <select x-model.number="answers[i]" class="w-full rounded-lg border px-3 py-2">
                        <option :value="0">-</option>
                        <option :value="1">1 · Newbie</option>
                        <option :value="2">2 · Beginner</option>
                        <option :value="3">3 · Social</option>
                        <option :value="4">4 · Strong</option>
                        <option :value="5">5 · Advanced</option>
                      </select>
                    </div>
                  </template>
                  <div class="rounded-xl border border-lime-300/30 bg-lime-950/10 p-3 text-sm">
                    <b x-text="t('aiEstimate')"></b>: <span x-text="estimatedLevel().toFixed(2)+' · '+levelName(estimatedLevel())"></span>
                  </div>
                </div>

                <button @click="savePlayer()" class="chamfer mt-4 w-full bg-lime-300 px-5 py-4 font-black text-black" x-text="saving ? t('saving') : t('addJoinQueue')"></button>
              </div>

              <aside class="space-y-4">
                <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                  <h3 class="text-lg font-black uppercase" x-text="t('myStatus')"></h3>
                  <template x-if="myEventPlayer">
                    <div class="mt-3 rounded-xl border border-white/10 bg-black/20 p-3">
                      <div class="flex items-start justify-between gap-2">
                        <button @click="openPlayerDetail(myEventPlayer)" class="text-left">
                          <div class="text-xl font-black" x-text="myEventPlayer.nickname"></div>
                          <div class="text-sm text-lime-300" x-text="levelName(myEventPlayer.estimated_level)"></div>
                          <div class="text-xs text-slate-400" x-text="myEventPlayer.status.toUpperCase()"></div>
                        </button>
                        <div class="text-right text-xs text-slate-400">ELO<br><b class="text-white" x-text="Math.round(myEventPlayer.elo)"></b></div>
                      </div>
                      <div class="mt-3 grid grid-cols-2 gap-2">
                        <button @click="setMyStatus('waiting')" class="rounded-lg bg-lime-300 px-3 py-2 text-xs font-black text-black" x-text="t('joinQueue')"></button>
                        <button @click="setMyStatus('paused')" class="rounded-lg bg-white/10 px-3 py-2 text-xs font-black" x-text="t('pause')"></button>
                      </div>
                    </div>
                  </template>
                  <template x-if="!myEventPlayer"><p class="mt-3 text-sm text-slate-400" x-text="t('noPlayerYet')"></p></template>
                </div>

                <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                  <h3 class="text-lg font-black uppercase" x-text="t('liveQueue')"></h3>
                  <div class="mt-3 space-y-2">
                    <template x-for="(p,i) in waitingPlayers()" :key="p.id">
                      <div class="flex items-center justify-between gap-2 rounded-xl border border-white/10 bg-black/20 p-3">
                        <button @click="openPlayerDetail(p)" class="text-left">
                          <div class="font-black"><span x-text="i+1"></span>. <span x-text="p.nickname"></span></div>
                          <div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+Math.round(p.elo)"></div>
                        </button>
                        <span class="text-[10px] font-bold text-lime-300">WAITING</span>
                      </div>
                    </template>
                  </div>
                </div>
              </aside>
            </div>
          </section>

          <section x-show="tab==='organizer'" x-cloak>
            <template x-if="!organizerUnlocked">
              <div class="chamfer mx-auto max-w-md border border-orange-400/40 bg-[#22272d] p-5">
                <h2 class="text-2xl font-black uppercase" x-text="t('organizerMode')"></h2>
                <p class="mt-2 text-sm text-slate-400" x-text="t('pinHint')"></p>
                <input x-model="pinInput" type="tel" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" enterkeyhint="done" @keyup.enter="unlockOrganizer()" class="mt-4 w-full rounded-lg border px-3 py-4 text-center text-2xl font-black tracking-[0.35em]" placeholder="PIN" />
                <div class="mt-3 grid grid-cols-3 gap-2 select-none">
                  <template x-for="n in ['1','2','3','4','5','6','7','8','9']" :key="n">
                    <button type="button" @click="appendPin(n)" class="rounded-xl border border-white/15 bg-white/10 py-4 text-xl font-black active:scale-95" x-text="n"></button>
                  </template>
                  <button type="button" @click="pinInput=''" class="rounded-xl border border-white/15 bg-white/10 py-4 text-sm font-black active:scale-95">CLEAR</button>
                  <button type="button" @click="appendPin('0')" class="rounded-xl border border-white/15 bg-white/10 py-4 text-xl font-black active:scale-95">0</button>
                  <button type="button" @click="backspacePin()" class="rounded-xl border border-white/15 bg-white/10 py-4 text-sm font-black active:scale-95">DEL</button>
                </div>
                <button @click="unlockOrganizer()" class="chamfer mt-3 w-full bg-orange-400 px-5 py-4 font-black text-black">UNLOCK</button>
              </div>
            </template>

            <template x-if="organizerUnlocked">
              <div class="space-y-4">
                <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                  <div class="flex flex-wrap items-center justify-between gap-3">
                    <div>
                      <h2 class="text-2xl font-black uppercase" x-text="t('fieldControl')"></h2>
                      <p class="text-sm text-slate-400" x-text="selectedEvent ? eventName(selectedEvent) : '-' "></p>
                    </div>
                    <button @click="refreshAll()" class="chamfer-sm border border-white/15 bg-white/5 px-3 py-2 text-xs font-black">REFRESH</button>
                  </div>
                  <div class="mt-4 grid grid-cols-2 gap-3 sm:grid-cols-5">
                    <div class="rounded-xl bg-black/25 p-3 text-center"><div class="text-2xl font-black" x-text="eventPlayers.length"></div><div class="text-[10px] text-slate-400" x-text="t('players')"></div></div>
                    <div class="rounded-xl bg-black/25 p-3 text-center"><div class="text-2xl font-black" x-text="waitingPlayers().length"></div><div class="text-[10px] text-slate-400" x-text="t('waiting')"></div></div>
                    <div class="rounded-xl bg-black/25 p-3 text-center"><div class="text-2xl font-black" x-text="activeMatches().length"></div><div class="text-[10px] text-slate-400" x-text="t('playing')"></div></div>
                    <div class="rounded-xl bg-black/25 p-3 text-center"><div class="text-2xl font-black" x-text="matches.length"></div><div class="text-[10px] text-slate-400" x-text="t('matches')"></div></div>
                    <div class="rounded-xl bg-black/25 p-3 text-center"><div class="text-2xl font-black" x-text="settings.courts"></div><div class="text-[10px] text-slate-400" x-text="t('courts')"></div></div>
                  </div>
                  <div class="mt-4 grid gap-3 sm:grid-cols-4">
                    <div><label class="text-xs text-slate-400" x-text="t('courts')"></label><select x-model.number="settings.courts" @change="updateEventSettings()" class="mt-1 w-full rounded-lg border px-3 py-3"><template x-for="n in 8"><option :value="n" x-text="n"></option></template></select></div>
                    <div><label class="text-xs text-slate-400" x-text="t('minutes')"></label><select x-model.number="settings.minutes" @change="updateEventSettings()" class="mt-1 w-full rounded-lg border px-3 py-3"><option value="8">8</option><option value="10">10</option><option value="12">12</option><option value="15">15</option><option value="20">20</option></select></div>
                    <div class="sm:col-span-2 flex items-end"><button @click="matchNext()" class="chamfer w-full bg-lime-300 px-4 py-4 font-black text-black" x-text="t('matchNext')"></button></div>
                  </div>
                </div>

                <div class="grid gap-4 xl:grid-cols-[.85fr_1.15fr]">
                  <aside class="space-y-4">
                    <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                      <h3 class="text-lg font-black uppercase" x-text="t('createEvent')"></h3>
                      <div class="mt-3 grid gap-2">
                        <input x-model="newEvent.name" class="rounded-lg border px-3 py-3" :placeholder="t('eventName')" />
                        <input x-model="newEvent.time" class="rounded-lg border px-3 py-3" :placeholder="t('eventTime')" />
                        <input x-model="newEvent.venue" class="rounded-lg border px-3 py-3" :placeholder="t('venue')" />
                        <div class="grid grid-cols-2 gap-2">
                          <select x-model.number="newEvent.courts" class="rounded-lg border px-3 py-3"><template x-for="n in 8"><option :value="n" x-text="n+' courts'"></option></template></select>
                          <select x-model.number="newEvent.minutes" class="rounded-lg border px-3 py-3"><option value="10">10 min</option><option value="12">12 min</option><option value="15">15 min</option><option value="20">20 min</option></select>
                        </div>
                        <input x-model="newEvent.pin" type="tel" inputmode="numeric" class="rounded-lg border px-3 py-3" placeholder="Organizer PIN (default 4626)" />
                        <button @click="createEvent()" class="chamfer-sm bg-lime-300 px-4 py-3 text-sm font-black text-black" x-text="t('createEventBtn')"></button>
                      </div>
                    </div>

                    <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                      <h3 class="text-lg font-black uppercase" x-text="t('eventTools')"></h3>
                      <p class="mt-1 text-xs text-slate-400" x-text="t('eventToolsHint')"></p>
                      <div class="mt-3 grid gap-2">
                        <button @click="completeSelectedEvent()" class="chamfer-sm border border-white/15 bg-white/5 px-4 py-3 text-sm font-black" x-text="t('markCompleted')"></button>
                        <button @click="clearEventData()" class="chamfer-sm bg-orange-400 px-4 py-3 text-sm font-black text-black" x-text="t('clearPlayers')"></button>
                        <button @click="deleteSelectedEvent()" class="chamfer-sm bg-red-500 px-4 py-3 text-sm font-black text-white" x-text="t('deleteEvent')"></button>
                      </div>
                    </div>

                    <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                      <h3 class="text-lg font-black uppercase" x-text="t('waitingList')"></h3>
                      <div class="mt-3 space-y-2">
                        <template x-for="p in eventPlayersSorted()" :key="p.id">
                          <div class="rounded-xl border border-white/10 bg-black/20 p-3">
                            <div class="flex items-center justify-between gap-2">
                              <button @click="openPlayerDetail(p)" class="text-left">
                                <div class="font-black" x-text="p.nickname"></div>
                                <div class="text-xs text-slate-400"><span x-text="levelName(p.estimated_level)"></span> · <span x-text="p.status"></span> · <span x-text="Math.round(p.elo)"></span></div>
                              </button>
                              <button @click="removePlayerFromEvent(p)" class="rounded-lg bg-red-500/90 px-3 py-2 text-xs font-black text-white" x-text="t('remove')"></button>
                            </div>
                            <div class="mt-2 grid grid-cols-3 gap-2">
                              <button @click="setPlayerStatus(p,'waiting')" class="rounded-lg bg-lime-300 px-2 py-2 text-[11px] font-black text-black">QUEUE</button>
                              <button @click="setPlayerStatus(p,'paused')" class="rounded-lg bg-white/10 px-2 py-2 text-[11px] font-black">PAUSE</button>
                              <button @click="setPlayerStatus(p,'left')" class="rounded-lg bg-white/10 px-2 py-2 text-[11px] font-black">LEFT</button>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </aside>

                  <div class="space-y-4">
                    <div class="grid gap-3 md:grid-cols-2">
                      <template x-for="court in courtNumbers()" :key="court">
                        <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                          <div class="mb-3 flex items-center justify-between gap-2">
                            <h3 class="text-xl font-black" x-text="'COURT '+court"></h3>
                            <span class="text-sm font-black text-lime-300" x-text="matchOnCourt(court) ? timerText(matchOnCourt(court)) : t('courtReady')"></span>
                          </div>
                          <template x-if="matchOnCourt(court)">
                            <div>
                              <div class="grid grid-cols-2 gap-3">
                                <div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3 glow-orange">
                                  <div class="mb-2 text-xs font-black text-orange-300">TEAM A</div>
                                  <template x-for="p in teamPlayers(matchOnCourt(court),'A')" :key="p.id"><button @click="openPlayerDetail(p)" class="block font-bold" x-text="p.nickname"></button></template>
                                </div>

    slugName(s){return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')},
    assessed(){return this.answers.some(v=>Number(v)>0)},
    tech(){const v=this.answers.slice(0,5).map(Number).filter(Boolean); return v.length? v.reduce((a,b)=>a+b,0)/v.length : 0},
    tact(){const v=this.answers.slice(5,10).map(Number).filter(Boolean); return v.length? v.reduce((a,b)=>a+b,0)/v.length : 0},
    estimatedLevel(){if(!this.assessed())return Number(this.join.self_rating)||2.5; const assessment=(this.tech()+this.tact())/2; return Math.max(1,Math.min(5,Number(this.join.self_rating)*0.55+assessment*0.45))},
    levelName(v){v=Number(v)||2.5; const arr=[[1.24,'Newbie'],[1.74,'Starter'],[2.24,'Beginner'],[2.74,'Social Beginner'],[3.12,'Social Player'],[3.37,'Rally Player'],[3.74,'Intermediate'],[4.24,'Strong Player'],[4.74,'Advanced'],[9,'Expert']]; return arr.find(x=>v<=x[0])[1]},
    toElo(lv){return 900+(Number(lv)||2.5)*180},
    async savePlayer(){if(!this.selectedEventId)return this.flash(this.t('pickEventFirst')); const name=(this.join.nickname||'').trim(); if(!name)return this.flash('Nickname required'); this.saving=true; const key=name.toLowerCase().replace(/\s+/g,'-'); const p=await this.db.from('psh_players').upsert({nickname:name,nickname_key:key},{onConflict:'nickname_key'}).select('*').single(); if(p.error){this.saving=false;return this.flash(p.error.message)} const est=this.estimatedLevel(), assessed=this.assessed(); const payload={event_id:this.selectedEventId,player_id:p.data.id,nickname:name,self_rating:Number(this.join.self_rating),tech_score:this.tech(),tact_score:this.tact(),estimated_level:est,elo:this.toElo(est),rating_source:assessed?'ai_assisted':'self_rated',rating_confidence:assessed?'medium':'low',status:'waiting',queue_joined_at:new Date().toISOString()}; const ep=await this.db.from('psh_event_players').upsert(payload,{onConflict:'event_id,player_id'}).select('*').single(); if(ep.error){this.saving=false;return this.flash(ep.error.message)} localStorage.setItem('psh_my_name',name); localStorage.setItem('psh_my_player_id',p.data.id); this.myPlayerId=p.data.id; this.answers=Array(10).fill(0); this.showAssessment=false; this.saving=false; this.flash('Joined queue'); await this.refreshAll()},
    get myEventPlayer(){return this.eventPlayers.find(p=>p.player_id===this.myPlayerId)||this.eventPlayers.find(p=>p.nickname.toLowerCase()===(this.join.nickname||'').toLowerCase())},
    async setMyStatus(status){const p=this.myEventPlayer; if(!p)return; await this.setPlayerStatus(p,status)},
    async setPlayerStatus(p,status){const payload={status,queue_joined_at:status==='waiting'?new Date().toISOString():null}; const {error}=await this.db.from('psh_event_players').update(payload).eq('id',p.id); if(error)this.flash(error.message); else this.flash(status); await this.refreshAll()},
    waitingPlayers(){return this.eventPlayers.filter(p=>p.status==='waiting').sort((a,b)=>new Date(a.queue_joined_at||0)-new Date(b.queue_joined_at||0))},
    eventPlayersSorted(){return [...this.eventPlayers].sort((a,b)=>({waiting:0,playing:1,paused:2,registered:3,left:4}[a.status]??9)-({waiting:0,playing:1,paused:2,registered:3,left:4}[b.status]??9)||b.elo-a.elo)},
    leaderboard(){return [...this.eventPlayers].sort((a,b)=>b.elo-a.elo)},
    winRate(p){return p.matches_played?Math.round((p.wins/p.matches_played)*100):0},
    avgPfPa(p){return p.matches_played?`${(p.points_for/p.matches_played).toFixed(1)} / ${(p.points_against/p.matches_played).toFixed(1)}`:'-'},
    appendPin(n){this.pinInput=String((this.pinInput||'')+String(n)).slice(0,8)},
    backspacePin(){this.pinInput=String(this.pinInput||'').slice(0,-1)},
    unlockOrganizer(){const ev=this.selectedEvent; if(!ev)return; if(String(this.pinInput).trim()===String(ev.organizer_pin).trim()){this.organizerUnlocked=true;localStorage.setItem('psh_org_unlocked','1');this.flash('Organizer unlocked')}else this.flash('Wrong PIN')},
    async createEvent(){const name=(this.newEvent.name||'').trim(); if(!name)return this.flash(this.t('eventNameRequired')); const slugBase=this.slugName(name)||('event-'+Date.now()); const payload={slug:`${slugBase}-${Date.now().toString().slice(-5)}`,name_th:name,name_en:name,event_time:this.newEvent.time||'',venue:this.newEvent.venue||'',status:'live',courts_count:Number(this.newEvent.courts)||1,match_minutes:Number(this.newEvent.minutes)||12,organizer_pin:this.newEvent.pin||'4626'}; const {data,error}=await this.db.from('psh_events').insert(payload).select('*').single(); if(error)return this.flash(error.message); this.newEvent={name:'',time:'',venue:'',courts:2,minutes:12,pin:'4626'}; await this.loadEvents(); this.selectEvent(data.id,false); this.flash(this.t('eventCreated'));},
    async completeSelectedEvent(){if(!this.selectedEventId)return; if(!confirm(this.t('confirmComplete')))return; const {error}=await this.db.from('psh_events').update({status:'completed'}).eq('id',this.selectedEventId); if(error)this.flash(error.message); else this.flash(this.t('eventCompleted')); await this.refreshAll()},
    async deleteSelectedEvent(){const ev=this.selectedEvent; if(!ev)return; if(!confirm(this.t('confirmDeleteEvent')+' '+this.eventName(ev)+'?'))return; const {error}=await this.db.from('psh_events').delete().eq('id',ev.id); if(error)return this.flash(error.message); this.selectedEventId=null; localStorage.removeItem('psh_selected_event'); this.eventPlayers=[]; this.matches=[]; this.matchPlayers=[]; await this.loadEvents(); if(this.events[0])this.selectEvent(this.events[0].id,false); this.flash(this.t('eventDeleted'));},
    async clearEventData(){if(!this.selectedEventId)return; if(!confirm(this.t('confirmClearPlayers')))return; await this.db.from('psh_matches').delete().eq('event_id',this.selectedEventId); const {error}=await this.db.from('psh_event_players').delete().eq('event_id',this.selectedEventId); if(error)this.flash(error.message); else this.flash(this.t('playersCleared')); await this.refreshAll()},
    async removePlayerFromEvent(p){if(!p)return; if(p.status==='playing')return this.flash(this.t('cannotRemovePlaying')); if(!confirm(this.t('confirmRemovePlayer')+' '+p.nickname+'?'))return; const {error}=await this.db.from('psh_event_players').delete().eq('id',p.id); if(error)this.flash(error.message); else {this.playerDetailOpen=false; this.flash(this.t('playerRemoved'))} await this.refreshAll()},
    async updateEventSettings(){const {error}=await this.db.from('psh_events').update({courts_count:Number(this.settings.courts)||1,match_minutes:Number(this.settings.minutes)||12}).eq('id',this.selectedEventId); if(error)this.flash(error.message); else this.flash('Settings updated'); await this.refreshAll()},
    courtNumbers(){return Array.from({length:Number(this.settings.courts)||1},(_,i)=>i+1)},
    activeMatches(){return this.matches.filter(m=>m.status==='live'||m.status==='pending')},
    matchOnCourt(c){return this.activeMatches().find(m=>m.court_number===c)},
    timerText(m){const left=Math.max(0,(m.duration_seconds||720)-Math.floor((Date.now()-new Date(m.started_at).getTime())/1000)); return String(Math.floor(left/60)).padStart(2,'0')+':'+String(left%60).padStart(2,'0')},
    teamPlayers(m,team){return this.matchPlayers.filter(x=>x.match_id===m.id&&x.team===team).map(x=>this.eventPlayers.find(p=>p.id===x.event_player_id)).filter(Boolean)},
    openPlayerDetail(p){this.detailPlayer=p;this.playerDetailOpen=true},
    findFreeCourt(){for(const c of this.courtNumbers())if(!this.matchOnCourt(c))return c; return null},
    chooseFour(){const list=this.waitingPlayers(); if(list.length<4)return null; const pool=list.slice(0,Math.min(10,list.length)); let best=null; for(let a=0;a<pool.length-3;a++)for(let b=a+1;b<pool.length-2;b++)for(let c=b+1;c<pool.length-1;c++)for(let d=c+1;d<pool.length;d++){const arr=[pool[a],pool[b],pool[c],pool[d]],levels=arr.map(p=>p.estimated_level),range=Math.max(...levels)-Math.min(...levels),newbie=arr.filter(p=>p.estimated_level<2).length,adv=arr.filter(p=>p.estimated_level>=4).length,pen=(newbie&&adv)?1.2:0,wait=arr.reduce((s,p)=>s+(Date.now()-new Date(p.queue_joined_at||p.created_at).getTime())/600000,0)*-0.01,score=range+pen+wait; if(!best||score<best.score)best={arr,score}} return best?.arr||null},
    balanceTeams(players){const arr=[...players].sort((a,b)=>b.elo-a.elo); const opts=[[[arr[0],arr[3]],[arr[1],arr[2]]],[[arr[0],arr[2]],[arr[1],arr[3]]],[[arr[0],arr[1]],[arr[2],arr[3]]]]; const sum=t=>t.reduce((s,p)=>s+Number(p.elo),0); return opts.sort((x,y)=>Math.abs(sum(x[0])-sum(x[1]))-Math.abs(sum(y[0])-sum(y[1])))[0]},
    async matchNext(){const players=this.chooseFour(); if(!players)return this.flash('Need at least 4 waiting players'); await this.createMatch(players,'fair')},
    async createSpecialMatch(){const players=this.eventPlayers.filter(p=>this.specialSelected.includes(p.id)); if(players.length!==4)return this.flash('Pick exactly 4 players'); await this.createMatch(players,'special'); this.specialSelected=[]; this.specialOpen=false},
    async createMatch(players,type){const court=this.findFreeCourt(); if(!court)return this.flash('No court available'); const teams=this.balanceTeams(players); const {data:m,error}=await this.db.from('psh_matches').insert({event_id:this.selectedEventId,court_number:court,match_type:type,status:'live',duration_seconds:(Number(this.settings.minutes)||12)*60}).select('*').single(); if(error)return this.flash(error.message); const rows=[]; teams[0].forEach(p=>rows.push({match_id:m.id,event_player_id:p.id,team:'A',rating_before:p.elo})); teams[1].forEach(p=>rows.push({match_id:m.id,event_player_id:p.id,team:'B',rating_before:p.elo})); await this.db.from('psh_match_players').insert(rows); await this.db.from('psh_event_players').update({status:'playing'}).in('id',players.map(p=>p.id)); this.flash('Match created'); await this.refreshAll()},
    async cancelMatch(m){if(!confirm('Cancel match?'))return; const ids=this.matchPlayers.filter(x=>x.match_id===m.id).map(x=>x.event_player_id); await this.db.from('psh_matches').update({status:'cancelled'}).eq('id',m.id); if(ids.length)await this.db.from('psh_event_players').update({status:'waiting',queue_joined_at:new Date().toISOString()}).in('id',ids); await this.refreshAll()},
    async confirmScore(m){const s=this.scoreInputs[m.id]||{},a=Number(s.a),b=Number(s.b); if(Number.isNaN(a)||Number.isNaN(b))return this.flash('Enter score'); const mps=this.matchPlayers.filter(x=>x.match_id===m.id); const A=mps.filter(x=>x.team==='A'), B=mps.filter(x=>x.team==='B'); const avgA=A.reduce((s,x)=>s+Number(x.rating_before),0)/2, avgB=B.reduce((s,x)=>s+Number(x.rating_before),0)/2; const expA=1/(1+Math.pow(10,(avgB-avgA)/400)); const winA=a>b, margin=Math.min(12,Math.abs(a-b)), K=22+margin*1.2; await this.db.from('psh_matches').update({status:'confirmed',team_a_score:a,team_b_score:b,ended_at:new Date().toISOString()}).eq('id',m.id); for(const mp of mps){const p=this.eventPlayers.find(x=>x.id===mp.event_player_id); const teamA=mp.team==='A', actual=(teamA===winA)?1:0, expected=teamA?expA:1-expA, newElo=Number(p.elo)+K*(actual-expected), res=actual?'W':'L', pf=teamA?a:b, pa=teamA?b:a; await this.db.from('psh_match_players').update({rating_after:newElo,result:res,points_for:pf,points_against:pa}).eq('id',mp.id); await this.db.from('psh_event_players').update({status:'waiting',queue_joined_at:new Date().toISOString(),elo:newElo,matches_played:p.matches_played+1,wins:p.wins+(actual?1:0),losses:p.losses+(actual?0:1),points_for:p.points_for+pf,points_against:p.points_against+pa,last_form:[res,...(p.last_form||[])].slice(0,5),rating_confidence:(p.matches_played+1)>=5?'high':(p.matches_played+1)>=3?'medium':p.rating_confidence}).eq('id',p.id)} this.flash('Score confirmed'); await this.refreshAll()},
    summaryText(){const ev=this.selectedEvent; if(!ev)return ''; const top=this.leaderboard().slice(0,8).map((p,i)=>`${i+1}. ${p.nickname} · ${this.levelName(p.estimated_level)} · W${p.wins}/L${p.losses} · ${Math.round(p.elo)}`).join('\n'); return `${this.eventName(ev)}\n${ev.event_time||''} @ ${ev.venue||''}\nPlayers: ${this.eventPlayers.length}\nMatches: ${this.matches.filter(m=>m.status==='confirmed').length}\n\nLeaderboard\n${top}`},
    copySummary(){navigator.clipboard.writeText(this.summaryText());this.flash('Copied')}
}}
