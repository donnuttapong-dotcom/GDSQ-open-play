<!DOCTYPE html>
<html lang="th" x-data="app()" x-init="init()" :class="lang">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>GDSQ OPEN PLAY · BILINGUAL FIELD SYSTEM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#1a1d20;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.th body,.th *{font-family:system-ui,"Noto Sans Thai",sans-serif}.ch{clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}.chs{clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px)}.card{border:1px solid rgba(255,255,255,.12);background:#23282d}.haz{background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.16) 0 8px,transparent 8px 16px)}input,select{background:#11161b!important;color:#fff!important;border-color:#3a424a!important}[x-cloak]{display:none!important}.btn{font-weight:900;padding:.82rem 1rem;border:1px solid rgba(255,255,255,.14)}.chip{border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.22);border-radius:14px;padding:.72rem;text-align:center}.mini{font-size:11px;color:#94a3b8}.lime{color:#c7ff2e}.orange{color:#ff9a3d}.scroll{overflow:auto}.stat{border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.28);border-radius:16px;padding:12px}.bar{height:7px;background:#0f1418;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:#c7ff2e}
</style>
</head>
<body>
<header class="sticky top-0 z-50 border-b border-white/10 bg-[#15181b]/95 p-3 backdrop-blur">
 <div class="mx-auto flex max-w-7xl items-center justify-between gap-2">
  <button @click="tab='events'" class="text-left"><div class="text-[10px] tracking-[.25em] text-lime-300">GDSQ PICKLEBALL</div><div class="text-sm font-black sm:text-lg" x-text="tr('appTitle')"></div></button>
  <div class="flex gap-2"><button @click="tab='player'" class="chs btn bg-white/5 text-xs" x-text="tr('player')"></button><button @click="tab='organizer'" class="chs btn bg-lime-300 text-xs text-black" x-text="tr('organizer')"></button><button @click="toggleLang()" class="chs btn bg-orange-400 text-xs text-black" x-text="lang==='th'?'EN':'TH'"></button></div>
 </div>
</header>
<main class="mx-auto max-w-7xl p-3 sm:p-5">
 <nav class="mb-4 grid grid-cols-4 gap-2 text-center text-xs font-black uppercase">
  <button @click="tab='events'" :class="tab==='events'?'bg-lime-300 text-black':'bg-white/5'" class="chs btn" x-text="tr('events')"></button>
  <button @click="tab='player'" :class="tab==='player'?'bg-lime-300 text-black':'bg-white/5'" class="chs btn" x-text="tr('join')"></button>
  <button @click="tab='organizer'" :class="tab==='organizer'?'bg-lime-300 text-black':'bg-white/5'" class="chs btn" x-text="tr('manage')"></button>
  <button @click="tab='stats'" :class="tab==='stats'?'bg-lime-300 text-black':'bg-white/5'" class="chs btn" x-text="tr('stats')"></button>
 </nav>
 <div x-show="msg" x-text="msg" class="mb-3 rounded-xl border border-lime-300/40 bg-lime-300/10 p-3 text-sm text-lime-200"></div>

 <section x-show="tab==='events'" x-cloak>
  <div class="mb-4 flex items-end justify-between"><div><h1 class="text-2xl font-black" x-text="tr('selectEvent')"></h1><p class="text-sm text-slate-400" x-text="tr('eventHint')"></p></div><button @click="loadAll()" class="chs btn bg-white/5 text-xs">REFRESH</button></div>
  <div class="grid gap-4 md:grid-cols-3"><template x-for="e in events" :key="e.id"><article class="ch card p-4" :class="eventId===e.id?'ring-2 ring-lime-300':''"><div class="haz mb-3 h-2"></div><div class="flex justify-between"><span class="rounded-full px-2 py-1 text-[10px] font-black" :class="e.status==='live'?'bg-lime-300 text-black':e.status==='completed'?'bg-slate-600':'bg-orange-400 text-black'" x-text="e.status"></span><span class="text-xs text-slate-400" x-text="tr('round')+' '+(e.current_round||0)+' · '+modeName(e.event_mode)"></span></div><h2 class="mt-3 text-xl font-black" x-text="name(e)"></h2><p class="mt-1 text-sm text-slate-300" x-text="(e.event_time||'-')+' · '+(e.venue||'-')"></p><p class="text-xs text-slate-400" x-text="e.courts_count+' '+tr('courts')"></p><div class="mt-4 grid grid-cols-2 gap-2"><button @click="pickEvent(e.id);tab='player'" class="chs bg-lime-300 px-3 py-3 text-xs font-black text-black" x-text="tr('joinEvent')"></button><button @click="pickEvent(e.id);tab='stats'" class="chs btn bg-white/5 text-xs" x-text="tr('results')"></button></div></article></template></div>
 </section>

 <section x-show="tab==='player'" x-cloak>
  <div class="grid gap-4 lg:grid-cols-[1fr_.9fr]"><div class="ch card p-4"><div class="haz mb-3 h-2"></div><h2 class="text-2xl font-black" x-text="tr('joinTitle')"></h2><p class="text-sm text-lime-300" x-text="event?name(event):tr('pickEventFirst')"></p><div class="mt-4 grid gap-3 sm:grid-cols-2"><input x-model="join.nick" class="rounded-lg border px-3 py-3" :placeholder="tr('nickname')"><select x-model.number="join.level" class="rounded-lg border px-3 py-3"><template x-for="l in levels"><option :value="l.v" x-text="l.v.toFixed(1)+' · '+levelLabel(l)"></option></template></select></div><div class="mt-3 rounded-xl border border-orange-300/25 bg-orange-950/20 p-3"><div class="flex items-center justify-between gap-2"><div><b class="text-orange-200" x-text="tr('notSure')"></b><p class="text-sm text-slate-400" x-text="tr('assessmentDesc')"></p></div><button @click="assess=!assess" class="chs bg-orange-400 px-3 py-2 text-xs font-black text-black" x-text="assess?tr('hide'):tr('assess')"></button></div></div><div x-show="assess" class="mt-3 grid gap-2"><template x-for="(q,i) in questions"><div class="rounded-xl border border-white/10 bg-black/20 p-3"><div class="mb-2 text-sm font-bold" x-text="(i+1)+'. '+q[lang]"></div><select x-model.number="ans[i]" class="w-full rounded-lg border px-3 py-2"><option value="0">-</option><option value="1">1 Newbie</option><option value="2">2 Beginner</option><option value="3">3 Social</option><option value="4">4 Strong</option><option value="5">5 Advanced</option></select></div></template><div class="rounded-xl border border-lime-300/30 bg-lime-950/10 p-3 text-sm">Estimate: <b x-text="estimate().toFixed(2)+' · '+levelName(estimate())"></b></div></div><button @click="savePlayer()" class="ch mt-4 w-full bg-lime-300 px-5 py-4 font-black text-black" x-text="tr('addReady')"></button></div><div class="ch card p-4"><h3 class="text-xl font-black" x-text="tr('liveQueue')"></h3><div class="mt-3 space-y-2"><template x-for="(p,i) in waiting()" :key="p.id"><div class="flex items-center justify-between rounded-xl border border-white/10 bg-black/20 p-3"><button @click="detail=p" class="text-left"><b x-text="(i+1)+'. '+p.nickname"></b><div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tr('played')+' '+p.matches_played"></div></button><span class="text-xs" :class="p.status==='ready'?'text-lime-300':'text-slate-400'" x-text="statusName(p.status)"></span></div></template></div></div></div>
 </section>

 <section x-show="tab==='organizer'" x-cloak><div class="space-y-4"><div class="ch card p-4"><div class="flex flex-wrap items-center justify-between gap-3"><div><h2 class="text-2xl font-black" x-text="tr('organizerOpen')"></h2><p class="text-sm text-slate-400" x-text="event?name(event):'-'"></p></div><button @click="loadAll()" class="chs btn bg-white/5 text-xs">REFRESH</button></div><div class="mt-4 grid grid-cols-2 gap-2 text-center text-xs font-black uppercase sm:grid-cols-6"><div class="chip"><span x-text="tr('round')"></span><br><b class="text-xl text-lime-300" x-text="event?.current_round||0"></b></div><div class="chip"><span x-text="tr('players')"></span><br><b class="text-xl" x-text="players.length"></b></div><div class="chip">Ready/Wait<br><b class="text-xl text-lime-300" x-text="waiting().length"></b></div><div class="chip"><span x-text="tr('playing')"></span><br><b class="text-xl text-orange-300" x-text="players.filter(p=>p.status==='playing').length"></b></div><div class="chip">Fairness<br><b class="text-xl" x-text="fairScore()+'%' "></b></div><button @click="previewNext(freeCourt(),nextRound())" class="chs bg-lime-300 p-3 text-black">PREVIEW</button></div><div class="mt-3 rounded-xl border border-lime-300/20 bg-lime-950/10 p-3 text-sm text-slate-300" x-text="tr('timerNote')"></div><div class="mt-4 grid gap-3 sm:grid-cols-4"><label class="text-xs text-slate-400"><span x-text="tr('courts')"></span><input x-model.number="settings.courts" @change="saveSettings" type="number" min="1" max="12" class="mt-1 w-full rounded-lg border px-3 py-3"></label><label class="text-xs text-slate-400">Mode<select x-model="settings.mode" @change="saveSettings" class="mt-1 w-full rounded-lg border px-3 py-3"><option value="social">Social</option><option value="beginner">Beginner Friendly</option><option value="competitive">Competitive</option><option value="manual">Manual Only</option></select></label><button @click="previewNext(freeCourt(),nextRound())" class="ch bg-lime-300 px-4 py-3 font-black text-black">PREVIEW NEXT</button><button @click="matchAllPreview()" class="ch bg-orange-400 px-4 py-3 font-black text-black">PREVIEW ALL</button></div></div>
 <template x-if="preview"><div class="ch card p-4 border-lime-300/40"><div class="flex flex-wrap justify-between gap-2"><div><h3 class="text-xl font-black text-lime-300">MATCH PREVIEW</h3><p class="mini" x-text="'Court '+preview.court+' · '+tr('round')+' '+preview.round+' · Balance '+preview.balance+'% · Repeat '+preview.repeat"></p></div><button @click="preview=null" class="rounded-lg bg-white/10 px-3 py-2 font-black">X</button></div><div class="mt-3 grid gap-3 md:grid-cols-2"><div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3"><b class="orange">TEAM A</b><template x-for="p in preview.A"><div class="mt-1 flex items-center justify-between"><span x-text="p.nickname+' · '+levelName(p.estimated_level)"></span><button @click="swapTarget=p;manualOpen=true" class="rounded bg-white/10 px-2 py-1 text-xs">SWAP</button></div></template></div><div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3"><b class="lime">TEAM B</b><template x-for="p in preview.B"><div class="mt-1 flex items-center justify-between"><span x-text="p.nickname+' · '+levelName(p.estimated_level)"></span><button @click="swapTarget=p;manualOpen=true" class="rounded bg-white/10 px-2 py-1 text-xs">SWAP</button></div></template></div></div><div class="mt-3 grid gap-2 sm:grid-cols-4"><button @click="confirmPreview()" class="chs bg-lime-300 px-4 py-3 text-sm font-black text-black">CONFIRM MATCH</button><button @click="previewNext(preview.court,preview.round)" class="chs btn bg-white/5 text-sm">REBALANCE</button><button @click="manualOpen=true" class="chs bg-orange-400 px-4 py-3 text-sm font-black text-black">MANUAL EDIT</button><button @click="preview=null" class="chs bg-red-500 px-4 py-3 text-sm font-black text-white">CANCEL</button></div><div x-show="manualOpen" class="mt-3 rounded-xl border border-white/10 bg-black/20 p-3"><p class="mini mb-2">Replace: <b x-text="swapTarget?.nickname||'-'"></b></p><div class="grid gap-2 sm:grid-cols-2"><template x-for="p in replacePool()"><button @click="replaceInPreview(p)" class="rounded-xl border border-white/10 bg-white/5 p-3 text-left text-sm"><b x-text="p.nickname"></b><div class="mini" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tr('played')+' '+p.matches_played"></div></button></template></div></div></div></template>
 <div class="grid gap-4 xl:grid-cols-[.85fr_1.15fr]"><aside class="space-y-4"><div class="ch card p-4"><h3 class="text-lg font-black" x-text="tr('createEvent')"></h3><div class="mt-3 grid gap-2"><input x-model="newEvent.name" class="rounded-lg border px-3 py-3" :placeholder="tr('eventName')"><input x-model="newEvent.time" class="rounded-lg border px-3 py-3" :placeholder="tr('eventTime')"><input x-model="newEvent.venue" class="rounded-lg border px-3 py-3" :placeholder="tr('venue')"><select x-model="newEvent.mode" class="rounded-lg border px-3 py-3"><option value="social">Social Open Play</option><option value="beginner">Beginner Friendly</option><option value="competitive">Fair Competitive</option><option value="manual">Manual Only</option></select><button @click="createEvent" class="chs bg-lime-300 px-4 py-3 text-sm font-black text-black">CREATE EVENT</button></div></div><div class="ch card p-4"><h3 class="text-lg font-black">Tools</h3><div class="mt-3 grid gap-2"><button @click="undoLast" class="chs bg-lime-300 px-4 py-3 text-sm font-black text-black">UNDO LAST RESULT</button><button @click="completeEvent" class="chs btn bg-white/5 text-sm">MARK COMPLETED</button><button @click="clearQueue" class="chs btn bg-white/5 text-sm">CLEAR QUEUE ONLY</button><button @click="resetStats" class="chs bg-orange-400 px-4 py-3 text-sm font-black text-black">RESET STATS</button><button @click="clearEvent" class="chs bg-orange-400 px-4 py-3 text-sm font-black text-black">CLEAR PLAYERS + MATCHES</button><button @click="deleteEvent" class="chs bg-red-500 px-4 py-3 text-sm font-black text-white">DELETE EVENT</button></div></div><div class="ch card p-4"><h3 class="text-lg font-black" x-text="tr('allPlayers')"></h3><div class="mt-3 space-y-2"><template x-for="p in sortedPlayers()" :key="p.id"><div class="rounded-xl border border-white/10 bg-black/20 p-3"><div class="flex justify-between gap-2"><button @click="detail=p" class="text-left"><b x-text="p.nickname"></b><div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tr('played')+' '+p.matches_played+' · R'+(p.last_played_round||'-')"></div></button><button @click="removePlayer(p)" class="rounded-lg bg-red-500 px-3 py-2 text-xs font-black" x-text="tr('remove')"></button></div><div class="mt-2 grid grid-cols-5 gap-2"><button @click="setStatus(p,'ready')" class="rounded-lg bg-lime-300 px-2 py-2 text-[10px] font-black text-black">READY</button><button @click="setStatus(p,'waiting')" class="rounded-lg bg-white/10 px-2 py-2 text-[10px] font-black">WAIT</button><button @click="setStatus(p,'not_ready')" class="rounded-lg bg-orange-400 px-2 py-2 text-[10px] font-black text-black">NO</button><button @click="setStatus(p,'paused')" class="rounded-lg bg-white/10 px-2 py-2 text-[10px] font-black">PAUSE</button><button @click="setStatus(p,'left')" class="rounded-lg bg-white/10 px-2 py-2 text-[10px] font-black">LEFT</button></div></div></template></div></div></aside><div class="space-y-4"><div class="grid gap-3 md:grid-cols-2"><template x-for="c in courts()"><div class="ch card p-4"><div class="mb-3 flex justify-between"><h3 class="text-xl font-black" x-text="'COURT '+c"></h3><span class="text-lime-300" x-text="courtMatch(c)?elapsed(courtMatch(c)):'READY'"></span></div><template x-if="courtMatch(c)"><div><div class="mb-2 text-xs text-slate-400" x-text="tr('gameTime')+': '+elapsed(courtMatch(c))+' · '+tr('round')+' '+(courtMatch(c).round_number||'-')"></div><div class="grid grid-cols-2 gap-3"><div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3"><div class="text-xs font-black text-orange-300">TEAM A</div><template x-for="p in team(courtMatch(c),'A')"><button @click="detail=p" class="block font-bold" x-text="p.nickname"></button></template></div><div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3"><div class="text-xs font-black text-lime-300">TEAM B</div><template x-for="p in team(courtMatch(c),'B')"><button @click="detail=p" class="block font-bold" x-text="p.nickname"></button></template></div></div><div class="mt-3 grid grid-cols-2 gap-2"><input type="number" x-model.number="score[courtMatch(c).id].a" class="rounded-lg border px-3 py-3 text-center text-xl font-black" placeholder="A"><input type="number" x-model.number="score[courtMatch(c).id].b" class="rounded-lg border px-3 py-3 text-center text-xl font-black" placeholder="B"></div><div class="mt-2 grid grid-cols-3 gap-2"><button @click="confirmScore(courtMatch(c))" class="chs bg-lime-300 px-3 py-3 text-xs font-black text-black">CONFIRM</button><button @click="editScore(courtMatch(c))" class="chs bg-orange-400 px-3 py-3 text-xs font-black text-black">EDIT</button><button @click="cancelMatch(courtMatch(c))" class="chs btn bg-white/5 text-xs">CANCEL</button></div></div></template></div></template></div><div class="ch card p-4"><h3 class="text-lg font-black text-orange-200">SPECIAL MATCH</h3><p class="text-sm text-slate-400" x-text="tr('specialDesc')"></p><button @click="special=!special" class="chs mt-3 bg-orange-400 px-4 py-3 text-sm font-black text-black">CREATE MANUAL</button><div x-show="special" class="mt-3 grid gap-2 sm:grid-cols-2"><template x-for="p in players.filter(x=>x.status!=='playing'&&x.status!=='left')"><label class="rounded-xl border border-white/10 bg-black/20 p-3"><input type="checkbox" :value="p.id" x-model="picked"> <span x-text="p.nickname+' · '+levelName(p.estimated_level)+' · '+statusName(p.status)"></span></label></template><button @click="createSpecial" class="chs bg-orange-400 px-4 py-3 text-sm font-black text-black sm:col-span-2">START SPECIAL</button></div></div></div></div></div></section>
 <section x-show="tab==='stats'" x-cloak><div class="grid gap-4 lg:grid-cols-[1fr_.8fr]"><div class="ch card p-4"><h2 class="text-2xl font-black" x-text="tr('eventRanking')"></h2><p class="mini mt-1" x-text="tr('rankingRule')"></p><div class="scroll"><table class="mt-3 w-full min-w-[760px] text-left text-sm"><thead class="text-xs text-slate-400"><tr><th>#</th><th x-text="tr('player')"></th><th>Score</th><th>W-L</th><th>Win%</th><th>Diff</th><th x-text="tr('played')"></th><th>Skill</th><th>ELO</th></tr></thead><tbody><template x-for="(p,i) in eventRanking()"><tr class="border-t border-white/10"><td class="py-3 font-black" x-text="i+1"></td><td><button @click="detail=p" class="font-bold" x-text="p.nickname"></button></td><td class="font-black text-lime-300" x-text="eventScore(p)"></td><td x-text="p.wins+'-'+p.losses"></td><td x-text="winRate(p)+'%'"></td><td x-text="pointDiff(p)"></td><td x-text="p.matches_played"></td><td x-text="levelName(p.estimated_level)"></td><td x-text="Math.round(p.elo)"></td></tr></template></tbody></table></div></div><div class="space-y-4"><div class="ch card p-4"><h2 class="text-xl font-black" x-text="tr('eventSummary')"></h2><div class="mt-3 grid grid-cols-2 gap-3"><template x-for="box in eventSummaryBoxes()"><div class="stat"><b class="text-xl" x-text="box.v"></b><div class="mini" x-text="box.k"></div></div></template></div><pre class="mt-3 whitespace-pre-wrap rounded-xl bg-black/30 p-3 text-sm text-slate-300" x-text="summary()"></pre><div class="mt-3 grid grid-cols-2 gap-2"><button @click="copySummary" class="chs bg-lime-300 px-4 py-3 text-sm font-black text-black">COPY</button><button @click="saveShareText" class="chs bg-orange-400 px-4 py-3 text-sm font-black text-black">SAVE SHARE</button></div></div></div></div></section>
</main><div x-show="detail" x-cloak class="fixed inset-0 z-50 bg-black/70 p-4 backdrop-blur" @click.self="detail=null"><div class="ch mx-auto mt-6 max-w-2xl card p-5"><div class="flex justify-between"><div><div class="text-[10px] tracking-[.25em] text-lime-300" x-text="tr('playerSummary')"></div><h2 class="text-3xl font-black" x-text="detail?.nickname"></h2><p class="text-lime-300" x-text="detail?levelName(detail.estimated_level):''"></p></div><button @click="detail=null" class="rounded-lg bg-white/10 px-3 py-2 font-black">X</button></div><template x-if="detail"><div><div class="mt-4 grid grid-cols-2 gap-3 sm:grid-cols-3"><template x-for="box in detailBoxes()"><div class="stat"><b x-text="box.v"></b><div class="mini" x-text="box.k"></div></div></template></div><div class="mt-4 rounded-xl border border-white/10 bg-black/20 p-4"><div class="mb-2 flex justify-between text-sm"><span>Win Rate</span><b x-text="winRate(detail)+'%'"></b></div><div class="bar"><i :style="'width:'+winRate(detail)+'%'"></i></div><p class="mt-3 text-sm text-slate-300" x-text="playerInsight(detail)"></p></div></div></template></div></div>
