<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PICKLEBALL SYSTEMS HUB - ALPHA 02</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tactical: '#1a1d20',
            panel: '#23272b',
            panel2: '#2b3035',
            cyberOrange: '#ff6a00',
            neonLime: '#b6ff00',
            steel: '#88929c'
          },
          boxShadow: {
            glowOrange: '0 0 24px rgba(255,106,0,.35)',
            glowLime: '0 0 24px rgba(182,255,0,.30)'
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #1a1d20;
      --panel: #23272b;
      --panel-2: #2b3035;
      --line: rgba(255,255,255,.12);
      --orange: #ff6a00;
      --lime: #b6ff00;
      --muted: #88929c;
    }
    html { background: var(--bg); }
    body {
      min-height: 100vh;
      color: #f5f7fa;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,106,0,.12), transparent 24rem),
        radial-gradient(circle at 85% 18%, rgba(182,255,0,.10), transparent 25rem),
        linear-gradient(135deg, #121416 0%, #1a1d20 45%, #202428 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    [x-cloak] { display: none !important; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .chamfer {
      clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
    }
    .chamfer-lg {
      clip-path: polygon(22px 0, 100% 0, 100% calc(100% - 22px), calc(100% - 22px) 100%, 0 100%, 0 22px);
    }
    .hazard {
      background-image: repeating-linear-gradient(135deg, rgba(255,255,255,.12) 0 8px, rgba(255,255,255,0) 8px 16px);
    }
    .scanlines::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,.025) 0 1px, transparent 1px 5px);
      mix-blend-mode: overlay;
      z-index: 1;
    }
    .grid-bg {
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .btn {
      clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
      transition: transform .15s ease, filter .15s ease, opacity .15s ease;
    }
    .btn:active { transform: scale(.985); }
    .poster-frame {
      min-height: 170px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,0)),
        repeating-linear-gradient(135deg, rgba(255,255,255,.08) 0 8px, rgba(255,255,255,0) 8px 18px),
        linear-gradient(135deg, #252b30, #121416);
    }
    .status-dot { width: .58rem; height: .58rem; border-radius: 999px; display: inline-block; }
    .power-bar {
      height: .68rem;
      background: rgba(255,255,255,.10);
      overflow: hidden;
      clip-path: polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
    }
    .power-fill {
      height: 100%;
      background-image: repeating-linear-gradient(135deg, rgba(255,255,255,.25) 0 6px, rgba(255,255,255,0) 6px 12px);
    }
    .table-head {
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,.11) 0 8px, transparent 8px 16px),
        rgba(255,255,255,.05);
    }
    .scrollbar-thin::-webkit-scrollbar { height: 6px; width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 999px; }
  </style>
</head>
<body class="scanlines" x-data="pickleballHub()" x-init="init()" :lang="lang">
  <div class="relative z-10 min-h-screen">
    <header class="sticky top-0 z-40 border-b border-white/10 bg-tactical/90 backdrop-blur-xl">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-4 py-3 md:px-6">
        <button @click="go('hub')" class="group flex min-w-0 items-center gap-3 text-left">
          <div class="chamfer flex h-11 w-11 shrink-0 items-center justify-center border border-cyberOrange/50 bg-cyberOrange/15 shadow-glowOrange">
            <span class="mono text-lg font-black text-cyberOrange">PB</span>
          </div>
          <div class="min-w-0">
            <h1 class="truncate text-sm font-black tracking-widest text-white md:text-lg">PICKLEBALL SYSTEMS HUB</h1>
            <p class="mono truncate text-[10px] uppercase tracking-[.28em] text-steel">ALPHA 02 · FAIR OPEN PLAY ENGINE</p>
          </div>
        </button>

        <div class="flex shrink-0 items-center gap-2">
          <button @click="toggleLang()" class="btn border border-white/15 bg-white/10 px-3 py-2 text-xs font-black tracking-widest hover:bg-white/15">
            <span x-text="lang === 'th' ? 'TH / EN' : 'EN / TH'"></span>
          </button>
          <button @click="go('queue')" class="btn hidden border border-neonLime/40 bg-neonLime/10 px-3 py-2 text-xs font-black text-neonLime md:block" x-show="activeEventId">
            <span x-text="t('fieldMode')"></span>
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-5 md:px-6 md:py-8">
      <section class="mb-5 grid gap-3 md:grid-cols-[1fr_auto] md:items-end">
        <div>
          <div class="mb-2 inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs text-steel">
            <span class="status-dot bg-neonLime shadow-glowLime"></span>
            <span x-text="t('freeLocal')"></span>
          </div>
          <h2 class="text-2xl font-black tracking-tight md:text-4xl" x-text="pageTitle()"></h2>
          <p class="mt-2 max-w-3xl text-sm leading-relaxed text-steel md:text-base" x-text="pageSubtitle()"></p>
        </div>

        <nav class="scrollbar-thin flex gap-2 overflow-x-auto pb-1 md:justify-end">
          <button @click="go('hub')" :class="navClass('hub')" class="btn shrink-0 px-4 py-3 text-xs font-black tracking-widest" x-text="t('navEvents')"></button>
          <button @click="go('onboarding')" :class="navClass('onboarding')" class="btn shrink-0 px-4 py-3 text-xs font-black tracking-widest" x-text="t('navPlayers')"></button>
          <button @click="go('queue')" :class="navClass('queue')" class="btn shrink-0 px-4 py-3 text-xs font-black tracking-widest" x-text="t('navCourt')"></button>
          <button @click="go('leaderboard')" :class="navClass('leaderboard')" class="btn shrink-0 px-4 py-3 text-xs font-black tracking-widest" x-text="t('navStats')"></button>
        </nav>
      </section>

      <section x-show="view === 'hub'" x-cloak>
        <div class="grid gap-4 md:grid-cols-3">
          <template x-for="event in events" :key="event.id">
            <article class="chamfer-lg overflow-hidden border border-white/10 bg-panel/90 shadow-2xl">
              <div class="poster-frame chamfer relative m-3 overflow-hidden border border-white/10 p-4" :class="event.status === 'live' ? 'shadow-glowLime' : ''">
                <div class="absolute inset-x-0 top-0 h-6 hazard opacity-60"></div>
                <div class="absolute bottom-3 right-3 text-right">
                  <div class="mono text-5xl font-black tracking-tighter" :class="event.accent === 'orange' ? 'text-cyberOrange' : 'text-neonLime'" x-text="event.code"></div>
                  <div class="mono text-[10px] uppercase tracking-[.35em] text-white/60">OPEN PLAY</div>
                </div>
                <div class="relative z-10 inline-flex items-center gap-2 border border-white/10 bg-black/30 px-3 py-1 text-xs font-black uppercase tracking-widest">
                  <span class="status-dot" :class="event.status === 'live' ? 'bg-neonLime' : event.status === 'upcoming' ? 'bg-cyberOrange' : 'bg-steel'"></span>
                  <span x-text="statusLabel(event.status)"></span>
                </div>
              </div>
              <div class="space-y-4 p-4 pt-1">
                <div>
                  <h3 class="text-xl font-black uppercase tracking-wide" x-text="event.title"></h3>
                  <p class="mt-2 text-sm text-steel" x-text="event.dateTime[lang]"></p>
                  <p class="text-sm text-steel" x-text="event.venue"></p>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center text-xs">
                  <div class="border border-white/10 bg-white/5 p-2">
                    <div class="mono text-lg font-black" x-text="countEventQueue(event.id)"></div>
                    <div class="text-steel" x-text="t('waiting')"></div>
                  </div>
                  <div class="border border-white/10 bg-white/5 p-2">
                    <div class="mono text-lg font-black" x-text="countEventMatches(event.id)"></div>
                    <div class="text-steel" x-text="t('matches')"></div>
                  </div>
                  <div class="border border-white/10 bg-white/5 p-2">
                    <div class="mono text-lg font-black" x-text="countEventPlayers(event.id)"></div>
                    <div class="text-steel" x-text="t('players')"></div>
                  </div>
                </div>
                <button @click="selectEvent(event.id)" class="btn w-full border border-neonLime/40 bg-neonLime/15 px-4 py-3 text-sm font-black uppercase tracking-widest text-neonLime hover:bg-neonLime/20">
                  <span x-text="t('joinEvent')"></span>
                </button>
              </div>
            </article>
          </template>
        </div>

        <div class="chamfer-lg mt-5 border border-white/10 bg-panel/70 p-4 md:p-6">
          <div class="mb-3 flex items-center justify-between gap-3">
            <h3 class="text-lg font-black uppercase tracking-widest" x-text="t('systemRulesTitle')"></h3>
            <div class="h-4 flex-1 hazard opacity-40"></div>
          </div>
          <div class="grid gap-3 text-sm text-steel md:grid-cols-4">
            <div class="border border-white/10 bg-white/5 p-3"><b class="text-white" x-text="t('rule1Head')"></b><br><span x-text="t('rule1')"></span></div>
            <div class="border border-white/10 bg-white/5 p-3"><b class="text-white" x-text="t('rule2Head')"></b><br><span x-text="t('rule2')"></span></div>
            <div class="border border-white/10 bg-white/5 p-3"><b class="text-white" x-text="t('rule3Head')"></b><br><span x-text="t('rule3')"></span></div>
            <div class="border border-white/10 bg-white/5 p-3"><b class="text-white" x-text="t('rule4Head')"></b><br><span x-text="t('rule4')"></span></div>
          </div>
        </div>
      </section>

      <section x-show="view === 'onboarding'" x-cloak>
        <div class="grid gap-5 lg:grid-cols-[420px_1fr]">
          <aside class="chamfer-lg border border-white/10 bg-panel/90 p-4 md:p-5">
            <div class="mb-4 flex items-center justify-between gap-3">
              <h3 class="font-black uppercase tracking-widest" x-text="t('registeredPlayers')"></h3>
              <button @click="seedDemoPlayers()" class="btn border border-white/10 bg-white/10 px-3 py-2 text-[10px] font-black uppercase tracking-widest hover:bg-white/15" x-text="t('loadDemo')"></button>
            </div>
            <div class="space-y-2" x-show="players.length">
              <template x-for="player in playersSortedByName()" :key="player.id">
                <button @click="editPlayer(player.id)" class="chamfer flex w-full items-center justify-between gap-3 border border-white/10 bg-white/5 p-3 text-left hover:border-neonLime/40 hover:bg-neonLime/5">
                  <div class="min-w-0">
                    <div class="truncate font-black" x-text="player.nickname"></div>
                    <div class="text-xs text-steel"><span x-text="levelName(player)"></span> · <span class="mono" x-text="player.rating"></span> ELO</div>
                  </div>
                  <div class="mono text-xs font-black text-neonLime" x-text="formatPower(player)"></div>
                </button>
              </template>
            </div>
            <div x-show="!players.length" class="border border-dashed border-white/15 p-5 text-center text-sm text-steel" x-text="t('noPlayersYet')"></div>
          </aside>

          <div class="chamfer-lg border border-white/10 bg-panel/90 p-4 md:p-5">
            <div class="mb-5 grid gap-3 md:grid-cols-[1fr_auto] md:items-center">
              <div>
                <h3 class="text-xl font-black uppercase tracking-widest" x-text="editingProfileId ? t('retestPlayer') : t('newPlayerSetup')"></h3>
                <p class="mt-1 text-sm text-steel" x-text="t('onboardingHint')"></p>
              </div>
              <button @click="resetForm()" class="btn border border-cyberOrange/40 bg-cyberOrange/10 px-4 py-3 text-xs font-black uppercase tracking-widest text-cyberOrange" x-text="t('clearForm')"></button>
            </div>

            <div class="grid gap-3 md:grid-cols-2">
              <label class="block">
                <span class="mb-1 block text-xs font-black uppercase tracking-widest text-steel" x-text="t('nickname')"></span>
                <input x-model.trim="form.nickname" class="chamfer w-full border border-white/10 bg-black/25 px-4 py-3 font-bold outline-none focus:border-neonLime/50" :placeholder="t('nicknamePlaceholder')" />
              </label>
              <label class="block">
                <span class="mb-1 block text-xs font-black uppercase tracking-widest text-steel" x-text="t('selfRating')"></span>
                <select x-model.number="form.selfRating" class="chamfer w-full border border-white/10 bg-black/25 px-4 py-3 font-bold outline-none focus:border-neonLime/50">
                  <option value="2">2.0 · Beginner / New Player</option>
                  <option value="2.5">2.5 · Social Beginner</option>
                  <option value="3">3.0 · Social Player</option>
                  <option value="3.5">3.5 · Strong Social</option>
                  <option value="4">4.0 · Advanced Club</option>
                </select>
              </label>
            </div>

            <div class="mt-5 grid gap-3">
              <template x-for="(q, index) in questions" :key="q.id">
                <div class="chamfer border border-white/10 bg-white/5 p-3 md:p-4">
                  <div class="mb-3 flex items-start gap-3">
                    <div class="chamfer flex h-9 w-11 shrink-0 items-center justify-center border text-sm font-black" :class="index < 5 ? 'border-cyberOrange/50 bg-cyberOrange/10 text-cyberOrange' : 'border-neonLime/50 bg-neonLime/10 text-neonLime'" x-text="String(index + 1).padStart(2,'0')"></div>
                    <div>
                      <div class="text-[10px] font-black uppercase tracking-widest" :class="index < 5 ? 'text-cyberOrange' : 'text-neonLime'" x-text="index < 5 ? 'TECHNICAL AXIS' : 'TACTICAL / PHYSICAL AXIS'"></div>
                      <p class="font-bold" x-text="q.text[lang]"></p>
                    </div>
                  </div>
                  <div class="grid gap-2 md:grid-cols-2">
                    <template x-for="option in q.options" :key="option.value">
                      <label class="chamfer cursor-pointer border p-3 text-sm transition" :class="form.answers[q.id] === option.value ? 'border-neonLime/60 bg-neonLime/10 text-white' : 'border-white/10 bg-black/15 text-steel hover:border-white/25'">
                        <input type="radio" class="sr-only" :name="q.id" :value="option.value" x-model.number="form.answers[q.id]" />
                        <span class="mono mr-2 font-black" x-text="option.value"></span>
                        <span x-text="option.label[lang]"></span>
                      </label>
                    </template>
                  </div>
                </div>
              </template>
            </div>

            <div class="mt-5 grid gap-3 md:grid-cols-[1fr_auto] md:items-center">
              <div class="grid gap-3 md:grid-cols-3">
                <div class="border border-white/10 bg-black/20 p-3">
                  <div class="text-xs text-steel" x-text="t('techScore')"></div>
                  <div class="mono text-2xl font-black text-cyberOrange" x-text="previewScore('tech')"></div>
                </div>
                <div class="border border-white/10 bg-black/20 p-3">
                  <div class="text-xs text-steel" x-text="t('tactScore')"></div>
                  <div class="mono text-2xl font-black text-neonLime" x-text="previewScore('tact')"></div>
                </div>
                <div class="border border-white/10 bg-black/20 p-3">
                  <div class="text-xs text-steel" x-text="t('initialElo')"></div>
                  <div class="mono text-2xl font-black" x-text="previewElo()"></div>
                </div>
              </div>
              <button @click="savePlayerProfile()" class="btn border border-neonLime/50 bg-neonLime/15 px-6 py-4 text-sm font-black uppercase tracking-widest text-neonLime shadow-glowLime hover:bg-neonLime/20" x-text="editingProfileId ? t('saveRetest') : t('createProfile')"></button>
            </div>
          </div>
        </div>
      </section>

      <section x-show="view === 'queue'" x-cloak>
        <div x-show="!activeEventId" class="chamfer-lg border border-cyberOrange/40 bg-cyberOrange/10 p-5 text-cyberOrange">
          <b x-text="t('selectEventFirst')"></b>
        </div>

        <div x-show="activeEventId" class="grid gap-5 xl:grid-cols-[400px_1fr]">
          <aside class="space-y-5">
            <div class="chamfer-lg border border-white/10 bg-panel/90 p-4 md:p-5">
              <div class="mb-4 flex items-start justify-between gap-3">
                <div>
                  <h3 class="text-xl font-black uppercase tracking-widest" x-text="activeEvent()?.title"></h3>
                  <p class="text-sm text-steel" x-text="activeEvent()?.dateTime[lang]"></p>
                  <p class="text-sm text-steel" x-text="activeEvent()?.venue"></p>
                </div>
                <span class="chamfer border px-3 py-1 text-xs font-black uppercase tracking-widest" :class="activeEvent()?.status === 'live' ? 'border-neonLime/40 bg-neonLime/10 text-neonLime' : 'border-cyberOrange/40 bg-cyberOrange/10 text-cyberOrange'" x-text="statusLabel(activeEvent()?.status)"></span>
              </div>

              <div class="grid grid-cols-3 gap-2 text-center">
                <div class="border border-white/10 bg-black/20 p-3">
                  <div class="mono text-2xl font-black" x-text="eventQueues().filter(q => q.status === 'waiting').length"></div>
                  <div class="text-xs text-steel" x-text="t('waiting')"></div>
                </div>
                <div class="border border-white/10 bg-black/20 p-3">
                  <div class="mono text-2xl font-black" x-text="activeMatches().length"></div>
                  <div class="text-xs text-steel" x-text="t('liveGames')"></div>
                </div>
                <div class="border border-white/10 bg-black/20 p-3">
                  <div class="mono text-2xl font-black" x-text="confirmedMatches().length"></div>
                  <div class="text-xs text-steel" x-text="t('confirmed')"></div>
                </div>
              </div>
            </div>

            <div class="chamfer-lg border border-white/10 bg-panel/90 p-4 md:p-5">
              <h3 class="mb-3 font-black uppercase tracking-widest" x-text="t('selfService')"></h3>
              <label class="block">
                <span class="mb-1 block text-xs font-black uppercase tracking-widest text-steel" x-text="t('choosePlayer')"></span>
                <select x-model="selectedPlayerId" class="chamfer w-full border border-white/10 bg-black/25 px-4 py-3 font-bold outline-none focus:border-neonLime/50">
                  <option value="" x-text="t('selectPlayer')"></option>
                  <template x-for="player in playersSortedByName()" :key="player.id">
                    <option :value="player.id" x-text="player.nickname + ' · ' + levelName(player) + ' · ' + player.rating + ' ELO'"></option>
                  </template>
                </select>
              </label>
              <div class="mt-3 grid grid-cols-2 gap-2">
                <button @click="joinQueue()" class="btn border border-neonLime/50 bg-neonLime/15 px-4 py-3 text-xs font-black uppercase tracking-widest text-neonLime" x-text="t('joinQueue')"></button>
                <button @click="pauseQueue()" class="btn border border-cyberOrange/50 bg-cyberOrange/15 px-4 py-3 text-xs font-black uppercase tracking-widest text-cyberOrange" x-text="t('pause')"></button>
              </div>
              <button @click="go('onboarding')" class="btn mt-2 w-full border border-white/10 bg-white/10 px-4 py-3 text-xs font-black uppercase tracking-widest hover:bg-white/15" x-text="t('addNewPlayer')"></button>
            </div>

            <div class="chamfer-lg border border-white/10 bg-panel/90 p-4 md:p-5">
              <div class="mb-3 flex items-center justify-between gap-3">
                <h3 class="font-black uppercase tracking-widest" x-text="t('waitingList')"></h3>
                <button @click="matchNextGame()" class="btn border border-neonLime/50 bg-neonLime/15 px-4 py-3 text-[11px] font-black uppercase tracking-widest text-neonLime shadow-glowLime" x-text="t('matchNext')"></button>
              </div>
              <div class="space-y-2">
                <template x-for="(entry, index) in eventQueues()" :key="entry.playerId">
                  <div class="chamfer flex items-center justify-between gap-2 border border-white/10 p-3" :class="entry.status === 'waiting' ? 'bg-white/5' : 'bg-cyberOrange/5 opacity-70'">
                    <div class="flex min-w-0 items-center gap-3">
                      <div class="mono flex h-9 w-9 shrink-0 items-center justify-center border border-white/10 bg-black/20 font-black" x-text="index + 1"></div>
                      <div class="min-w-0">
                        <div class="truncate font-black" x-text="getPlayer(entry.playerId)?.nickname || 'Unknown'"></div>
                        <div class="text-xs text-steel"><span x-text="levelName(getPlayer(entry.playerId))"></span> · <span class="mono" x-text="getPlayer(entry.playerId)?.rating || '-' "></span> ELO</div>
                      </div>
                    </div>
                    <div class="flex items-center gap-2">
                      <span class="chamfer border px-2 py-1 text-[10px] font-black uppercase tracking-widest" :class="entry.status === 'waiting' ? 'border-neonLime/40 text-neonLime' : 'border-cyberOrange/40 text-cyberOrange'" x-text="entry.status"></span>
                      <button @click="removeFromQueue(entry.playerId)" class="text-xs font-black text-steel hover:text-white">✕</button>
                    </div>
                  </div>
                </template>
                <div x-show="!eventQueues().length" class="border border-dashed border-white/15 p-5 text-center text-sm text-steel" x-text="t('emptyQueue')"></div>
              </div>
            </div>
          </aside>

          <div class="space-y-5">
            <div class="chamfer-lg border border-white/10 bg-panel/90 p-4 md:p-5">
              <div class="mb-4 flex items-center justify-between gap-3">
                <h3 class="text-lg font-black uppercase tracking-widest" x-text="t('currentMatches')"></h3>
                <div class="h-4 flex-1 hazard opacity-40"></div>
              </div>

              <div class="grid gap-4">

        init() {
          const saved = localStorage.getItem(this.storageKey);
          if (saved) {
            try {
              const data = JSON.parse(saved);
              this.lang = data.lang || 'th';
              this.view = data.view || 'hub';
              this.activeEventId = data.activeEventId || null;
              this.players = Array.isArray(data.players) ? data.players : [];
              this.queues = data.queues || {};
              this.matches = data.matches || {};
              this.selectedPlayerId = data.selectedPlayerId || '';
              this.selectedStatsPlayerId = data.selectedStatsPlayerId || '';
            } catch (err) {
              console.warn('Failed to load saved data', err);
            }
          }
          this.events.forEach(event => {
            if (!this.queues[event.id]) this.queues[event.id] = [];
            if (!this.matches[event.id]) this.matches[event.id] = [];
          });
          if (!this.selectedStatsPlayerId && this.players[0]) this.selectedStatsPlayerId = this.players[0].id;
          this.persist();
        },

        persist() {
          localStorage.setItem(this.storageKey, JSON.stringify({
            lang: this.lang,
            view: this.view,
            activeEventId: this.activeEventId,
            selectedPlayerId: this.selectedPlayerId,
            selectedStatsPlayerId: this.selectedStatsPlayerId,
            players: this.players,
            queues: this.queues,
            matches: this.matches
          }));
        },

        t(key) { return (this.dict[this.lang] && this.dict[this.lang][key]) || key; },
        toggleLang() { this.lang = this.lang === 'th' ? 'en' : 'th'; this.persist(); },
        go(view) { this.view = view; this.persist(); },
        pageTitle() { return this.t(this.view === 'hub' ? 'hubTitle' : this.view === 'onboarding' ? 'onboardingTitle' : this.view === 'queue' ? 'queueTitle' : 'statsTitle'); },
        pageSubtitle() { return this.t(this.view === 'hub' ? 'hubSub' : this.view === 'onboarding' ? 'onboardingSub' : this.view === 'queue' ? 'queueSub' : 'statsSub'); },
        navClass(view) { return this.view === view ? 'border border-neonLime/50 bg-neonLime/15 text-neonLime shadow-glowLime' : 'border border-white/10 bg-white/5 text-steel hover:bg-white/10 hover:text-white'; },
        statusLabel(status) { return this.t(status || 'upcoming'); },

        activeEvent() { return this.events.find(e => e.id === this.activeEventId); },
        selectEvent(eventId) { this.activeEventId = eventId; this.view = 'queue'; this.persist(); },
        eventQueues() { if (!this.activeEventId) return []; return this.queues[this.activeEventId] || []; },
        eventMatches() { if (!this.activeEventId) return []; return this.matches[this.activeEventId] || []; },
        activeMatches() { return this.eventMatches().filter(m => m.status === 'active' || m.status === 'pending'); },
        confirmedMatches() { return this.eventMatches().filter(m => m.status === 'confirmed'); },
        countEventQueue(eventId) { return (this.queues[eventId] || []).filter(q => q.status === 'waiting').length; },
        countEventMatches(eventId) { return (this.matches[eventId] || []).filter(m => m.status === 'confirmed').length; },
        countEventPlayers(eventId) {
          const ids = new Set();
          (this.queues[eventId] || []).forEach(q => ids.add(q.playerId));
          (this.matches[eventId] || []).forEach(m => [...m.teamA, ...m.teamB].forEach(id => ids.add(id)));
          return ids.size;
        },

        playersSortedByName() { return this.players.slice().sort((a, b) => a.nickname.localeCompare(b.nickname)); },
        leaderboard() { return this.players.slice().sort((a, b) => b.rating - a.rating || a.nickname.localeCompare(b.nickname)); },
        getPlayer(id) { return this.players.find(p => p.id === id); },
        statsPlayer() { return this.getPlayer(this.selectedStatsPlayerId) || this.leaderboard()[0]; },
        scorePercent(score) { return Math.max(0, Math.min(100, (Number(score || 0) / 4) * 100)); },
        formatPower(player) { if (!player) return '-'; return (Number(player.tech || 0) + Number(player.tact || 0)).toFixed(1); },
        levelName(player) {
          if (!player) return '-';
          const r = Number(player.rating || 0);
          if (r < 1100) return 'New Player';
          if (r < 1300) return 'Social Player';
          if (r < 1500) return 'Rally Player';
          if (r < 1700) return 'Strong Player';
          return 'Advanced Player';
        },
        winRate(player) { if (!player || !player.matches) return 0; return Math.round((player.wins / player.matches) * 100); },
        avgFor(player) { if (!player || !player.matches) return '0.0'; return (player.pointsFor / player.matches).toFixed(1); },
        avgAgainst(player) { if (!player || !player.matches) return '0.0'; return (player.pointsAgainst / player.matches).toFixed(1); },
        formBadges(player, large = false) {
          const form = player && player.form && player.form.length ? player.form.slice(0, 5) : [];
          if (!form.length) return '<span class="text-steel">-</span>';
          return form.map(r => {
            const cls = r === 'W' ? 'border-neonLime/40 bg-neonLime/15 text-neonLime' : 'border-cyberOrange/40 bg-cyberOrange/15 text-cyberOrange';
            return `<span class="chamfer inline-flex ${large ? 'h-11 w-11 text-base' : 'h-7 w-7 text-xs'} items-center justify-center border ${cls} mono font-black">${r}</span>`;
          }).join(' ');
        },

        resetForm() {
          this.editingProfileId = null;
          this.form = { nickname: '', selfRating: 3, answers: {} };
        },
        editPlayer(playerId) {
          const p = this.getPlayer(playerId);
          if (!p) return;
          this.editingProfileId = p.id;
          this.form.nickname = p.nickname;
          this.form.selfRating = p.selfRating || 3;
          this.form.answers = { ...(p.answers || {}) };
        },
        answeredCount() { return Object.keys(this.form.answers).filter(k => this.form.answers[k]).length; },
        axisAverage(axis) {
          const qs = this.questions.filter(q => q.axis === axis);
          const values = qs.map(q => Number(this.form.answers[q.id] || 0)).filter(Boolean);
          if (!values.length) return 0;
          return values.reduce((sum, value) => sum + value, 0) / qs.length;
        },
        previewScore(axis) {
          const value = this.axisAverage(axis);
          return value ? value.toFixed(2) : '-';
        },
        calculateInitialElo(tech, tact, selfRating) {
          const combined = (Number(selfRating) * 0.4) + (Number(tech) * 0.3) + (Number(tact) * 0.3);
          return Math.round(650 + combined * 275);
        },
        previewElo() {
          const tech = this.axisAverage('tech');
          const tact = this.axisAverage('tact');
          if (!tech || !tact) return '-';
          return this.calculateInitialElo(tech, tact, this.form.selfRating);
        },
        savePlayerProfile() {
          if (!this.form.nickname) { alert(this.t('alertNeedName')); return; }
          if (this.answeredCount() < this.questions.length) { alert(this.t('alertNeedAnswers')); return; }
          const tech = Number(this.axisAverage('tech').toFixed(2));
          const tact = Number(this.axisAverage('tact').toFixed(2));
          const initialElo = this.calculateInitialElo(tech, tact, this.form.selfRating);
          if (this.editingProfileId) {
            const p = this.getPlayer(this.editingProfileId);
            if (p) {
              p.nickname = this.form.nickname;
              p.selfRating = Number(this.form.selfRating);
              p.tech = tech;
              p.tact = tact;
              p.answers = { ...this.form.answers };
              if (!p.matches) p.rating = initialElo;
            }
          } else {
            const id = 'p-' + Date.now() + '-' + Math.random().toString(16).slice(2);
            this.players.push({
              id,
              nickname: this.form.nickname,
              selfRating: Number(this.form.selfRating),
              tech,
              tact,
              answers: { ...this.form.answers },
              rating: initialElo,
              matches: 0,
              wins: 0,
              losses: 0,
              pointsFor: 0,
              pointsAgainst: 0,
              form: []
            });
            this.selectedPlayerId = id;
            this.selectedStatsPlayerId = id;
          }
          this.persist();
          alert(this.t('alertSaved'));
          this.resetForm();
        },

        queueEntry(playerId) { return this.eventQueues().find(q => q.playerId === playerId); },
        joinQueue() {
          if (!this.activeEventId) { alert(this.t('selectEventFirst')); return; }
          if (!this.selectedPlayerId) { alert(this.t('alertSelectPlayer')); return; }
          const existing = this.queueEntry(this.selectedPlayerId);
          if (existing) {
            existing.status = 'waiting';
            existing.joinedAt = existing.joinedAt || Date.now();
          } else {
            this.queues[this.activeEventId].push({ playerId: this.selectedPlayerId, status: 'waiting', joinedAt: Date.now() });
          }
          this.persist();
        },
        pauseQueue() {
          if (!this.selectedPlayerId) { alert(this.t('alertSelectPlayer')); return; }
          const existing = this.queueEntry(this.selectedPlayerId);
          if (existing) existing.status = 'paused';
          this.persist();
        },
        removeFromQueue(playerId) {
          this.queues[this.activeEventId] = this.eventQueues().filter(q => q.playerId !== playerId);
          this.persist();
        },

        matchNextGame() {
          const waiting = this.eventQueues().filter(q => q.status === 'waiting' && this.getPlayer(q.playerId));
          if (waiting.length < 4) { alert(this.t('alertNeedFour')); return; }
          const selectedEntries = this.pickBestFour(waiting);
          const selectedPlayers = selectedEntries.map(e => this.getPlayer(e.playerId));
          const teams = this.balanceTeams(selectedPlayers);
          selectedEntries.forEach(e => this.removeFromQueue(e.playerId));
          const match = {
            id: 'm-' + Date.now() + '-' + Math.random().toString(16).slice(2),
            eventId: this.activeEventId,
            teamA: teams.teamA,
            teamB: teams.teamB,
            status: 'active',
            scoreA: null,
            scoreB: null,
            submittedBy: null,
            createdAt: Date.now(),
            confirmedAt: null,
            deltaA: 0
          };
          this.matches[this.activeEventId].push(match);
          this.persist();
        },
        pickBestFour(waiting) {
          const ordered = waiting.slice().sort((a, b) => a.joinedAt - b.joinedAt);
          const pool = ordered.slice(0, Math.min(ordered.length, 12));
          const combos = [];
          for (let a = 0; a < pool.length - 3; a++) {
            for (let b = a + 1; b < pool.length - 2; b++) {
              for (let c = b + 1; c < pool.length - 1; c++) {
                for (let d = c + 1; d < pool.length; d++) {
                  combos.push([pool[a], pool[b], pool[c], pool[d]]);
                }
              }
            }
          }
          const now = Date.now();
          let best = combos[0];
          let bestScore = Infinity;
          combos.forEach(combo => {
            const ratings = combo.map(e => this.getPlayer(e.playerId).rating);
            const spread = Math.max(...ratings) - Math.min(...ratings);
            const avgIndex = combo.reduce((sum, e) => sum + ordered.findIndex(x => x.playerId === e.playerId), 0) / 4;
            const avgWaitMinutes = combo.reduce((sum, e) => sum + ((now - e.joinedAt) / 60000), 0) / 4;
            const earliestPenalty = combo.some(e => e.playerId === ordered[0].playerId) ? 0 : 120;
            const score = spread + avgIndex * 35 + earliestPenalty - avgWaitMinutes * 5;
            if (score < bestScore) { bestScore = score; best = combo; }
          });
          return best;
        },
        balanceTeams(players) {
          const options = [
            [[players[0], players[1]], [players[2], players[3]]],
            [[players[0], players[2]], [players[1], players[3]]],
            [[players[0], players[3]], [players[1], players[2]]]
          ];
          let best = options[0];
          let bestScore = Infinity;
          options.forEach(option => {
            const powerA = option[0].reduce((s, p) => s + p.tech + p.tact, 0);
            const powerB = option[1].reduce((s, p) => s + p.tech + p.tact, 0);
            const eloA = option[0].reduce((s, p) => s + p.rating, 0);
            const eloB = option[1].reduce((s, p) => s + p.rating, 0);
            const score = Math.abs(powerA - powerB) * 100 + Math.abs(eloA - eloB) / 10;
            if (score < bestScore) { bestScore = score; best = option; }
          });
          return { teamA: best[0].map(p => p.id), teamB: best[1].map(p => p.id) };
        },
        teamPower(teamIds) {
          const total = teamIds.reduce((sum, id) => {
            const p = this.getPlayer(id);
            return sum + (p ? p.tech + p.tact : 0);
          }, 0);
          return total.toFixed(1);
        },
        teamNames(teamIds) { return teamIds.map(id => this.getPlayer(id)?.nickname || 'Unknown').join(' + '); },

        getMatch(matchId) { return this.eventMatches().find(m => m.id === matchId); },
        submitScore(matchId, side) {
          const match = this.getMatch(matchId);
          if (!match) return;
          const a = Number(match.scoreA);
          const b = Number(match.scoreB);
          if (!Number.isFinite(a) || !Number.isFinite(b) || a < 0 || b < 0 || a === b) {
            alert(this.t('alertBadScore'));
            return;
          }
          match.scoreA = Math.round(a);
          match.scoreB = Math.round(b);
          match.submittedBy = side;
          match.status = 'pending';
          this.persist();
          alert(this.t('alertSubmitted'));
        },
        cancelScore(matchId) {
          const match = this.getMatch(matchId);
          if (!match) return;
          match.status = 'active';
          match.submittedBy = null;
          this.persist();
        },
        confirmScore(matchId) {
          const match = this.getMatch(matchId);
          if (!match || match.status !== 'pending') return;
          const deltaA = this.calculateAndApplyElo(match);
          match.deltaA = deltaA;
          match.status = 'confirmed';
          match.confirmedAt = Date.now();
          [...match.teamA, ...match.teamB].forEach(pid => {
            if (!this.queueEntry(pid)) this.queues[this.activeEventId].push({ playerId: pid, status: 'waiting', joinedAt: Date.now() });
          });
          this.persist();
          alert(this.t('alertConfirmed'));
        },
        teamRating(teamIds) {
          return teamIds.reduce((sum, id) => sum + (this.getPlayer(id)?.rating || 1200), 0) / teamIds.length;
        },
        calculateAndApplyElo(match) {
          const ratingA = this.teamRating(match.teamA);
          const ratingB = this.teamRating(match.teamB);
          const expectedA = 1 / (1 + Math.pow(10, (ratingB - ratingA) / 400));
          const actualA = match.scoreA > match.scoreB ? 1 : 0;
          const margin = Math.abs(match.scoreA - match.scoreB);
          const ratingDiff = Math.abs(ratingA - ratingB);
          const movMultiplier = Math.log(margin + 1) * (2.2 / ((ratingDiff * 0.001) + 2.2));
          const k = 28;
          let deltaA = Math.round(k * movMultiplier * (actualA - expectedA));
          if (actualA === 1 && deltaA < 1) deltaA = 1;
          if (actualA === 0 && deltaA > -1) deltaA = -1;
          const deltaB = -deltaA;
          const aWin = actualA === 1;
          match.teamA.forEach(pid => this.applyPlayerResult(pid, deltaA, aWin, match.scoreA, match.scoreB));
          match.teamB.forEach(pid => this.applyPlayerResult(pid, deltaB, !aWin, match.scoreB, match.scoreA));
          return deltaA;
        },
        applyPlayerResult(playerId, delta, won, pointsFor, pointsAgainst) {
          const p = this.getPlayer(playerId);
          if (!p) return;
          p.rating = Math.max(500, Math.round((p.rating || 1200) + delta));
          p.matches = (p.matches || 0) + 1;
          p.wins = (p.wins || 0) + (won ? 1 : 0);
          p.losses = (p.losses || 0) + (won ? 0 : 1);
          p.pointsFor = (p.pointsFor || 0) + Number(pointsFor || 0);
          p.pointsAgainst = (p.pointsAgainst || 0) + Number(pointsAgainst || 0);
          p.form = [won ? 'W' : 'L', ...(p.form || [])].slice(0, 5);
        },

        formatDateTime(ts) {
          if (!ts) return '-';
          return new Intl.DateTimeFormat(this.lang === 'th' ? 'th-TH' : 'en-US', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' }).format(new Date(ts));
        },
        shortId(id) { return String(id).slice(-6).toUpperCase(); },

        seedDemoPlayers() {
          if (this.players.length && !confirm(this.lang === 'th' ? 'เพิ่มผู้เล่นตัวอย่างเข้าไปในข้อมูลปัจจุบัน?' : 'Add demo players to current data?')) return;
          const demos = [
            ['Don', 3.5, 3.4, 3.2], ['Golf', 3, 3.0, 3.1], ['Ice', 2.5, 2.5, 2.6], ['Nan', 2, 2.1, 2.2],
            ['Mike', 4, 3.8, 3.7], ['Fern', 3, 3.1, 2.9], ['Aom', 2.5, 2.7, 2.4], ['Benz', 3.5, 3.6, 3.4]
          ];
          demos.forEach(([name, self, tech, tact]) => {
            const id = 'p-' + Date.now() + '-' + Math.random().toString(16).slice(2);
            this.players.push({
              id,
              nickname: name,
              selfRating: self,
              tech,
              tact,
              answers: {},
              rating: this.calculateInitialElo(tech, tact, self),
              matches: 0,
              wins: 0,
              losses: 0,
              pointsFor: 0,
              pointsAgainst: 0,
              form: []
            });
          });
          if (!this.selectedPlayerId && this.players[0]) this.selectedPlayerId = this.players[0].id;
          if (!this.selectedStatsPlayerId && this.players[0]) this.selectedStatsPlayerId = this.players[0].id;
          this.persist();
          alert(this.t('alertDemoLoaded'));
        },
        exportData() {
          const payload = JSON.stringify({ events: this.events, players: this.players, queues: this.queues, matches: this.matches }, null, 2);
          navigator.clipboard?.writeText(payload).then(() => alert(this.t('alertExport'))).catch(() => {
            const blob = new Blob([payload], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pickleball-systems-hub-alpha02-data.json';
            a.click();
            URL.revokeObjectURL(url);
          });
        },
        resetAllData() {
          if (!confirm(this.t('alertReset'))) return;
          localStorage.removeItem(this.storageKey);
          this.players = [];
          this.queues = {};
          this.matches = {};
          this.activeEventId = null;
          this.selectedPlayerId = '';
          this.selectedStatsPlayerId = '';
          this.view = 'hub';
          this.events.forEach(event => { this.queues[event.id] = []; this.matches[event.id] = []; });
          this.resetForm();
          this.persist();
        }
      }
    }
  </script>
