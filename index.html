<!doctype html>
<html lang="th" x-data="app()" x-init="init()">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GDSQ Open Play Stable</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#11161b;color:white;font-family:system-ui,'Noto Sans Thai',sans-serif}.cut{clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}.card{background:#222931;border:1px solid #3a424a}.soft{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.10);border-radius:16px}.lime{color:#c7ff2e}.bg-lime{background:#c7ff2e;color:#111}.btn{border:1px solid rgba(255,255,255,.12);font-weight:900}.chip{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;text-align:center}input,select{background:#10151b!important;color:white!important;border-color:#3a424a!important}[x-cloak]{display:none!important}
</style>
</head>
<body>
<header class="sticky top-0 z-50 bg-[#0d1217]/95 border-b border-white/10 p-3"><div class="max-w-7xl mx-auto flex items-center justify-between gap-2"><button class="text-left" @click="tab='events'"><div class="text-[10px] tracking-[.25em] lime">GDSQ PICKLEBALL</div><b>OPEN PLAY FIELD SYSTEM</b></button><button class="cut bg-orange-400 text-black px-4 py-2 font-black" @click="lang=lang==='th'?'en':'th';localStorage.psh_lang=lang" x-text="lang==='th'?'EN':'TH'"></button></div></header>
<main class="max-w-7xl mx-auto p-3">
<nav class="grid grid-cols-4 gap-2 text-xs font-black text-center mb-4"><template x-for="n in ['events','join','manage','stats']"><button class="cut btn py-3" :class="tab===n?'bg-lime':'bg-white/5'" @click="tab=n" x-text="tt(n)"></button></template></nav>
<div x-show="msg" class="mb-3 p-3 rounded-xl border border-lime-300/40 bg-lime-300/10 text-lime-200 whitespace-pre-wrap" x-text="msg"></div>

<section x-show="tab==='events'" x-cloak>
 <div class="flex flex-wrap justify-between items-end gap-3 mb-4"><div><h1 class="text-2xl font-black" x-text="tt('events')"></h1><p class="text-sm text-slate-400" x-text="tt('eventHint')"></p></div><div class="flex gap-2"><button class="cut btn px-3 py-2" :class="filter==='live'?'bg-lime':'bg-white/5'" @click="filter='live'" x-text="tt('live')"></button><button class="cut btn px-3 py-2" :class="filter==='completed'?'bg-lime':'bg-white/5'" @click="filter='completed'" x-text="tt('completed')"></button><button class="cut btn bg-white/5 px-3 py-2" @click="load()">REFRESH</button></div></div>
 <div class="grid md:grid-cols-3 gap-4"><template x-for="e in filteredEvents()" :key="e.id"><div class="cut card p-4" :class="eventId===e.id?'ring-2 ring-lime-300':''"><div class="flex justify-between text-xs"><span class="rounded-full px-2 py-1 font-black" :class="e.status==='completed'?'bg-slate-600':'bg-lime text-black'" x-text="statusLabel(e.status)"></span><span x-text="'R '+(e.current_round||0)"></span></div><h2 class="text-xl font-black mt-3" x-text="e.name_th||e.name_en"></h2><p class="text-sm text-slate-300" x-text="(e.event_time||'-')+' · '+(e.venue||'-')"></p><p class="text-xs text-slate-400" x-text="(e.courts_count||1)+' courts · '+modeLabel(e.event_mode)+' · '+(e.team_size||2)+'v'+(e.team_size||2)"></p><div class="grid grid-cols-2 gap-2 mt-4"><button class="cut bg-lime p-3 font-black" @click="pick(e.id);tab=e.status==='completed'?'stats':'join'" x-text="e.status==='completed'?tt('viewHistory'):tt('joinEvent')"></button><button class="cut btn bg-white/5 p-3" @click="pick(e.id);tab='manage'" x-text="tt('manage')"></button></div></div></template><div x-show="filteredEvents().length===0" class="cut card p-5 text-slate-400" x-text="tt('noEvents')"></div></div>
</section>

<section x-show="tab==='join'" x-cloak>
 <div class="grid lg:grid-cols-[1fr_.9fr] gap-4"><div class="cut card p-4"><h2 class="text-2xl font-black" x-text="tt('joinTitle')"></h2><p class="lime" x-text="event?event.name_th:tt('pickEvent')"></p><div class="grid sm:grid-cols-2 gap-3 mt-4"><input class="rounded-lg border p-3" x-model="join.nick" :placeholder="tt('nickname')"><select class="rounded-lg border p-3" x-model.number="join.level"><template x-for="l in levels"><option :value="l.v" x-text="l.v.toFixed(1)+' · '+(lang==='th'?l.th:l.en)"></option></template></select></div><button class="cut bg-orange-400 text-black p-3 mt-3 font-black" @click="showAssess=!showAssess" x-text="showAssess?tt('hide'):tt('assessment')"></button><div x-show="showAssess" class="grid gap-2 mt-3"><template x-for="(q,i) in qs"><div class="soft p-3"><b x-text="(i+1)+'. '+q[lang]"></b><select class="w-full rounded-lg border p-2 mt-2" x-model.number="ans[i]"><option value="0">-</option><option value="1">1 Beginner</option><option value="2">2 Basic</option><option value="3">3 Average</option><option value="4">4 Good</option><option value="5">5 Excellent</option></select></div></template><div class="rounded-xl border border-lime-300/30 bg-lime-950/10 p-3">Assessment <b x-text="avg().toFixed(2)+' / 5'"></b> · Estimate <b x-text="estimate().toFixed(2)"></b></div></div><button class="cut bg-lime w-full p-4 mt-4 font-black" @click="savePlayer()" x-text="tt('saveReady')"></button></div><div class="cut card p-4"><h3 class="text-xl font-black" x-text="tt('queue')"></h3><template x-for="(p,i) in waiting()" :key="p.id"><button class="w-full text-left soft p-3 mt-2" @click="detail=p"><b x-text="(i+1)+'. '+p.nickname"></b><div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tt('played')+' '+(p.matches_played||0)"></div></button></template></div></div>
</section>

<section x-show="tab==='manage'" x-cloak>
 <div class="space-y-4"><div class="cut card p-4"><h2 class="text-2xl font-black" x-text="tt('eventControl')"></h2><select class="w-full rounded-lg border p-3 mt-3" x-model="eventId" @change="pick(eventId)"><template x-for="e in events" :key="e.id"><option :value="e.id" x-text="(e.status==='completed'?'[ENDED] ':'[LIVE] ')+(e.name_th||e.name_en)"></option></template></select><div class="grid grid-cols-2 sm:grid-cols-6 gap-2 mt-4 text-xs font-black"><div class="chip">Status<br><b class="text-xl" x-text="statusLabel(event?.status)"></b></div><div class="chip">Players<br><b class="text-xl" x-text="players.length"></b></div><div class="chip">Ready<br><b class="text-xl lime" x-text="waiting().length"></b></div><div class="chip">Live<br><b class="text-xl text-orange-300" x-text="active().length"></b></div><div class="chip">Round<br><b class="text-xl" x-text="event?.current_round||0"></b></div><div class="chip">Courts<br><input class="w-14 rounded border text-center" type="number" min="1" max="12" x-model.number="settings.courts" @change="saveSettings()"></div></div></div>
 <div class="cut card p-4"><h3 class="font-black text-lime-300" x-text="tt('matchModeTitle')"></h3><div class="grid md:grid-cols-3 gap-3 mt-3"><label class="text-xs text-slate-400"><span x-text="tt('matchmakingMode')"></span><select class="w-full rounded-lg border p-3 mt-1" x-model="settings.mode" @change="saveSettings()"><option value="fair">Fair Play</option><option value="beginner">Beginner Friendly</option><option value="competitive">Competitive</option><option value="social">Social Mix</option><option value="king">King Court</option><option value="manual">Manual Special</option></select></label><label class="text-xs text-slate-400"><span x-text="tt('teamMode')"></span><select class="w-full rounded-lg border p-3 mt-1" x-model="settings.teamMode" @change="saveSettings()"><option value="auto">Auto Fair Mix</option><option value="selected">Selected + Auto Balance</option><option value="manualTeams">Manual Teams</option></select></label><label class="text-xs text-slate-400"><span x-text="tt('teamSize')"></span><input class="w-full rounded-lg border p-3 mt-1" type="number" min="1" max="4" x-model.number="settings.teamSize" @change="saveSettings()"></label></div></div>
 <div class="cut card p-4"><div class="grid sm:grid-cols-4 gap-3"><button class="cut bg-lime p-4 font-black" @click="nextMatch()">1. NEXT MATCH</button><button class="cut btn bg-white/5 p-4" @click="rebalance()">2. REBALANCE</button><button class="cut bg-orange-400 text-black p-4 font-black" @click="startGame()">3. START GAME</button><button class="cut btn bg-white/5 p-4" @click="tab='stats'">STATS</button></div><p class="text-xs text-slate-400 mt-2">ใช้ตามลำดับ: Next Match → Rebalance ถ้าต้องการ → Start Game</p></div>
 <div x-show="settings.teamMode!=='auto' || settings.mode==='manual'" class="cut card p-4"><h3 class="font-black" x-text="tt('manualSelectTitle')"></h3><p class="text-sm text-slate-400" x-text="tt('manualSelectHint')+' '+need()+' '+tt('players')"></p><div class="grid sm:grid-cols-2 md:grid-cols-3 gap-2 mt-3"><template x-for="p in selectablePlayers()" :key="p.id"><label class="soft p-3"><input type="checkbox" :value="p.id" x-model="selectedIds"> <b x-text="p.nickname"></b><div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tt('played')+' '+(p.matches_played||0)"></div></label></template></div><button class="cut btn bg-white/5 p-3 mt-3" @click="selectedIds=[]">CLEAR SELECT</button></div>
 <div x-show="preview" class="cut card p-4 border-lime-300/40"><div class="flex justify-between"><div><h3 class="text-xl font-black lime" x-text="tt('preview')"></h3><p class="text-xs text-slate-400" x-text="'Court '+preview.court+' · Round '+preview.round+' · '+modeLabel(settings.mode)+' / '+teamModeLabel(settings.teamMode)+' · Balance '+preview.balance+'%'"></p></div><button class="bg-white/10 rounded px-3" @click="preview=null">X</button></div><div class="grid md:grid-cols-2 gap-3 mt-3"><div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3"><b class="text-orange-300">TEAM A</b><template x-for="p in preview.A"><div x-text="p.nickname+' · '+levelName(p.estimated_level)"></div></template></div><div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3"><b class="lime">TEAM B</b><template x-for="p in preview.B"><div x-text="p.nickname+' · '+levelName(p.estimated_level)"></div></template></div></div><div class="soft p-3 mt-3"><b x-text="tt('reasons')"></b><template x-for="r in preview.reasons"><div class="text-sm text-slate-300">✓ <span x-text="r"></span></div></template></div></div>
 <div class="grid xl:grid-cols-[.85fr_1.15fr] gap-4"><aside><div class="cut card p-4"><h3 class="font-black" x-text="tt('allPlayers')"></h3><template x-for="p in sortedPlayers()" :key="p.id"><div class="soft p-3 mt-2"><div class="flex justify-between"><button class="text-left" @click="detail=p"><b x-text="p.nickname"></b><div class="text-xs text-slate-400" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+tt('played')+' '+(p.matches_played||0)"></div></button><button class="rounded bg-red-500 px-3 text-xs font-black" @click="removePlayer(p)" x-text="tt('remove')"></button></div><div class="grid grid-cols-5 gap-1 mt-2"><template x-for="s in ['ready','waiting','not_ready','paused','left']"><button class="rounded bg-white/10 py-2 text-[10px]" @click="setStatus(p,s)" x-text="statusName(s)"></button></template></div></div></template></div></aside><div class="grid md:grid-cols-2 gap-3"><template x-for="c in courts()"><div class="cut card p-4"><div class="flex justify-between mb-3"><h3 class="text-xl font-black" x-text="'COURT '+c"></h3><span class="lime" x-text="courtMatch(c)?elapsed(courtMatch(c)):'READY'"></span></div><template x-if="courtMatch(c)"><div><div class="grid grid-cols-2 gap-3"><div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3"><b class="text-orange-300">TEAM A</b><template x-for="p in team(courtMatch(c),'A')"><button class="block" @click="detail=p" x-text="p.nickname"></button></template></div><div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3"><b class="lime">TEAM B</b><template x-for="p in team(courtMatch(c),'B')"><button class="block" @click="detail=p" x-text="p.nickname"></button></template></div></div><div class="grid grid-cols-2 gap-2 mt-3"><input class="rounded-lg border p-3 text-center text-xl font-black" type="number" x-model.number="scores[courtMatch(c).id].a" placeholder="A"><input class="rounded-lg border p-3 text-center text-xl font-black" type="number" x-model.number="scores[courtMatch(c).id].b" placeholder="B"></div><div class="grid grid-cols-2 gap-2 mt-2"><button class="cut bg-lime p-3 font-black" @click="confirmScore(courtMatch(c))">CONFIRM SCORE</button><button class="cut btn bg-white/5 p-3" @click="cancelMatch(courtMatch(c))">CANCEL</button></div></div></template></div></template></div></div>
 <div class="cut card p-4"><h3 class="font-black" x-text="tt('createEvent')"></h3><div class="grid sm:grid-cols-4 gap-2 mt-2"><input class="rounded-lg border p-3" x-model="newEvent.name" :placeholder="tt('eventName')"><input class="rounded-lg border p-3" x-model="newEvent.time" :placeholder="tt('eventTime')"><input class="rounded-lg border p-3" x-model="newEvent.venue" :placeholder="tt('venue')"><button class="cut bg-lime p-3 font-black" @click="createEvent()">CREATE EVENT</button></div></div>
 <div class="cut card p-4"><h3 class="font-black text-red-300" x-text="tt('eventActions')"></h3><div class="grid sm:grid-cols-4 gap-2 mt-3"><button class="cut bg-lime p-3 font-black" @click="finishEvent()" x-text="tt('finishEvent')"></button><button class="cut btn bg-white/5 p-3 font-black" @click="reopenEvent()" x-text="tt('reopenEvent')"></button><button class="cut bg-orange-400 text-black p-3 font-black" @click="clearEventData()" x-text="tt('clearData')"></button><button class="cut bg-red-500 p-3 font-black" @click="deleteEvent()" x-text="tt('deleteEvent')"></button></div></div></div>
</section>

<section x-show="tab==='stats'" x-cloak><div class="grid lg:grid-cols-[1fr_.8fr] gap-4"><div class="cut card p-4"><h2 class="text-2xl font-black" x-text="tt('ranking')"></h2><div class="overflow-auto"><table class="mt-3 w-full min-w-[720px] text-sm text-left"><thead class="text-slate-400 text-xs"><tr><th>#</th><th>Player</th><th>Score</th><th>W-L</th><th>Win%</th><th>Diff</th><th>Played</th><th>Skill</th></tr></thead><tbody><template x-for="(p,i) in ranking()"><tr class="border-t border-white/10"><td class="py-3" x-text="i+1"></td><td><button class="font-bold" @click="detail=p" x-text="p.nickname"></button></td><td class="lime font-black" x-text="eventScore(p)"></td><td x-text="(p.wins||0)+'-'+(p.losses||0)"></td><td x-text="winRate(p)+'%'"></td><td x-text="diff(p)"></td><td x-text="p.matches_played||0"></td><td x-text="levelName(p.estimated_level)"></td></tr></template></tbody></table></div></div><div class="cut card p-4"><h2 class="text-xl font-black" x-text="tt('summary')"></h2><div class="grid grid-cols-2 gap-2 mt-3"><template x-for="b in boxes()"><div class="chip"><b class="text-xl" x-text="b.v"></b><div class="text-xs text-slate-400" x-text="b.k"></div></div></template></div><pre class="mt-3 rounded-xl bg-black/30 p-3 text-sm whitespace-pre-wrap" x-text="summary()"></pre><button class="cut bg-lime p-3 font-black w-full mt-2" @click="copySummary()">COPY LINE</button></div></div><div class="cut card p-4 mt-4"><div class="flex items-end justify-between"><div><h2 class="text-2xl font-black" x-text="tt('matchHistory')"></h2><p class="text-xs text-slate-400" x-text="tt('matchHistoryHint')"></p></div><button class="cut btn bg-white/5 px-3 py-2 text-xs" @click="copyMatchHistory()">COPY HISTORY</button></div><div class="grid gap-3 mt-3"><template x-for="(m,i) in confirmedMatches()" :key="m.id"><div class="soft p-3"><div class="flex justify-between gap-2"><div><b x-text="'#'+(confirmedMatches().length-i)+' · Court '+(m.court_number||'-')+' · R '+(m.round_number||'-')"></b><div class="text-xs text-slate-400" x-text="duration(m)+' · '+dateText(m.ended_at||m.created_at)"></div></div><div class="text-xl font-black lime" x-text="(m.team_a_score??'-')+' - '+(m.team_b_score??'-')"></div></div><div class="grid md:grid-cols-2 gap-2 mt-3"><div class="rounded-lg border border-orange-400/40 bg-orange-500/10 p-3"><div class="text-xs text-orange-300 font-black">TEAM A</div><div x-text="teamNames(m,'A')"></div></div><div class="rounded-lg border border-lime-300/40 bg-lime-500/10 p-3"><div class="text-xs text-lime-300 font-black">TEAM B</div><div x-text="teamNames(m,'B')"></div></div></div></div></template><div x-show="confirmedMatches().length===0" class="soft p-4 text-slate-400" x-text="tt('noMatchHistory')"></div></div></div></section>
</main>

<div x-show="detail" x-cloak class="fixed inset-0 bg-black/70 p-4 z-50 overflow-auto" @click.self="detail=null"><div class="cut card max-w-3xl mx-auto mt-8 p-5"><div class="flex justify-between"><div><div class="text-[10px] tracking-[.25em] lime" x-text="tt('playerSummary')"></div><h2 class="text-3xl font-black" x-text="detail?.nickname"></h2><p class="lime" x-text="detail?levelName(detail.estimated_level):''"></p></div><button class="bg-white/10 rounded px-3" @click="detail=null">X</button></div><div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-4"><template x-for="b in playerBoxes(detail)"><div class="chip"><b x-text="b.v"></b><div class="text-xs text-slate-400" x-text="b.k"></div></div></template></div><p class="mt-4 rounded-xl bg-black/30 p-3 text-sm" x-text="insight(detail)"></p><div class="mt-4"><h3 class="text-xl font-black lime" x-text="tt('playerMatchHistory')"></h3><template x-for="h in playerHistory(detail)" :key="h.match.id"><div class="soft p-3 mt-2"><b x-text="h.result+' · '+h.score"></b><div class="text-sm" x-text="tt('partner')+': '+h.partner"></div><div class="text-sm text-slate-300" x-text="tt('opponents')+': '+h.opponents"></div></div></template></div></div></div>

ings.teamSize+'v'+this.settings.teamSize+'\nPlayers: '+this.players.length+'\nMatches: '+this.confirmedMatches().length+'\n\n'+top},copySummary(){navigator.clipboard.writeText(this.summary());this.flash('Copied')},copyMatchHistory(){let lines=this.confirmedMatches().reverse().map((m,i)=>'#'+(i+1)+' '+this.teamNames(m,'A')+' '+m.team_a_score+'-'+m.team_b_score+' '+this.teamNames(m,'B'));navigator.clipboard.writeText(lines.join('\n'));this.flash('Copied history')}}}
