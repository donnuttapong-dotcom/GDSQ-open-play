<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OpenPlay Player Compact</title>
<style>
html,body{margin:0;width:100%;height:100dvh;min-height:100svh;background:#0d1217;overflow:hidden}iframe{width:100%;height:100%;border:0;background:#0d1217}.badge{position:fixed;right:10px;bottom:10px;z-index:999999;background:#c7ff2e;color:#111;border-radius:999px;padding:6px 9px;font:800 10px system-ui;opacity:.86}
</style>
</head>
<body>
<iframe id="playerFrame"></iframe>
<div class="badge">COMPACT PLAYER</div>
<script>
const frame=document.getElementById('playerFrame');
const q=new URLSearchParams(location.search);
q.set('v','compact-board-01');
frame.src='./openplay-player.html?'+q.toString();
function inject(){
  try{
    const doc=frame.contentDocument;
    if(!doc||doc.getElementById('compact-player-board-style'))return;
    const style=doc.createElement('style');
    style.id='compact-player-board-style';
    style.textContent=`
      .rankCard{padding:10px 11px!important;border-radius:18px!important;grid-template-columns:34px 1fr 52px!important;gap:8px!important;}
      .rankNo{width:32px!important;height:32px!important;font-size:13px!important;}
      .miniAvatar{width:32px!important;height:32px!important;border-radius:12px!important;font-size:13px!important;}
      .playerCell{gap:8px!important;}
      .playerCell b{font-size:14px!important;}
      .scoreBig{font-size:20px!important;}
      .rankMeta{gap:4px!important;margin-top:4px!important;}
      .tag{font-size:10px!important;padding:3px 6px!important;}
      .statStrip{gap:5px!important;margin-top:7px!important;}
      .statStrip span{font-size:10px!important;padding:5px 3px!important;border-radius:10px!important;}
      .statStrip b{font-size:13px!important;}
      #leaderTitle{font-size:20px!important;}
      #leaderboardList{gap:8px!important;}
    `;
    doc.head.appendChild(style);
  }catch(e){}
}
frame.addEventListener('load',()=>{inject();setInterval(inject,1000)});
</script>
</body>
</html>
