<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OpenPlay Player · Level 0.25</title>
<style>
html,body{margin:0;width:100%;height:100dvh;min-height:100svh;background:#0d1217;overflow:hidden}iframe{width:100%;height:100%;border:0;background:#0d1217}.badge{position:fixed;right:10px;bottom:10px;z-index:999999;background:#c7ff2e;color:#111;border-radius:999px;padding:6px 9px;font:900 10px system-ui;opacity:.86;box-shadow:0 10px 30px rgba(0,0,0,.35)}
</style>
</head>
<body>
<iframe id="playerFrame"></iframe>
<div class="badge">LEVEL 0.25</div>
<script>
const frame=document.getElementById('playerFrame');
const q=new URLSearchParams(location.search);q.set('v','level025-compact-existing');frame.src='./openplay-player.html?'+q.toString();
function values025(){const a=[];for(let v=1;v<=5.0001;v+=0.25)a.push(Number(v.toFixed(2)));return a}
function patchSelect(select,current){if(!select)return;const now=Number(current||select.value||2.5);select.innerHTML=values025().map(v=>`<option value="${v.toFixed(2)}" ${Math.abs(v-now)<.001?'selected':''}>${v.toFixed(2)}</option>`).join('')}
function patch(){
  try{
    const doc=frame.contentDocument;if(!doc)return;
    const select=doc.getElementById('levelSelect')||doc.querySelector('select[id*=level],select[x-model*=level]');
    patchSelect(select,select&&select.value);
    doc.querySelectorAll('select').forEach(s=>{
      const opts=[...s.options].map(o=>o.value).join('|');
      if(opts==='1.0|1.5|2.0|2.5|3.0|3.5|4.0|4.5|5.0'||opts==='1|1.5|2|2.5|3|3.5|4|4.5|5')patchSelect(s,s.value);
    });
  }catch(e){}
}
frame.addEventListener('load',()=>{patch();setInterval(patch,1000)});
setInterval(patch,2500);
</script>
</body>
</html>
