<!doctype html>
<html lang="th" x-data="viewer()" x-init="init()">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GDSQ Tournament Public View</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#11161b;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif}.cut{clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}.card{background:#222931;border:1px solid #39434d}.soft{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.1);border-radius:16px}.lime{color:#c7ff2e}.bg-lime{background:#c7ff2e;color:#111}.mini{font-size:12px;color:#94a3b8}.chip{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;text-align:center}.bar{height:10px;background:#0f151b;border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}.bar>div{height:100%;background:#c7ff2e}.btn{border:1px solid rgba(255,255,255,.14);font-weight:900}[x-cloak]{display:none!important}
</style>
</head>
<body>
<header class="sticky top-0 z-50 bg-[#0d1217]/95 border-b border-white/10 p-3"><div class="max-w-6xl mx-auto flex justify-between items-center gap-3"><a href="./" class="text-left"><div class="text-[10px] tracking-[.25em] lime">GDSQ PICKLEBALL</div><b>TOURNAMENT PUBLIC VIEW</b></a><button class="cut bg-orange-400 text-black px-4 py-2 font-black" @click="load()">REFRESH</button></div></header>
<main class="max-w-6xl mx-auto p-3">
 <div x-show="msg" class="mb-3 p-3 rounded-xl border border-lime-300/40 bg-lime-300/10 text-lime-200 whitespace-pre-wrap" x-text="msg"></div>
 <template x-if="!id"><div class="cut card p-8 text-center"><h1 class="text-2xl font-black lime">No Tournament ID</h1><p class="mini mt-2">เปิดหน้านี้ด้วยลิงก์ tournament-view.html?id=...</p></div></template>
 <template x-if="id && !tournament && !loading"><div class="cut card p-8 text-center"><h1 class="text-2xl font-black lime">Tournament Not Found</h1><p class="mini mt-2">ยังไม่พบข้อมูล หรือรายการนี้ถูกลบแล้ว</p></div></template>
 <template x-if="tournament"><div class="space-y-4">
  <section class="cut card p-4"><div class="flex flex-wrap justify-between gap-3"><div><div class="text-[10px] tracking-[.25em] lime">PUBLIC RESULT</div><h1 class="text-3xl font-black" x-text="tournament.name"></h1><p class="text-slate-300" x-text="(tournament.venue||'-')+' · '+(tournament.event_time||'-')"></p><p class="mini" x-text="formatName()+' · Status: '+tournament.status"></p></div><div class="grid grid-cols-2 gap-2 min-w-[240px]"><div class="chip"><b x-text="progressPct()+'%'"></b><div class="mini">Progress</div></div><div class="chip"><b x-text="done().length+'/'+playableCount()"></b><div class="mini">Matches</div></div></div></div><div class="bar mt-4"><div :style="'width:'+progressPct()+'%'"></div></div></section>
  <section class="grid md:grid-cols-4 gap-3"><div class="chip"><b class="text-xl" x-text="champion()?champion().name:'-' "></b><div class="mini">Champion</div></div><div class="chip"><b class="text-xl" x-text="runnerUp()?runnerUp().name:'-' "></b><div class="mini">Runner-up</div></div><div class="chip"><b class="text-xl" x-text="teams.length"></b><div class="mini">Teams</div></div><div class="chip"><b class="text-xl" x-text="done().length"></b><div class="mini">Completed</div></div></section>
  <section x-show="tournament.format==='roundrobin'" class="cut card p-4"><h2 class="text-xl font-black lime">Ranking</h2><table class="w-full text-sm mt-3"><thead class="mini"><tr><th class="text-left"># Team</th><th>W</th><th>L</th><th>PF</th><th>Diff</th></tr></thead><tbody><template x-for="(s,i) in standings()" :key="s.id"><tr class="border-t border-white/10"><td class="py-2" x-text="(i+1)+'. '+s.name"></td><td class="text-center" x-text="s.w"></td><td class="text-center" x-text="s.l"></td><td class="text-center" x-text="s.pf"></td><td class="text-center" x-text="s.diff"></td></tr></template></tbody></table></section>
  <section class="cut card p-4"><h2 class="text-xl font-black lime">Match Schedule / Results</h2><template x-if="tournament.format==='single'"><div class="grid md:grid-cols-3 gap-4 mt-3"><template x-for="r in rounds()" :key="r"><div class="soft p-3"><h3 class="font-black" x-text="r"></h3><div class="grid gap-2 mt-2"><template x-for="m in matchesByRound(r)" :key="m.id"><div class="rounded-xl bg-black/25 p-3"><div class="mini" x-text="'Match '+m.no+' · '+m.status+' '+scoreLine(m)"></div><b x-text="name(m.a)"></b><div class="text-slate-500">vs</div><b x-text="name(m.b)"></b><div class="text-lime-300 text-sm font-black mt-1" x-show="m.winner" x-text="'Winner: '+name(m.winner)"></div></div></template></div></div></template></div></template><template x-if="tournament.format==='roundrobin'"><div class="grid md:grid-cols-2 gap-3 mt-3"><template x-for="m in matches" :key="m.id"><div class="soft p-3"><div class="mini" x-text="'Match '+m.no+' · '+m.status+' '+scoreLine(m)"></div><b x-text="name(m.a)"></b><span class="text-slate-500"> vs </span><b x-text="name(m.b)"></b><div class="text-lime-300 text-sm font-black mt-1" x-show="m.winner" x-text="'Winner: '+name(m.winner)"></div></div></template></div></template></section>
  <section class="cut card p-4"><div class="flex flex-wrap justify-between gap-2"><h2 class="text-xl font-black lime">Share Summary</h2><button class="cut btn bg-white/5 px-4 py-2 text-xs" @click="copySummary()">COPY</button></div><pre class="mt-3 rounded-xl bg-black/30 p-3 text-sm whitespace-pre-wrap" x-text="summary()"></pre></section>
 </div></template>
</main>
<script>
function viewer(){return{url:'https://zzeikmrrlfvwnwsprmjy.supabase.co',key:'sb_publishable_xSAZX5dgZ_3Qr3nzoOtqYA_Z0l8yOaX',db:null,id:null,tournament:null,teams:[],matches:[],msg:'',loading:false,async init(){this.db=supabase.createClient(this.url,this.key);this.id=new URLSearchParams(location.search).get('id');if(this.id)await this.load()},flash(m){this.msg=m;setTimeout(()=>this.msg='',3000)},async chk(label,p){let r=await p;if(r.error){this.flash(label+' failed: '+r.error.message);throw r.error}return r},async load(){if(!this.id)return;this.loading=true;try{let tr=await this.chk('load tournament',this.db.from('psh_tournaments').select('*').eq('id',this.id).single());let tm=await this.chk('load teams',this.db.from('psh_tournament_teams').select('*').eq('tournament_id',this.id).order('seed',{ascending:true}));let mm=await this.chk('load matches',this.db.from('psh_tournament_matches').select('*').eq('tournament_id',this.id).order('match_no',{ascending:true}));this.tournament=tr.data;this.teams=(tm.data||[]).map(x=>({id:x.id,name:x.name,p1:x.player_1||'-',p2:x.player_2||'-',rating:+x.rating||3}));this.matches=(mm.data||[]).map(m=>({id:m.id,no:m.match_no,round:m.round,roundIndex:m.round_index,a:m.team_a,b:m.team_b,scoreA:m.team_a_score,scoreB:m.team_b_score,winner:m.winner_team,status:m.status,next:m.next_match_no}));this.flash('Updated');}catch(e){this.tournament=null}finally{this.loading=false}},formatName(){return this.tournament?.format==='single'?'Single Elimination / แพ้ตกรอบ':'Round Robin / เจอกันหมด'},name(id){if(!id)return 'BYE / TBD';return this.teams.find(t=>t.id===id)?.name||'TBD'},scoreLine(m){return m.scoreA!==null&&m.scoreB!==null?`(${m.scoreA}-${m.scoreB})`:''},playableCount(){return this.matches.filter(m=>m.a&&m.b).length},done(){return this.matches.filter(m=>m.status==='completed'&&m.a&&m.b)},progressPct(){let total=this.playableCount();return total?Math.round(this.done().length/total*100):0},rounds(){return [...new Set(this.matches.map(m=>m.round))].sort((a,b)=>(this.matches.find(m=>m.round===a)?.roundIndex||0)-(this.matches.find(m=>m.round===b)?.roundIndex||0))},matchesByRound(r){return this.matches.filter(m=>m.round===r)},standings(){let rows=this.teams.map(t=>({id:t.id,name:t.name,w:0,l:0,pf:0,pa:0,diff:0}));this.done().forEach(m=>{let a=rows.find(r=>r.id===m.a),b=rows.find(r=>r.id===m.b);if(!a||!b)return;a.pf+=m.scoreA||0;a.pa+=m.scoreB||0;b.pf+=m.scoreB||0;b.pa+=m.scoreA||0;if(m.winner===m.a){a.w++;b.l++}else{b.w++;a.l++}});rows.forEach(r=>r.diff=r.pf-r.pa);return rows.sort((a,b)=>b.w-a.w||b.diff-a.diff||b.pf-a.pf)},allDone(){let p=this.matches.filter(m=>m.a&&m.b);return p.length&&p.every(m=>m.status==='completed')},champion(){if(!this.tournament)return null;if(this.tournament.format==='single'){let f=this.matches.find(m=>m.round==='Final');return f&&f.winner?this.teams.find(t=>t.id===f.winner):null}let s=this.standings()[0];return this.allDone()&&s?this.teams.find(t=>t.id===s.id):null},runnerUp(){if(!this.tournament)return null;if(this.tournament.format==='single'){let f=this.matches.find(m=>m.round==='Final');if(f&&f.winner)return this.teams.find(t=>t.id===(f.winner===f.a?f.b:f.a))}let s=this.standings()[1];return this.allDone()&&s?this.teams.find(t=>t.id===s.id):null},matchHistoryText(){return this.done().map((m,i)=>`${i+1}. ${this.name(m.a)} ${m.scoreA}-${m.scoreB} ${this.name(m.b)} · Winner: ${this.name(m.winner)}`).join('\n')},rankingText(){if(this.tournament?.format!=='roundrobin')return'';return '\n\nRanking:\n'+this.standings().map((s,i)=>`${i+1}. ${s.name} · W${s.w}/L${s.l} · Diff ${s.diff}`).join('\n')},summary(){let c=this.champion(),r=this.runnerUp();return`🏆 ${this.tournament?.name||'-'}\n${this.tournament?.venue||'-'} ${this.tournament?.event_time||''}\nFormat: ${this.formatName()}\nProgress: ${this.done().length}/${this.playableCount()} (${this.progressPct()}%)\nTeams: ${this.teams.length}\n\nChampion: ${c?c.name:'-'}\nRunner-up: ${r?r.name:'-'}${this.rankingText()}\n\nMatch History:\n${this.matchHistoryText()||'-'}`},copySummary(){navigator.clipboard.writeText(this.summary());this.flash('Copied')}}}
</script>
</body>
</html>
