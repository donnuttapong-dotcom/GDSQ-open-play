<!DOCTYPE html>
<html lang="en" x-data="pshApp()" x-init="init()" :class="{ 'th': lang==='th' }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PICKLEBALL SYSTEMS HUB - ALPHA 04 ONLINE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#1a1d20;--panel:#23282d;--line:#3a424a;--orange:#ff7a18;--lime:#c7ff2e;--cyan:#3ee7ff;--muted:#9ca3af;}
    html,body{background:var(--bg); color:#f5f5f5; min-height:100%;}
    body{font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;}
    .th body,.th *{font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans Thai", sans-serif;}
    .chamfer{clip-path: polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);}
    .chamfer-sm{clip-path: polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);}
    .hazard{background-image: repeating-linear-gradient(135deg,rgba(255,255,255,.14) 0 8px,transparent 8px 16px);}
    .grid-bg{background-image: linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px); background-size:32px 32px;}
    .glow-orange{box-shadow:0 0 0 1px rgba(255,122,24,.4),0 0 24px rgba(255,122,24,.12);}
    .glow-lime{box-shadow:0 0 0 1px rgba(199,255,46,.4),0 0 24px rgba(199,255,46,.12);}
    .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{scrollbar-width:none}
    [x-cloak]{display:none!important}
    input,select,textarea{background:#121519!important;color:#fff!important;border-color:#3a424a!important}
    input::placeholder{color:#64748b!important}
  </style>
</head>
<body class="grid-bg">
  <div class="min-h-screen pb-24">
    <header class="sticky top-0 z-50 border-b border-white/10 bg-[#15181b]/95 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-3 px-3 py-3 sm:px-5">
        <button @click="go('hub')" class="text-left">
          <div class="text-[10px] tracking-[0.28em] text-lime-300">PICKLEBALL SYSTEMS HUB</div>
          <div class="text-sm font-black tracking-wide sm:text-lg">ALPHA 04 · ONLINE FIELD MODE</div>
        </button>
        <div class="flex items-center gap-2">
          <div class="hidden rounded-full border border-white/10 px-3 py-1 text-[11px] text-slate-300 sm:block" :class="online ? 'text-lime-300' : 'text-orange-300'">
            <span x-text="online ? t('online') : t('setupNeeded')"></span>
          </div>
          <button @click="lang = lang === 'th' ? 'en' : 'th'; saveLocal()" class="chamfer-sm border border-white/15 bg-white/5 px-3 py-2 text-xs font-black hover:bg-white/10">
            <span x-text="lang === 'th' ? 'EN' : 'TH'"></span>
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-3 py-4 sm:px-5">
      <template x-if="!configured">
        <section class="chamfer border border-orange-400/50 bg-orange-950/20 p-4 shadow-2xl">
          <div class="hazard mb-3 h-2 w-full opacity-80"></div>
          <h1 class="text-xl font-black text-orange-300" x-text="t('setupTitle')"></h1>
          <p class="mt-2 text-sm leading-6 text-slate-300" x-text="t('setupDesc')"></p>
          <div class="mt-4 grid gap-3 md:grid-cols-2">
            <div>
              <label class="text-xs font-bold uppercase text-slate-400">Supabase URL</label>
              <input x-model="setup.url" class="mt-1 w-full rounded-lg border px-3 py-3 text-sm" placeholder="https://xxxxx.supabase.co" />
            </div>
            <div>
              <label class="text-xs font-bold uppercase text-slate-400">Publishable / Anon Key</label>
              <input x-model="setup.key" class="mt-1 w-full rounded-lg border px-3 py-3 text-sm" placeholder="sb_publishable_... or eyJ..." />
            </div>
          </div>
          <div class="mt-4 flex flex-wrap gap-2">
            <button @click="saveConfig()" class="chamfer-sm bg-lime-300 px-4 py-3 text-sm font-black text-black">SAVE CONFIG</button>
            <button @click="showSql = !showSql" class="chamfer-sm border border-white/20 px-4 py-3 text-sm font-black" x-text="showSql ? 'HIDE SQL' : 'SHOW SQL STEP'"></button>
          </div>
          <pre x-show="showSql" x-cloak class="mt-4 max-h-80 overflow-auto rounded-xl border border-white/10 bg-black/40 p-3 text-xs text-slate-300">1) Run supabase_alpha04_schema.sql in Supabase SQL Editor
2) Enable Realtime for psh_* tables if needed
3) Paste URL + publishable key here
4) Upload this file as index.html to GitHub Pages</pre>
        </section>
      </template>

      <template x-if="configured">
        <div>
          <nav class="mb-4 grid grid-cols-4 gap-2 text-center text-[11px] font-black uppercase sm:text-xs">
            <button @click="go('hub')" :class="tab==='hub' ? 'bg-lime-300 text-black' : 'bg-white/5 text-slate-300'" class="chamfer-sm border border-white/10 px-2 py-3" x-text="t('events')"></button>
            <button @click="go('player')" :class="tab==='player' ? 'bg-lime-300 text-black' : 'bg-white/5 text-slate-300'" class="chamfer-sm border border-white/10 px-2 py-3" x-text="t('player')"></button>
            <button @click="go('organizer')" :class="tab==='organizer' ? 'bg-lime-300 text-black' : 'bg-white/5 text-slate-300'" class="chamfer-sm border border-white/10 px-2 py-3" x-text="t('organizer')"></button>
            <button @click="go('stats')" :class="tab==='stats' ? 'bg-lime-300 text-black' : 'bg-white/5 text-slate-300'" class="chamfer-sm border border-white/10 px-2 py-3" x-text="t('stats')"></button>
          </nav>

          <div x-show="toast" x-transition class="fixed bottom-4 left-3 right-3 z-[70] mx-auto max-w-lg rounded-xl border border-lime-300/40 bg-[#101316]/95 p-3 text-sm text-lime-200 shadow-2xl" x-text="toast"></div>

          <section x-show="tab==='hub'" x-cloak>
            <div class="mb-4 flex flex-wrap items-end justify-between gap-3">
              <div>
                <h2 class="text-2xl font-black uppercase" x-text="t('selectEvent')"></h2>
                <p class="text-sm text-slate-400" x-text="t('selectEventHint')"></p>
              </div>
              <button @click="refreshAll()" class="chamfer-sm border border-white/15 px-4 py-2 text-xs font-black">REFRESH</button>
            </div>
            <div class="grid gap-4 md:grid-cols-3">
              <template x-for="ev in events" :key="ev.id">
                <article @click="selectEvent(ev.id)" class="chamfer cursor-pointer border bg-[#22272d] p-3 transition hover:-translate-y-0.5" :class="selectedEventId===ev.id ? 'border-lime-300 glow-lime' : 'border-white/10'">
                  <div class="chamfer-sm relative h-36 overflow-hidden bg-[#111]">
                    <div class="absolute inset-0 bg-gradient-to-br from-orange-500/20 via-transparent to-lime-300/20"></div>
                    <div class="hazard absolute left-0 top-0 h-full w-10 opacity-30"></div>
                    <div class="absolute bottom-3 left-3 right-3">
                      <div class="text-[10px] font-black uppercase tracking-[0.2em]" :class="ev.status==='live' ? 'text-lime-300' : 'text-slate-300'" x-text="ev.status"></div>
                      <div class="text-xl font-black uppercase" x-text="eventName(ev)"></div>
                    </div>
                  </div>
                  <div class="mt-3 space-y-2 text-sm text-slate-300">
                    <div class="flex justify-between gap-3"><span x-text="t('time')"></span><b x-text="ev.event_time"></b></div>
                    <div class="flex justify-between gap-3"><span x-text="t('venue')"></span><b x-text="ev.venue"></b></div>
                    <div class="flex justify-between gap-3"><span x-text="t('courts')"></span><b x-text="ev.courts_count"></b></div>
                  </div>
                  <button @click.stop="selectEvent(ev.id); go('player')" class="chamfer-sm mt-4 w-full bg-lime-300 px-4 py-3 text-sm font-black text-black" x-text="t('joinEvent')"></button>
                </article>
              </template>
            </div>
          </section>

          <section x-show="tab==='player'" x-cloak>
            <div class="grid gap-4 lg:grid-cols-[1fr_.9fr]">
              <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                <div class="hazard mb-3 h-2"></div>
                <h2 class="text-2xl font-black uppercase" x-text="t('joinAsPlayer')"></h2>
                <p class="mt-1 text-sm text-slate-400" x-text="t('joinDesc')"></p>

                <div class="mt-4 grid gap-3 sm:grid-cols-2">
                  <div>
                    <label class="text-xs font-black uppercase text-slate-400" x-text="t('nickname')"></label>
                    <input x-model.trim="join.nickname" class="mt-1 w-full rounded-lg border px-3 py-3" :placeholder="t('nicknamePh')" />
                  </div>
                  <div>
                    <label class="text-xs font-black uppercase text-slate-400" x-text="t('selfRating')"></label>
                    <select x-model.number="join.selfRating" class="mt-1 w-full rounded-lg border px-3 py-3">
                      <option value="2.0">2.0 · Beginner</option>
                      <option value="2.5">2.5 · Social Beginner</option>
                      <option value="3.0">3.0 · Social Player</option>
                      <option value="3.5">3.5 · Intermediate</option>
                      <option value="4.0">4.0 · Strong Player</option>
                    </select>
                  </div>
                </div>

                <div class="mt-4 rounded-xl border border-white/10 bg-black/20 p-3">
                  <button @click="join.useAssessment = !join.useAssessment" class="flex w-full items-center justify-between gap-3 text-left">
                    <span>
                      <b class="block text-sm uppercase text-lime-300" x-text="t('notSure')"></b>
                      <span class="text-xs text-slate-400" x-text="t('assessmentHint')"></span>
                    </span>
                    <span class="chamfer-sm border border-white/20 px-3 py-2 text-xs font-black" x-text="join.useAssessment ? t('hide') : t('takeAssessment')"></span>
                  </button>
                  <div x-show="join.useAssessment" x-transition class="mt-4 space-y-3">
                    <template x-for="(q,idx) in questions" :key="q.key">
                      <div class="rounded-lg border border-white/10 bg-[#15181b] p-3">
                        <div class="text-sm font-bold"><span x-text="idx+1"></span>. <span x-text="q[lang]"></span></div>
                        <div class="mt-2 grid grid-cols-4 gap-2">
                          <template x-for="n in [1,2,3,4]" :key="n">
                            <button @click="join.answers[q.key]=n" class="chamfer-sm border px-2 py-2 text-xs font-black" :class="join.answers[q.key]===n ? 'border-lime-300 bg-lime-300 text-black' : 'border-white/10 bg-white/5 text-slate-300'" x-text="n"></button>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>

                <div class="mt-4 rounded-xl border border-cyan-300/20 bg-cyan-950/10 p-3 text-sm text-slate-300">
                  <b class="text-cyan-200" x-text="t('aiEstimate')"></b>
                  <div class="mt-2 grid gap-2 sm:grid-cols-3">
                    <div><span class="text-slate-500">Level</span><div class="text-xl font-black" x-text="previewEstimate().level.toFixed(2)"></div></div>
                    <div><span class="text-slate-500">Tech</span><div class="text-xl font-black" x-text="previewEstimate().tech.toFixed(2)"></div></div>
                    <div><span class="text-slate-500">Tact</span><div class="text-xl font-black" x-text="previewEstimate().tact.toFixed(2)"></div></div>
                  </div>
                </div>

                <button @click="submitPlayer()" :disabled="busy" class="chamfer mt-4 w-full bg-lime-300 px-5 py-4 text-base font-black uppercase text-black disabled:opacity-40" x-text="busy ? t('saving') : t('addJoinQueue')"></button>
              </div>

              <aside class="space-y-4">
                <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                  <h3 class="text-lg font-black uppercase" x-text="t('myStatus')"></h3>
                  <template x-if="myEventPlayer">
                    <div class="mt-3 space-y-3">
                      <div class="flex items-center justify-between rounded-lg bg-black/20 p-3"><span x-text="myEventPlayer.nickname"></span><b class="text-lime-300" x-text="myEventPlayer.status"></b></div>
                      <div class="grid grid-cols-3 gap-2 text-center text-xs">
                        <div class="rounded-lg bg-black/20 p-2"><span class="text-slate-500">ELO</span><b class="block text-lg" x-text="Math.round(myEventPlayer.elo)"></b></div>
                        <div class="rounded-lg bg-black/20 p-2"><span class="text-slate-500">W-L</span><b class="block text-lg" x-text="myEventPlayer.wins+'-'+myEventPlayer.losses"></b></div>
                        <div class="rounded-lg bg-black/20 p-2"><span class="text-slate-500">Q</span><b class="block text-lg" x-text="myQueuePosition() || '-'"></b></div>
                      </div>
                      <div class="flex gap-2">
                        <button @click="setMyStatus('waiting')" class="chamfer-sm flex-1 bg-lime-300 px-3 py-3 text-xs font-black text-black" x-text="t('joinQueue')"></button>
                        <button @click="setMyStatus('paused')" class="chamfer-sm flex-1 border border-white/15 px-3 py-3 text-xs font-black" x-text="t('pause')"></button>
                      </div>
                    </div>
                  </template>
                  <template x-if="!myEventPlayer"><p class="mt-2 text-sm text-slate-400" x-text="t('noPlayerYet')"></p></template>
                </div>

                <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                  <h3 class="text-lg font-black uppercase" x-text="t('liveQueue')"></h3>
                  <div class="mt-3 max-h-[360px] space-y-2 overflow-auto no-scrollbar">
                    <template x-for="(p,idx) in waitingPlayers()" :key="p.id">
                      <div class="flex items-center justify-between rounded-lg border border-white/10 bg-black/20 p-3 text-sm">
                        <div><b x-text="(idx+1)+'. '+p.nickname"></b><div class="text-xs text-slate-500" x-text="'ELO '+Math.round(p.elo)+' · '+p.rating_confidence"></div></div>
                        <span class="text-xs text-lime-300" x-text="p.status"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </aside>
            </div>
          </section>

          <section x-show="tab==='organizer'" x-cloak>
            <template x-if="!organizerUnlocked">
              <div class="chamfer mx-auto max-w-md border border-orange-400/40 bg-[#22272d] p-5">
                <h2 class="text-2xl font-black uppercase" x-text="t('organizerMode')"></h2>
                <p class="mt-2 text-sm text-slate-400" x-text="t('pinHint')"></p>
                <input x-model="pinInput" type="password" class="mt-4 w-full rounded-lg border px-3 py-3" placeholder="PIN" />
                <button @click="unlockOrganizer()" class="chamfer mt-3 w-full bg-orange-400 px-5 py-4 font-black text-black">UNLOCK</button>
              </div>
            </template>

            <template x-if="organizerUnlocked">
              <div class="space-y-4">
                <div class="chamfer border border-white/10 bg-[#22272d]/90 p-4">
                  <div class="flex flex-wrap items-center justify-between gap-3">
                    <div>
                      <h2 class="text-2xl font-black uppercase" x-text="t('fieldControl')"></h2>
                      <p class="text-sm text-slate-400" x-text="selectedEvent ? eventName(selectedEvent) : '-' "></p>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                      <label class="text-xs text-slate-400"><span x-text="t('courts')"></span><input x-model.number="settings.courts" @change="updateEventSettings()" type="number" min="1" max="12" class="mt-1 w-24 rounded-lg border px-3 py-2"></label>
                      <label class="text-xs text-slate-400"><span x-text="t('minutes')"></span><input x-model.number="settings.minutes" @change="updateEventSettings()" type="number" min="3" max="60" class="mt-1 w-24 rounded-lg border px-3 py-2"></label>
                    </div>
                  </div>
                  <div class="mt-4 grid gap-2 text-center text-xs font-black uppercase sm:grid-cols-5">
                    <div class="rounded-xl bg-black/25 p-3"><span class="block text-slate-500" x-text="t('players')"></span><b class="text-xl" x-text="eventPlayers.length"></b></div>
                    <div class="rounded-xl bg-black/25 p-3"><span class="block text-slate-500" x-text="t('waiting')"></span><b class="text-xl text-lime-300" x-text="waitingPlayers().length"></b></div>
                    <div class="rounded-xl bg-black/25 p-3"><span class="block text-slate-500" x-text="t('playing')"></span><b class="text-xl text-orange-300" x-text="eventPlayers.filter(p=>p.status==='playing').length"></b></div>
                    <div class="rounded-xl bg-black/25 p-3"><span class="block text-slate-500" x-text="t('matches')"></span><b class="text-xl" x-text="matches.length"></b></div>
                    <button @click="matchAllAvailableCourts()" class="chamfer-sm bg-lime-300 p-3 text-black" x-text="t('matchAvailable')"></button>
                  </div>
                </div>

                <div class="grid gap-4 lg:grid-cols-[1fr_360px]">
                  <div class="space-y-4">
                    <div class="grid gap-4 md:grid-cols-2" :class="settings.courts>=3 ? 'xl:grid-cols-3' : ''">
                      <template x-for="court in courtNumbers()" :key="court">
                        <div class="chamfer border border-white/10 bg-[#22272d] p-3">
                          <div class="hazard mb-3 h-2"></div>
                          <div class="flex items-center justify-between">
                            <h3 class="text-xl font-black uppercase">COURT <span x-text="court"></span></h3>
                            <button @click="matchNext(court)" class="chamfer-sm bg-lime-300 px-3 py-2 text-xs font-black text-black" x-text="t('matchNext')"></button>
                          </div>
                          <template x-if="activeMatchByCourt(court)">
                            <div class="mt-3" x-data="{ get m(){ return activeMatchByCourt(court) } }">
                              <div class="mb-3 rounded-xl border border-cyan-300/20 bg-cyan-950/10 p-3 text-center">
                                <div class="text-xs uppercase text-slate-400" x-text="m.match_type"></div>
                                <div class="text-4xl font-black tabular-nums" :class="timeLeft(m).ended ? 'text-orange-300' : 'text-lime-300'" x-text="timeLeft(m).label"></div>
                              </div>
                              <div class="grid gap-3 sm:grid-cols-2">
                                <div class="rounded-xl border border-orange-400/40 bg-orange-950/10 p-3 glow-orange">
                                  <div class="mb-2 text-xs font-black text-orange-300">TEAM A</div>
                                  <template x-for="p in matchTeam(m,'A')" :key="p.id"><div class="py-1 text-sm font-bold" x-text="p.nickname"></div></template>
                                </div>
                                <div class="rounded-xl border border-lime-300/40 bg-lime-950/10 p-3 glow-lime">
                                  <div class="mb-2 text-xs font-black text-lime-300">TEAM B</div>
                                  <template x-for="p in matchTeam(m,'B')" :key="p.id"><div class="py-1 text-sm font-bold" x-text="p.nickname"></div></template>
                                </div>
                              </div>
                              <div class="mt-3 grid grid-cols-[1fr_auto_1fr] items-end gap-2">
                                <div><label class="text-xs text-slate-500">A</label><input x-model.number="scoreInputs[m.id].a" type="number" min="0" max="30" class="w-full rounded-lg border px-3 py-3 text-center text-2xl font-black"></div>
                                <div class="pb-3 text-slate-500">-</div>
                                <div><label class="text-xs text-slate-500">B</label><input x-model.number="scoreInputs[m.id].b" type="number" min="0" max="30" class="w-full rounded-lg border px-3 py-3 text-center text-2xl font-black"></div>
                              </div>
                              <div class="mt-3 grid grid-cols-2 gap-2">
                                <button @click="confirmScore(m)" class="chamfer-sm bg-lime-300 px-3 py-3 text-xs font-black text-black" x-text="t('confirmScore')"></button>
                                <button @click="cancelMatch(m)" class="chamfer-sm border border-red-400/40 px-3 py-3 text-xs font-black text-red-200" x-text="t('cancel')"></button>
                              </div>
                            </div>
                          </template>
                          <template x-if="!activeMatchByCourt(court)">
                            <div class="mt-3 rounded-xl border border-white/10 bg-black/20 p-6 text-center text-sm text-slate-400" x-text="t('courtReady')"></div>
                          </template>
                        </div>
                      </template>
                    </div>
                  </div>

                  <aside class="space-y-4">
                    <div class="chamfer border border-white/10 bg-[#22272d] p-4">
                      <h3 class="text-lg font-black uppercase" x-text="t('waitingList')"></h3>
                      <div class="mt-3 max-h-[420px] space-y-2 overflow-auto no-scrollbar">
                        <template x-for="p in eventPlayersSorted()" :key="p.id">
                          <div class="rounded-lg border border-white/10 bg-black/20 p-3 text-sm">
                            <div class="flex items-center justify-between gap-2">
                              <b x-text="p.nickname"></b>
                              <span class="text-[10px] uppercase" :class="p.status==='waiting'?'text-lime-300':p.status==='playing'?'text-orange-300':'text-slate-400'" x-text="p.status"></span>
                            </div>
                            <div class="mt-1 text-xs text-slate-500" x-text="'ELO '+Math.round(p.elo)+' · '+p.rating_source+' · '+p.rating_confidence"></div>
                            <div class="mt-2 flex gap-1">
                              <button @click="setPlayerStatus(p,'waiting')" class="rounded bg-lime-300/15 px-2 py-1 text-[10px] font-bold text-lime-200">QUEUE</button>
                              <button @click="setPlayerStatus(p,'paused')" class="rounded bg-white/10 px-2 py-1 text-[10px] font-bold">PAUSE</button>
                              <button @click="setPlayerStatus(p,'left')" class="rounded bg-red-400/10 px-2 py-1 text-[10px] font-bold text-red-200">LEFT</button>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                    <div class="chamfer border border-orange-400/30 bg-orange-950/10 p-4">
                      <h3 class="text-lg font-black uppercase text-orange-300" x-text="t('specialMatch')"></h3>
                      <p class="mt-1 text-xs text-slate-400" x-text="t('specialHint')"></p>
                      <button @click="openSpecial()" class="chamfer-sm mt-3 w-full border border-orange-300/60 px-4 py-3 text-xs font-black text-orange-200" x-text="t('manualCreate')"></button>
                    </div>
                    <div class="chamfer border border-white/10 bg-[#22272d] p-4">
                      <button @click="endEventSummary()" class="chamfer-sm w-full bg-white px-4 py-3 text-xs font-black text-black" x-text="t('endSummary')"></button>
                    </div>
                  </aside>
                </div>

    subscribe(){if(!this.db)return; if(this.channel)this.db.removeChannel(this.channel); this.channel=this.db.channel('psh_live').on('postgres_changes',{event:'*',schema:'public',table:'psh_events'},()=>this.refreshAll()).on('postgres_changes',{event:'*',schema:'public',table:'psh_event_players'},()=>this.refreshAll()).on('postgres_changes',{event:'*',schema:'public',table:'psh_matches'},()=>this.refreshAll()).on('postgres_changes',{event:'*',schema:'public',table:'psh_match_players'},()=>this.refreshAll()).subscribe();},

    previewEstimate(){let self=Number(this.join.selfRating)||2.5; let tech=0,tact=0,tc=0,ac=0; for(const q of this.questions){const v=Number(this.join.answers[q.key]||0); if(!v)continue; if(q.axis==='tech'){tech+=v;tc++}else{tact+=v;ac++}} tech=tc?tech/tc:0; tact=ac?tact/ac:0; const assessment=(tech&&tact)?((tech+tact)/2):0; const level=assessment?((self*.55)+(assessment*.45)):self; return {level,tech,tact,assessment};},

    async submitPlayer(){if(!this.selectedEventId)return this.flash('Select event first'); const nick=(this.join.nickname||'').trim(); if(!nick)return this.flash('Nickname required'); this.busy=true; try{const key=this.slugName(nick); let {data:player}=await this.db.from('psh_players').select('*').eq('nickname_key',key).maybeSingle(); if(!player){const ins=await this.db.from('psh_players').insert({nickname:nick,nickname_key:key}).select('*').single(); if(ins.error)throw ins.error; player=ins.data;} const est=this.previewEstimate(); const source=this.join.useAssessment&&est.assessment?'ai_assisted':'self_rated'; const payload={event_id:this.selectedEventId,player_id:player.id,nickname:nick,self_rating:Number(this.join.selfRating),tech_score:est.tech,tact_score:est.tact,estimated_level:est.level,elo:this.eloFromLevel(est.level),rating_source:source,rating_confidence:this.confidence(0,!!est.assessment),status:'waiting',queue_joined_at:new Date().toISOString()}; const up=await this.db.from('psh_event_players').upsert(payload,{onConflict:'event_id,player_id'}).select('*').single(); if(up.error)throw up.error; localStorage.setItem('psh_player_id',player.id); localStorage.setItem('psh_last_nickname',nick); this.flash('Joined queue'); await this.refreshAll();}catch(e){this.flash(e.message)}finally{this.busy=false}},
    get myEventPlayer(){const pid=localStorage.getItem('psh_player_id'); return this.eventPlayers.find(p=>p.player_id===pid)},
    myQueuePosition(){const m=this.myEventPlayer; if(!m)return null; const q=this.waitingPlayers(); const i=q.findIndex(p=>p.id===m.id); return i>=0?i+1:null},

    chooseFour(){const q=this.waitingPlayers(); if(q.length<4)return null; const pool=q.slice(0,Math.min(10,q.length)); const combos=this.combos(pool,4); let best=null,bestScore=Infinity; const now=Date.now(); for(const c of combos){const ratings=c.map(p=>this.power(p)); const range=Math.max(...ratings)-Math.min(...ratings); const avgWait=c.reduce((s,p)=>s+(now-new Date(p.queue_joined_at||now).getTime())/60000,0)/4; const beginners=c.filter(p=>p.estimated_level<2.55||p.rating_confidence==='low').length; const adv=c.filter(p=>p.estimated_level>=3.75).length; let protect=(beginners>=2&&adv>=1)?120:0; let score=range+protect-(avgWait*1.4); if(score<bestScore){bestScore=score;best=c}} return best},

    async matchAllAvailableCourts(){for(const c of this.courtNumbers()){if(!this.activeMatchByCourt(c)) await this.matchNext(c)}},
    async matchNext(court){const four=this.chooseFour(); if(!four)return this.flash('Need at least 4 waiting players'); await this.createMatch(court,four,'fair')},
    async createMatch(court,four,type='fair'){const teams=this.balanceTeams(four); const dur=(Number(this.settings.minutes)||12)*60; const ins=await this.db.from('psh_matches').insert({event_id:this.selectedEventId,court_number:court,status:'live',match_type:type,duration_seconds:dur,started_at:new Date().toISOString()}).select('*').single(); if(ins.error)return this.flash(ins.error.message); const m=ins.data; const rows=[...teams.A.map(p=>({match_id:m.id,event_player_id:p.id,team:'A',rating_before:p.elo})),...teams.B.map(p=>({match_id:m.id,event_player_id:p.id,team:'B',rating_before:p.elo}))]; const mp=await this.db.from('psh_match_players').insert(rows); if(mp.error)return this.flash(mp.error.message); const ids=four.map(p=>p.id); await this.db.from('psh_event_players').update({status:'playing',queue_joined_at:null}).in('id',ids); this.flash('Match created'); await this.refreshAll()},
    expected(a,b){return 1/(1+Math.pow(10,(b-a)/400))},
    async confirmScore(m){const input=this.scoreInputs[m.id]||{}; const a=Number(input.a),b=Number(input.b); if(Number.isNaN(a)||Number.isNaN(b)||a===b)return this.flash('Invalid score'); const A=this.matchTeam(m,'A'),B=this.matchTeam(m,'B'); if(A.length!==2||B.length!==2)return this.flash('Match players missing'); const aAvg=A.reduce((s,p)=>s+Number(p.elo),0)/2,bAvg=B.reduce((s,p)=>s+Number(p.elo),0)/2; const aWin=a>b; const expA=this.expected(aAvg,bAvg); const margin=Math.min(Math.abs(a-b),10); const mult=1+margin/20; const k=32; const delta=Math.round(k*mult*((aWin?1:0)-expA)); const updates=[]; const rows=this.matchRows(m); for(const p of [...A,...B]){const isA=A.some(x=>x.id===p.id); const won=isA?aWin:!aWin; const pf=isA?a:b, pa=isA?b:a; const newElo=Number(p.elo)+(isA?delta:-delta); const form=[...(p.last_form||[]),won?'W':'L'].slice(-5); updates.push(this.db.from('psh_event_players').update({elo:newElo,matches_played:p.matches_played+1,wins:p.wins+(won?1:0),losses:p.losses+(won?0:1),points_for:p.points_for+pf,points_against:p.points_against+pa,last_form:form,status:'waiting',queue_joined_at:new Date().toISOString(),rating_confidence:this.confidence(p.matches_played+1,false)}).eq('id',p.id)); const row=rows.find(r=>r.event_player_id===p.id); if(row)updates.push(this.db.from('psh_match_players').update({rating_after:newElo,result:won?'W':'L',points_for:pf,points_against:pa}).eq('id',row.id)); }
      updates.push(this.db.from('psh_matches').update({status:'confirmed',team_a_score:a,team_b_score:b,ended_at:new Date().toISOString()}).eq('id',m.id)); const res=await Promise.all(updates); const err=res.find(r=>r.error); if(err)this.flash(err.error.message); else this.flash('Score confirmed'); await this.refreshAll();},
    async cancelMatch(m){const ids=this.matchRows(m).map(r=>r.event_player_id); await this.db.from('psh_matches').update({status:'cancelled',ended_at:new Date().toISOString()}).eq('id',m.id); if(ids.length)await this.db.from('psh_event_players').update({status:'waiting',queue_joined_at:new Date().toISOString()}).in('id',ids); this.flash('Cancelled'); await this.refreshAll()},
    openSpecial(){this.specialSelected=[];this.specialOpen=true},
    selectablePlayers(){return this.eventPlayers.filter(p=>p.status==='waiting'||p.status==='paused'||p.status==='registered')},
    toggleSpecialPlayer(id){if(this.specialSelected.includes(id))this.specialSelected=this.specialSelected.filter(x=>x!==id); else if(this.specialSelected.length<4)this.specialSelected.push(id)},
    async createSpecialMatch(){if(this.specialSelected.length!==4)return this.flash('Pick exactly 4 players'); const court=this.courtNumbers().find(c=>!this.activeMatchByCourt(c))||1; const four=this.specialSelected.map(id=>this.eventPlayers.find(p=>p.id===id)).filter(Boolean); this.specialOpen=false; await this.createMatch(court,four,'special')},
    summaryText(){const ev=this.selectedEvent; const lb=this.leaderboard(); const top=lb.slice(0,5).map((p,i)=>`${i+1}. ${p.nickname} · ELO ${Math.round(p.elo)} · ${p.wins}-${p.losses}`).join('\n'); return `${ev?this.eventName(ev):'GDSQ OPEN PLAY'}\nPlayers: ${this.eventPlayers.length}\nMatches: ${this.confirmedMatches().length}\nWaiting: ${this.waitingPlayers().length}\n\nTOP RANKING\n${top||'-'}`},
    async copySummary(){await navigator.clipboard.writeText(this.summaryText()); this.flash('Summary copied')},
    endEventSummary(){this.go('stats');this.flash('Event summary ready')}
  }
}
</script>
