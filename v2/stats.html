<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>GDSQ v2 Event Stats</title>
<link rel="stylesheet" href="./styles.css" />
<style>body{margin:0;background:#0d1217;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif}.center{min-height:100svh;display:grid;place-items:center;padding:20px}.card{max-width:620px}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}</style>
</head>
<body>
<main class="center">
<section class="card cut hero">
<div class="micro lime">STATS v2</div>
<h1 style="font-size:34px;line-height:1.05;margin:8px 0">ย้ายไปหน้า Event Stats แบบ V1 แล้ว</h1>
<p class="muted">เพื่อให้ไม่สับสน หน้า stats ของ V2 จะพาไปหน้า summary ที่ทำ layout แบบ V1: cards, ranking, match history, player popup และ copy/share</p>
<div class="row"><a id="go" class="btn" href="./summary.html?v=v2-stats-v1style-01">Open Event Stats</a><a class="btn secondary" href="./events.html?v=v2-deeplink-01">Back to Events</a></div>
</section>
</main>
<script>
const q=new URLSearchParams(location.search);
const next=new URL('./summary.html',location.href);
['event','eventId','id','player','mode'].forEach(k=>{if(q.get(k))next.searchParams.set(k,q.get(k))});
next.searchParams.set('v','v2-stats-v1style-01');
document.getElementById('go').href=next.toString();
setTimeout(()=>{location.href=next.toString()},450);
</script>
</body>
</html>
