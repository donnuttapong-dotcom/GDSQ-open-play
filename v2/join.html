<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>GDSQ Join Open Play</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#10151b;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif}.cut{clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}.card{background:#222931;border:1px solid #39434d}.soft{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.1);border-radius:16px}.lime{color:#c7ff2e}.bg-lime{background:#c7ff2e;color:#10151b}.btn{border:1px solid rgba(255,255,255,.15);font-weight:900}input,select{background:#10151b!important;color:#fff!important;border-color:#3a424a!important}.mini{font-size:12px;color:#94a3b8}.pill{display:inline-flex;gap:6px;align-items:center;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:1000;border:1px solid rgba(255,255,255,.14);white-space:nowrap}.pill-live,.pill-ready{background:rgba(199,255,46,.14);border-color:rgba(199,255,46,.5);color:#c7ff2e}.pill-playing{background:rgba(251,146,60,.16);border-color:rgba(251,146,60,.5);color:#fb923c}.pill-rest{background:rgba(56,189,248,.13);border-color:rgba(56,189,248,.4);color:#7dd3fc}.pill-ended,.pill-left{background:rgba(148,163,184,.14);border-color:rgba(148,163,184,.35);color:#cbd5e1}
</style>
</head>
<body>
<header class="sticky top-0 z-50 bg-[#0d1217]/95 border-b border-white/10 p-3"><div class="max-w-xl mx-auto flex justify-between items-center gap-2"><div><div class="text-[10px] tracking-[.25em] lime">GDSQ PICKLEBALL</div><b>JOIN OPEN PLAY</b></div><a class="cut btn bg-white/5 px-3 py-2 text-xs" href="./openplay.html?mode=supabase">Organizer</a></div></header>
<main class="max-w-xl mx-auto p-4"><section class="cut card p-5 mt-4"><div class="flex justify-between items-start gap-3"><div><h1 class="text-3xl font-black">เข้าร่วมเล่น</h1><p class="mini mt-1">เลือกอีเว้นท์ Live ใส่ชื่อเล่น และเลือกระดับความสามารถของตัวเอง</p></div><span id="eventStatusBadge" class="pill pill-live">LIVE</span></div><div id="msg" class="hidden mt-4 p-3 rounded-xl border border-lime-300/40 bg-lime-300/10 text-lime-100 whitespace-pre-wrap"></div><div class="grid gap-4 mt-5"><label class="text-xs text-slate-400 font-black">Live Event / อีเว้นท์ที่เปิดอยู่<select id="eventSelect" class="w-full rounded-lg border p-4 mt-1"></select></label><label class="text-xs text-slate-400 font-black">Nickname / ชื่อเล่น<input id="playerName" class="w-full rounded-lg border p-4 mt-1" placeholder="ใส่ชื่อเล่น เช่น Don" autocomplete="name" /></label><label class="text-xs text-slate-400 font-black">Level / ระดับความสามารถ<select id="playerLevel" class="w-full rounded-lg border p-4 mt-1"></select></label><button id="joinBtn" class="cut bg-lime text-black p-5 font-black text-lg">JOIN / เข้าร่วม</button></div></section><section id="myInfoCard" class="cut card p-5 mt-4 hidden"><div class="flex justify-between items-start gap-3"><div><h2 class="text-2xl font-black lime">MY INFO</h2><p class="mini">ข้อมูลของฉันจากมือถือเครื่องนี้</p></div><button id="refreshMyInfoBtn" class="cut btn bg-white/5 px-3 py-2 text-xs">REFRESH</button></div><div id="myInfoBody" class="grid gap-3 mt-4"></div></section><section class="soft p-4 mt-4"><h2 class="font-black lime">วิธีเลือก Level</h2><p class="mini mt-2">2.00-3.00 = เริ่มเล่น / 3.25-4.00 = เล่นได้ต่อเนื่อง / 4.25+ = แข่งขันจริงจัง</p></section></main>
<script type="module">
import { createV2Services } from './src/services/index.js?v=v2-player-self-info-01';
const $=(id)=>document.getElementById(id);const services=createV2Services();const levels=Array.from({length:25},(_,i)=>2+i*.25);const MY_PREFIX='gdsq_v2_my_player:';let events=[];
function params(){return new URLSearchParams(location.search)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function eventTitle(e){return e?.name||e?.name_th||e?.name_en||'Untitled Event'}
function eventStatus(e){return String(e?.status||'draft').toLowerCase()}
function isLiveEvent(e){return eventStatus(e)==='live'}
function playerName(p){return p?.displayName||p?.name||p?.nickname||'-'}
function playerLevel(p){return Number(p?.estimatedLevel||p?.estimated_level||p?.level||0)}
function playerStatus(p){return String(p?.status||'ready').toLowerCase()}
function myKey(eventId){return `${MY_PREFIX}${eventId}`}
function saveMyPlayer(eventId,player){if(eventId&&player?.id)localStorage.setItem(myKey(eventId),String(player.id))}
function myPlayerId(eventId){return localStorage.getItem(myKey(eventId))||''}
function statusPill(status){const cls=status==='playing'?'pill-playing':status==='rest'?'pill-rest':status==='left'?'pill-left':'pill-ready';const label=status==='playing'?'PLAYING':status==='rest'?'REST':status==='left'?'LEFT':'READY';return `<span class="pill ${cls}">${label}</span>`}
function showMessage(text,good=true){const msg=$('msg');msg.textContent=text;msg.className=`mt-4 p-3 rounded-xl border whitespace-pre-wrap ${good?'border-lime-300/40 bg-lime-300/10 text-lime-100':'border-red-300/40 bg-red-300/10 text-red-100'}`}
function selectedEvent(){return events.find(e=>String(e.id)===String($('eventSelect').value))||null}
function renderLevels(){$('playerLevel').innerHTML=levels.map(l=>`<option value="${l}">${l.toFixed(2)}</option>`).join('');$('playerLevel').value='3'}
function renderEvents(){const requestedId=params().get('event')||params().get('eventId')||params().get('id');const liveEvents=events.filter(isLiveEvent).sort((a,b)=>String(eventTitle(a)).localeCompare(String(eventTitle(b))));$('eventSelect').innerHTML=liveEvents.map(e=>`<option value="${e.id}">[LIVE] ${eventTitle(e)}</option>`).join('');if(requestedId&&liveEvents.some(e=>String(e.id)===String(requestedId)))$('eventSelect').value=requestedId;else if(liveEvents[0])$('eventSelect').value=liveEvents[0].id;if(!liveEvents.length)showMessage('ยังไม่มีอีเว้นท์ Live ให้เข้าร่วม',false);updateStatusBadge()}
function updateStatusBadge(){const badge=$('eventStatusBadge');const live=!!selectedEvent();badge.textContent=live?'LIVE':'NO LIVE';badge.className=`pill ${live?'pill-live':'pill-ended'}`}
function updateUrlForEvent(){const eventId=$('eventSelect').value;const url=new URL(location.href);url.searchParams.set('mode','supabase');if(eventId)url.searchParams.set('event',eventId);url.searchParams.set('v','v2-player-self-info-01');history.replaceState(null,'',url.toString())}
function queuePosition(players,me){const waiting=players.filter(p=>['ready','checked_in'].includes(playerStatus(p))).sort((a,b)=>new Date(a.queueJoinedAt||a.queue_joined_at||a.createdAt||0)-new Date(b.queueJoinedAt||b.queue_joined_at||b.createdAt||0));const index=waiting.findIndex(p=>String(p.id)===String(me.id));return index>=0?index+1:null}
function teamLabel(match,id){const a=(match.teamA||[]).map(String),b=(match.teamB||[]).map(String);return a.includes(String(id))?'A':b.includes(String(id))?'B':'-'}
function matchPlayersNames(match,players,team){const ids=(team==='A'?match.teamA:match.teamB)||[];return ids.map(id=>playerName(players.find(p=>String(p.id)===String(id))||{displayName:id})).join(' / ')}
function myActiveMatch(matches,id){return matches.find(m=>['preview','playing','assigned','pending_score'].includes(String(m.status||'').toLowerCase())&&[...(m.teamA||[]),...(m.teamB||[])].map(String).includes(String(id)))}
function myStats(matches,id){const confirmed=matches.filter(m=>['confirmed','completed'].includes(String(m.status||'').toLowerCase())&&[...(m.teamA||[]),...(m.teamB||[])].map(String).includes(String(id)));let wins=0;confirmed.forEach(m=>{const team=teamLabel(m,id);if(String(m.winner||'').toUpperCase()===team)wins+=1});return{played:confirmed.length,wins,losses:confirmed.length-wins}}
async function refreshMyInfo(){const event=selectedEvent();if(!event)return;$('myInfoCard').classList.remove('hidden');const id=myPlayerId(event.id);if(!id){$('myInfoBody').innerHTML='<div class="soft p-4 mini">ยังไม่มีข้อมูลของคุณในมือถือเครื่องนี้ กด Join ก่อนแล้วข้อมูลจะแสดงตรงนี้</div>';return}const [players,matches]=await Promise.all([services.listEventPlayers(event.id),services.listEventMatches(event.id)]);const me=players.find(p=>String(p.id)===String(id));if(!me){$('myInfoBody').innerHTML='<div class="soft p-4 mini">ไม่พบข้อมูลผู้เล่นของคุณในอีเว้นท์นี้ อาจถูกลบ หรือเปลี่ยนอีเว้นท์แล้ว</div>';return}const pos=queuePosition(players,me);const active=myActiveMatch(matches,me.id);const stats=myStats(matches,me.id);const activeHtml=active?`<div class="soft p-4"><div class="mini">MATCH</div><div class="font-black">${String(active.status||'').toUpperCase()} · Court ${active.courtNumber||active.court_number||'-'} · Team ${teamLabel(active,me.id)}</div><div class="mini mt-2">A: ${esc(matchPlayersNames(active,players,'A'))}</div><div class="mini">B: ${esc(matchPlayersNames(active,players,'B'))}</div></div>`:`<div class="soft p-4"><div class="mini">MATCH</div><div class="font-black">ยังไม่ได้ถูกจัดลงแมตช์</div></div>`;$('myInfoBody').innerHTML=`<div class="soft p-4"><div class="flex justify-between gap-3"><div><div class="mini">PLAYER</div><div class="text-2xl font-black">${esc(playerName(me))}</div><div class="mini">Level ${playerLevel(me).toFixed(2)} · Event: ${esc(eventTitle(event))}</div></div>${statusPill(playerStatus(me))}</div></div><div class="grid grid-cols-3 gap-2"><div class="soft p-3 text-center mini">Queue<br><b class="text-xl lime">${pos||'-'}</b></div><div class="soft p-3 text-center mini">Played<br><b class="text-xl">${stats.played}</b></div><div class="soft p-3 text-center mini">W/L<br><b class="text-xl">${stats.wins}/${stats.losses}</b></div></div>${activeHtml}<div class="mini text-center">อัปเดตล่าสุด ${new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>`}
async function submitJoin(){const event=selectedEvent();const name=$('playerName').value.trim();const level=Number($('playerLevel').value||3);if(!event)return showMessage('ยังไม่มีอีเว้นท์ Live ให้เข้าร่วม',false);if(!name)return showMessage('กรุณาใส่ชื่อเล่นก่อน',false);await services.selectEvent(event.id);const player=await services.checkInPlayer({eventId:event.id,displayName:name,level});saveMyPlayer(event.id,player);showMessage(`เข้าร่วมแล้ว: ${name}\nEvent: ${eventTitle(event)}\nLevel: ${level.toFixed(2)}`);$('playerName').value='';await refreshMyInfo()}
async function boot(){renderLevels();events=await services.listEvents();localStorage.setItem('gdsq_v2_events',JSON.stringify(events));renderEvents();$('eventSelect').addEventListener('change',()=>{updateStatusBadge();updateUrlForEvent();refreshMyInfo()});$('joinBtn').addEventListener('click',submitJoin);$('refreshMyInfoBtn').addEventListener('click',refreshMyInfo);$('playerName').addEventListener('keydown',e=>{if(e.key==='Enter')submitJoin()});await refreshMyInfo();setInterval(refreshMyInfo,7000)}
boot().catch(error=>showMessage(error.message||'โหลดข้อมูลไม่สำเร็จ',false));
</script>
</body>
</html>
