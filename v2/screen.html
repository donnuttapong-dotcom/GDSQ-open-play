<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GDSQ Live Court Screen</title>
  <style>
    :root{--bg:#07110f;--panel:rgba(255,255,255,.075);--panel2:rgba(255,255,255,.12);--line:rgba(255,255,255,.13);--text:#f4fff8;--muted:rgba(244,255,248,.68);--soft:rgba(244,255,248,.42);--lime:#b7ff35;--lime2:#dcff8b;--cyan:#4fe7ff;--orange:#ffb02e;--red:#ff5d5d;--shadow:0 18px 50px rgba(0,0,0,.32);--radius:24px}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 18% 12%,rgba(183,255,53,.20),transparent 30%),radial-gradient(circle at 78% 10%,rgba(255,77,166,.14),transparent 28%),linear-gradient(135deg,#050807 0%,#07110f 48%,#0d1917 100%);overflow-x:hidden}.screen{min-height:100vh;padding:22px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:16px;min-width:0}.logo{width:58px;height:58px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(135deg,var(--lime),#71ff91);color:#06100d;font-weight:950;letter-spacing:-1px;box-shadow:0 0 32px rgba(183,255,53,.25)}.title h1{margin:0;font-size:clamp(26px,3vw,46px);letter-spacing:-.04em;line-height:1}.title p{margin:8px 0 0;color:var(--muted);font-size:15px}.meta{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:10px}.pill{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);padding:10px 14px;border-radius:999px;font-size:14px;font-weight:850;white-space:nowrap}.live{border-color:rgba(183,255,53,.45);background:rgba(183,255,53,.12);color:var(--lime2)}.main-grid{display:grid;grid-template-columns:1.28fr .72fr;gap:18px;min-height:0}.section{border:1px solid var(--line);background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;backdrop-filter:blur(14px)}.section-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.045)}.section-head h2{margin:0;font-size:17px;letter-spacing:.045em;text-transform:uppercase}.section-head span{color:var(--muted);font-size:13px;font-weight:800}.courts{padding:16px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.court-card{min-height:236px;border:1px solid rgba(255,255,255,.13);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.045)),rgba(255,255,255,.04);padding:16px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}.court-card::after{content:"";position:absolute;inset:auto -40px -80px auto;width:180px;height:180px;border-radius:999px;background:rgba(183,255,53,.12);pointer-events:none}.court-top{display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:1}.court-name{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;font-weight:850}.status{font-size:12px;font-weight:900;padding:7px 10px;border-radius:999px;background:rgba(183,255,53,.14);color:var(--lime2);border:1px solid rgba(183,255,53,.35)}.status.waiting{color:var(--orange);border-color:rgba(255,176,46,.35);background:rgba(255,176,46,.12)}.status.empty{color:var(--muted);border-color:rgba(255,255,255,.16);background:rgba(255,255,255,.05)}.match{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin:18px 0}.team{min-height:104px;display:grid;align-content:center;gap:9px;padding:14px;border-radius:18px;background:rgba(0,0,0,.20);border:1px solid rgba(255,255,255,.10)}.team-label{color:var(--soft);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:850}.player{font-size:clamp(22px,1.85vw,32px);line-height:.96;font-weight:950;letter-spacing:-.05em}.vs{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;color:#06100d;font-weight:950;background:var(--lime);box-shadow:0 0 28px rgba(183,255,53,.26)}.timer-row{position:relative;z-index:1;display:flex;align-items:end;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px;font-weight:800}.timer{color:var(--text);font-size:30px;font-weight:950;letter-spacing:-.05em;line-height:1}.side{display:grid;grid-template-rows:auto auto 1fr;gap:18px;min-height:0}.next-card{padding:16px}.next-big{border-radius:22px;padding:18px;background:linear-gradient(135deg,rgba(183,255,53,.18),rgba(79,231,255,.10));border:1px solid rgba(183,255,53,.24)}.next-label{display:flex;align-items:center;justify-content:space-between;color:var(--lime2);font-weight:950;text-transform:uppercase;letter-spacing:.08em;font-size:13px;margin-bottom:16px}.next-match{display:grid;gap:12px}.next-team{font-size:26px;line-height:.95;font-weight:950;letter-spacing:-.05em}.next-vs{color:var(--muted);font-weight:900;font-size:13px;letter-spacing:.12em}.get-ready{margin-top:16px;color:#06100d;background:var(--lime);border-radius:16px;padding:12px 14px;text-align:center;font-weight:950;letter-spacing:-.02em}.lists{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}.mini-list{border-radius:20px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.10);padding:13px;min-height:148px}.mini-list h3{margin:0 0 10px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08)}.row:last-child{border-bottom:0}.name{font-weight:900;letter-spacing:-.02em}.tag{color:var(--soft);font-size:12px;font-weight:800}.tag.rest{color:var(--orange)}.tag.new{color:var(--lime2)}.ranking-wrap{padding:14px}table{width:100%;border-collapse:collapse;table-layout:fixed;overflow:hidden;border-radius:18px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.10)}th,td{padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}th{color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:900;background:rgba(255,255,255,.045)}tr:last-child td{border-bottom:0}td.rank{width:36px;color:var(--lime2);font-weight:950}td.player-name{font-weight:950;letter-spacing:-.02em}td.num{text-align:right;font-weight:850;color:var(--text)}.empty-state{padding:24px;color:var(--muted);font-weight:850;text-align:center}.ticker{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.06);padding:13px 18px;display:flex;gap:12px;align-items:center;overflow:hidden;color:var(--muted);font-weight:800;white-space:nowrap}.dot{width:10px;height:10px;border-radius:999px;background:var(--lime);box-shadow:0 0 18px rgba(183,255,53,.65);flex:0 0 auto}.link{color:var(--lime2);text-decoration:none;font-weight:950}@media(max-width:1180px){.main-grid{grid-template-columns:1fr}.side{grid-template-rows:auto}}@media(max-width:760px){.screen{padding:14px}.topbar{align-items:flex-start;flex-direction:column}.meta{justify-content:flex-start}.courts{grid-template-columns:1fr}.match{grid-template-columns:1fr}.vs{margin:-4px auto;transform:rotate(90deg)}.lists{grid-template-columns:1fr}.player{font-size:30px}th,td{font-size:12px;padding:9px 6px}}
  </style>
</head>
<body>
  <main class="screen">
    <header class="topbar">
      <div class="brand">
        <div class="logo">GDSQ</div>
        <div class="title">
          <h1>Live Court Screen</h1>
          <p id="eventSubtitle">Loading event...</p>
        </div>
      </div>
      <div class="meta">
        <div id="livePill" class="pill live">● LIVE</div>
        <div id="playerPill" class="pill">0 Players</div>
        <div id="courtPill" class="pill">0 Courts</div>
        <div id="roundPill" class="pill">0 Matches</div>
      </div>
    </header>

    <section class="main-grid">
      <section class="section">
        <div class="section-head"><h2>Now Playing</h2><span id="updatedAt">-</span></div>
        <div id="courtsGrid" class="courts"></div>
      </section>

      <aside class="side">
        <section class="section">
          <div class="section-head"><h2>Next Match</h2><span>Get ready</span></div>
          <div id="nextMatch" class="next-card"></div>
        </section>

        <section class="section">
          <div class="section-head"><h2>Waiting / Rest</h2><span>Fair rotation</span></div>
          <div class="lists">
            <div class="mini-list"><h3>Waiting</h3><div id="waitingList"></div></div>
            <div class="mini-list"><h3>Rest</h3><div id="restList"></div></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head"><h2>Session Ranking</h2><span>Top 8</span></div>
          <div class="ranking-wrap"><table aria-label="Session ranking"><thead><tr><th style="width:40px">#</th><th>Player</th><th style="width:62px;text-align:right">W-L</th><th style="width:58px;text-align:right">P</th><th style="width:58px;text-align:right">Diff</th></tr></thead><tbody id="rankingBody"></tbody></table></div>
        </section>
      </aside>
    </section>

    <footer class="ticker"><span class="dot"></span><span id="footerText">Read-only display · No match edit · No queue edit · Auto refresh every 10 seconds</span></footer>
  </main>

  <script type="module">
    import { createV2Services } from './src/services/index.js?v=v2-screen-01';
    import { buildMatchHistoryStats, shouldRest } from './src/logic/matchmaking/generateMatches.js?v=v2-screen-01';

    const $ = (id) => document.getElementById(id);
    const services = createV2Services();
    const params = new URLSearchParams(location.search);
    const AUTO_REFRESH_MS = Number(params.get('refresh') || 10000);
    let refreshTimer = null;

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function playerId(player) { return String(player?.id || player?.eventPlayerId || player?.event_player_id || ''); }
    function playerName(player) { return player?.displayName || player?.display_name || player?.nickname || player?.name || 'Player'; }
    function statusOf(item) { return String(item?.status || '').toLowerCase(); }
    function courtNumberOf(match) { return Number(match?.courtNumber || match?.court_number || String(match?.courtName || match?.court_name || '').match(/\d+/)?.[0] || 0); }
    function teamAOf(match) { return normalizeTeam(match?.teamA || match?.team_a || match?.A || match?.teams?.A); }
    function teamBOf(match) { return normalizeTeam(match?.teamB || match?.team_b || match?.B || match?.teams?.B); }
    function normalizeTeam(team) { return (team || []).map((item) => typeof item === 'string' ? item : item?.id || item?.playerId || item?.eventPlayerId || item?.event_player_id).filter(Boolean).map(String); }
    function scoreA(match) { return Number(match?.teamAScore ?? match?.team_a_score ?? 0) || 0; }
    function scoreB(match) { return Number(match?.teamBScore ?? match?.team_b_score ?? 0) || 0; }
    function timeOf(match) { return new Date(match?.completedAt || match?.completed_at || match?.startedAt || match?.started_at || match?.updatedAt || match?.updated_at || match?.createdAt || match?.created_at || 0).getTime() || 0; }
    function isPlaying(match) { return ['playing', 'live'].includes(statusOf(match)); }
    function isPreview(match) { return ['preview', 'ready', 'next'].includes(statusOf(match)); }
    function isConfirmed(match) { return ['confirmed', 'completed', 'done'].includes(statusOf(match)); }

    function names(ids, playerMap) {
      const lines = ids.map((id) => playerName(playerMap.get(String(id)) || { name: id })).slice(0, 2);
      return lines.length ? lines.map(esc).join('<br>') : '—<br>—';
    }

    function matchLabel(match) {
      const status = statusOf(match);
      if (status === 'playing' || status === 'live') return { text: 'Playing', cls: '' };
      if (status === 'preview' || status === 'ready' || status === 'next') return { text: 'Ready Next', cls: 'waiting' };
      return { text: 'Waiting', cls: 'empty' };
    }

    function buildRanking(players, matches) {
      const stats = new Map(players.map((player) => [playerId(player), { player, played: 0, w: 0, l: 0, pf: 0, pa: 0, diff: 0 }]));
      matches.filter(isConfirmed).forEach((match) => {
        const a = scoreA(match), b = scoreB(match);
        const teamA = teamAOf(match), teamB = teamBOf(match);
        if (!teamA.length || !teamB.length) return;
        teamA.forEach((id) => applyScore(stats, id, a, b));
        teamB.forEach((id) => applyScore(stats, id, b, a));
      });
      return [...stats.values()].sort((a, b) => b.w - a.w || b.diff - a.diff || b.played - a.played || playerName(a.player).localeCompare(playerName(b.player))).slice(0, 8);
    }

    function applyScore(stats, id, pf, pa) {
      const row = stats.get(String(id));
      if (!row) return;
      row.played += 1;
      row.pf += pf;
      row.pa += pa;
      row.diff = row.pf - row.pa;
      if (pf > pa) row.w += 1;
      else if (pa > pf) row.l += 1;
    }

    function renderCourtCard(court, match, playerMap) {
      const label = match ? matchLabel(match) : { text: 'Waiting', cls: 'empty' };
      const teamA = match ? teamAOf(match) : [];
      const teamB = match ? teamBOf(match) : [];
      const started = match?.startedAt || match?.started_at;
      const minutes = started ? Math.max(0, Math.floor((Date.now() - new Date(started).getTime()) / 60000)) : null;
      const bottomText = match ? (started ? `Started ${new Date(started).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}` : statusOf(match).toUpperCase()) : 'Open court';
      const timerText = match ? (minutes !== null ? `${String(minutes).padStart(2, '0')}:00` : (isPreview(match) ? 'NEXT' : 'LIVE')) : 'WAIT';
      return `<article class="court-card"><div class="court-top"><div class="court-name">${esc(court.name || court.id || 'Court')}</div><div class="status ${label.cls}">${esc(label.text)}</div></div><div class="match"><div class="team"><div class="team-label">Team A</div><div class="player">${names(teamA, playerMap)}</div></div><div class="vs">VS</div><div class="team"><div class="team-label">Team B</div><div class="player">${names(teamB, playerMap)}</div></div></div><div class="timer-row"><span>${esc(bottomText)}</span><strong class="timer">${esc(timerText)}</strong></div></article>`;
    }

    function renderNextMatch(match, playerMap) {
      if (!match) {
        $('nextMatch').innerHTML = '<div class="empty-state">ยังไม่มี Next Match</div>';
        return;
      }
      const court = match.courtName || match.court_name || `Court ${courtNumberOf(match) || '-'}`;
      $('nextMatch').innerHTML = `<div class="next-big"><div class="next-label"><span>${esc(court)}</span><span>Next Up</span></div><div class="next-match"><div class="next-team">${names(teamAOf(match), playerMap).replace('<br>', ' + ')}</div><div class="next-vs">VERSUS</div><div class="next-team">${names(teamBOf(match), playerMap).replace('<br>', ' + ')}</div></div><div class="get-ready">Please get ready near ${esc(court)}</div></div>`;
    }

    function renderList(id, rows, emptyText) {
      $(id).innerHTML = rows.length ? rows.slice(0, 6).map(({ player, tag, cls }) => `<div class="row"><span class="name">${esc(playerName(player))}</span><span class="tag ${cls || ''}">${esc(tag)}</span></div>`).join('') : `<div class="empty-state">${esc(emptyText)}</div>`;
    }

    function renderRanking(players, matches) {
      const ranking = buildRanking(players, matches);
      $('rankingBody').innerHTML = ranking.length ? ranking.map((row, index) => `<tr><td class="rank">${index + 1}</td><td class="player-name">${esc(playerName(row.player))}</td><td class="num">${row.w}-${row.l}</td><td class="num">${row.played}</td><td class="num">${row.diff > 0 ? '+' : ''}${row.diff}</td></tr>`).join('') : '<tr><td colspan="5" class="empty-state">ยังไม่มีสถิติ</td></tr>';
    }

    async function refresh() {
      try {
        const event = await services.getCurrentEvent();
        if (!event?.id) throw new Error('No event selected. Open this page with ?event=EVENT_ID or select an event in Open Play first.');
        const [players, matches, courts] = await Promise.all([services.listEventPlayers(event.id), services.listEventMatches(event.id), services.getCourts()]);
        const playerMap = new Map(players.map((player) => [playerId(player), player]));
        const courtList = courts.length ? courts : [{ id: 'court-1', name: 'Court 1' }];
        const playingMatches = matches.filter(isPlaying).sort((a, b) => timeOf(b) - timeOf(a));
        const previewMatches = matches.filter(isPreview).sort((a, b) => timeOf(a) - timeOf(b));
        const confirmedMatches = matches.filter(isConfirmed);
        const historyStats = buildMatchHistoryStats(confirmedMatches);
        const liveIds = new Set(playingMatches.flatMap((match) => [...teamAOf(match), ...teamBOf(match)]));
        const autoRestIds = new Set(players.filter((player) => shouldRest(player, historyStats)).map(playerId));

        $('eventSubtitle').textContent = `${event.title || event.name || 'GDSQ Open Play'} · ${event.venue || event.location || 'Court'} · ${event.date || ''}`;
        $('livePill').textContent = `● ${String(event.status || 'LIVE').toUpperCase()}`;
        $('playerPill').textContent = `${players.length} Players`;
        $('courtPill').textContent = `${courtList.length} Courts`;
        $('roundPill').textContent = `${confirmedMatches.length} Matches`;
        $('updatedAt').textContent = `Updated ${new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}`;

        $('courtsGrid').innerHTML = courtList.map((court, index) => {
          const courtNo = Number(String(court.id || court.name || index + 1).match(/\d+/)?.[0] || index + 1);
          const match = playingMatches.find((item) => courtNumberOf(item) === courtNo) || previewMatches.find((item) => courtNumberOf(item) === courtNo) || null;
          return renderCourtCard(court, match, playerMap);
        }).join('');

        renderNextMatch(previewMatches[0], playerMap);

        const waiting = players.filter((player) => ['ready', 'checked_in', 'waiting'].includes(statusOf(player) || 'ready') && !liveIds.has(playerId(player)) && !autoRestIds.has(playerId(player))).map((player) => ({ player, tag: confirmedMatches.some((match) => [...teamAOf(match), ...teamBOf(match)].includes(playerId(player))) ? 'Ready' : 'New', cls: 'new' }));
        const rest = players.filter((player) => ['rest', 'resting', 'paused'].includes(statusOf(player)) || autoRestIds.has(playerId(player))).filter((player) => !liveIds.has(playerId(player))).map((player) => ({ player, tag: autoRestIds.has(playerId(player)) ? 'Auto Rest' : 'Rest', cls: 'rest' }));
        renderList('waitingList', waiting, 'ไม่มีคนรอ');
        renderList('restList', rest, 'ไม่มีคนพัก');
        renderRanking(players, matches);
        $('footerText').innerHTML = `Read-only display · <a class="link" href="./openplay.html?event=${encodeURIComponent(event.id)}&mode=${encodeURIComponent(params.get('mode') || services.mode || 'supabase')}">Open Organizer</a> · Auto refresh every ${Math.round(AUTO_REFRESH_MS / 1000)} seconds`;
      } catch (err) {
        $('courtsGrid').innerHTML = `<div class="empty-state">${esc(err.message || err)}</div>`;
        $('nextMatch').innerHTML = '<div class="empty-state">ยังโหลดข้อมูลไม่ได้</div>';
        $('rankingBody').innerHTML = '<tr><td colspan="5" class="empty-state">ยังไม่มีข้อมูล</td></tr>';
      } finally {
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(refresh, Math.max(5000, AUTO_REFRESH_MS));
      }
    }

    refresh();
  </script>
</body>
</html>
