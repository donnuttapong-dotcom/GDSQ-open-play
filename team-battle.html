<!doctype html>
<html lang="th" x-data="tb()" x-init="init()">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GDSQ Team Battle</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>body{background:#11161b;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif}.cut{clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}.card{background:#222931;border:1px solid #39434d}.soft{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.1);border-radius:16px}.lime{color:#c7ff2e}.bg-lime{background:#c7ff2e;color:#111}.btn{border:1px solid rgba(255,255,255,.14);font-weight:900}input,select{background:#10151b!important;color:white!important;border-color:#3a424a!important}.mini{font-size:12px;color:#94a3b8}.chip{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;text-align:center}[x-cloak]{display:none!important}</style>
</head>
<body>
<header class="sticky top-0 z-50 bg-[#0d1217]/95 border-b border-white/10 p-3"><div class="max-w-6xl mx-auto flex justify-between items-center gap-2"><div class="flex items-center gap-2"><a class="cut bg-lime px-3 py-2 font-black" href="./">← HOME</a><div><div class="text-[10px] tracking-[.25em] lime">GDSQ PICKLEBALL</div><b>TEAM BATTLE</b></div></div><div class="flex gap-2"><button class="cut btn bg-white/5 px-3 py-2 text-xs" @click="resetAll()" x-text="t('new')"></button><button class="cut bg-orange-400 text-black px-4 py-2 font-black" @click="toggle()" x-text="lang==='th'?'EN':'TH'"></button></div></div></header>
<main class="max-w-6xl mx-auto p-3">
<nav class="grid grid-cols-5 gap-2 text-xs font-black text-center mb-4"><template x-for="(s,i) in steps" :key="s"><button class="cut btn py-3" :class="tab===i?'bg-lime':'bg-white/5'" @click="tab=i" x-text="(i+1)+'. '+t(s)"></button></template></nav>
<div x-show="msg" class="mb-3 p-3 rounded-xl border border-lime-300/40 bg-lime-300/10 text-lime-200" x-text="msg"></div>
<section x-show="tab===0" x-cloak><div class="grid lg:grid-cols-[1fr_.8fr] gap-4"><div class="cut card p-4"><h1 class="text-3xl font-black" x-text="t('setupTitle')"></h1><p class="mini mt-1" x-text="t('setupHelp')"></p><div class="grid sm:grid-cols-2 gap-3 mt-4"><div><div class="mini" x-text="t('name')"></div><input class="w-full rounded-lg border p-3 mt-1" x-model="battle.name"></div><div><div class="mini" x-text="t('venue')"></div><input class="w-full rounded-lg border p-3 mt-1" x-model="battle.venue"></div><div><div class="mini" x-text="t('teamsCount')"></div><select class="w-full rounded-lg border p-3 mt-1" x-model.number="battle.teamCount"><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></div><div><div class="mini" x-text="t('rounds')"></div><select class="w-full rounded-lg border p-3 mt-1" x-model.number="battle.rounds"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div></div><button class="cut bg-lime p-4 font-black w-full mt-4" @click="save();tab=1" x-text="t('saveNext')"></button></div><div class="cut card p-4"><h2 class="text-xl font-black lime" x-text="t('how')"></h2><div class="soft p-3 mt-3" x-text="t('how1')"></div><div class="soft p-3 mt-3" x-text="t('how2')"></div><div class="soft p-3 mt-3" x-text="t('how3')"></div></div></div></section>
<section x-show="tab===1" x-cloak><div class="grid lg:grid-cols-[.8fr_1.2fr] gap-4"><div class="cut card p-4"><h1 class="text-3xl font-black" x-text="t('players')"></h1><div class="grid gap-2 mt-4"><input class="rounded-lg border p-3" x-model="form.name" :placeholder="t('playerName')"><select class="rounded-lg border p-3" x-model.number="form.rating"><option value="2">2.0 Beginner</option><option value="2.5">2.5</option><option value="3">3.0</option><option value="3.5">3.5</option><option value="4">4.0 Strong</option></select><button class="cut bg-lime p-4 font-black" @click="addPlayer()" x-text="t('addPlayer')"></button></div><div class="grid grid-cols-2 gap-2 mt-3"><button class="cut btn bg-white/5 p-3" @click="demo()">DEMO 16</button><button class="cut bg-orange-400 text-black p-3 font-black" @click="balance()" x-text="t('autoTeams')"></button></div></div><div class="cut card p-4"><div class="flex justify-between"><h2 class="text-xl font-black lime" x-text="t('playerList')"></h2><span class="mini" x-text="players.length+' players'"></span></div><div class="grid sm:grid-cols-2 gap-2 mt-3"><template x-for="p in players" :key="p.id"><div class="soft p-3"><div class="flex justify-between"><div><b x-text="p.name"></b><div class="mini" x-text="'Rating '+p.rating+' · '+teamName(p.team)"></div></div><button class="rounded bg-red-600 px-2 text-xs font-black" @click="removePlayer(p.id)">X</button></div></div></template></div></div></div></section>
<section x-show="tab===2" x-cloak><div class="cut card p-4 mb-4"><div class="flex justify-between gap-2"><div><h1 class="text-3xl font-black" x-text="t('teams')"></h1><p class="mini" x-text="t('teamsHelp')"></p></div><button class="cut bg-lime px-4 py-3 font-black" @click="makeMatches()" x-text="t('createMatches')"></button></div></div><div class="grid md:grid-cols-2 xl:grid-cols-4 gap-4"><template x-for="team in teams" :key="team.id"><div class="cut card p-4"><h2 class="text-xl font-black lime" x-text="team.name"></h2><div class="chip mt-3"><b x-text="avg(team.id).toFixed(2)"></b><div class="mini">Avg Rating</div></div><div class="grid gap-2 mt-3"><template x-for="p in teamPlayers(team.id)" :key="p.id"><div class="soft p-2"><b x-text="p.name"></b><div class="mini" x-text="'Rating '+p.rating"></div></div></template></div></div></template></div></section>
<section x-show="tab===3" x-cloak><div class="grid lg:grid-cols-[1fr_.8fr] gap-4"><div class="cut card p-4"><h1 class="text-3xl font-black" x-text="t('matches')"></h1><div class="grid gap-3 mt-4"><template x-for="m in matches" :key="m.id"><div class="soft p-3"><div class="flex justify-between gap-2"><div><b x-text="'Match '+m.no+' · '+teamName(m.a)+' vs '+teamName(m.b)"></b><div class="mini" x-text="m.status+' '+scoreLine(m)"></div></div><button class="cut btn bg-white/5 px-3 py-2 text-xs" @click="select(m)" x-text="t('score')"></button></div></div></template></div></div><div class="cut card p-4"><h2 class="text-xl font-black lime" x-text="t('scoreControl')"></h2><template x-if="!active"><div class="soft p-4 mt-3 text-slate-400" x-text="t('selectMatch')"></div></template><template x-if="active"><div><div class="grid grid-cols-2 gap-2 mt-3"><div class="soft p-3"><b x-text="teamName(active.a)"></b><input type="number" class="w-full rounded-lg border p-3 mt-2 text-center text-2xl font-black" x-model.number="scoreA"></div><div class="soft p-3"><b x-text="teamName(active.b)"></b><input type="number" class="w-full rounded-lg border p-3 mt-2 text-center text-2xl font-black" x-model.number="scoreB"></div></div><button class="cut bg-lime p-4 font-black w-full mt-3" @click="confirm()" x-text="t('confirm')"></button></div></template><h3 class="font-black lime mt-5" x-text="t('ranking')"></h3><table class="w-full text-sm mt-2"><tbody><template x-for="(s,i) in standings()" :key="s.id"><tr class="border-t border-white/10"><td class="py-2" x-text="(i+1)+'. '+s.name"></td><td class="text-right" x-text="'W'+s.w+' Diff '+s.diff"></td></tr></template></tbody></table></div></div></section>
<section x-show="tab===4" x-cloak><div class="grid lg:grid-cols-[.8fr_1.2fr] gap-4"><div class="cut card p-4"><h1 class="text-3xl font-black lime" x-text="t('summary')"></h1><pre class="mt-3 rounded-xl bg-black/30 p-3 text-sm whitespace-pre-wrap" x-text="summaryText()"></pre><button class="cut bg-lime p-4 font-black w-full mt-3" @click="copy()" x-text="t('copy')"></button></div><div class="cut card p-4"><h2 class="text-xl font-black">Result</h2><div class="grid sm:grid-cols-2 gap-2 mt-3"><div class="chip"><b x-text="winner()?.name||'-'"></b><div class="mini">Champion Team</div></div><div class="chip"><b x-text="done().length+'/'+matches.length"></b><div class="mini">Matches</div></div></div></div></div></section>
</main>
<script>
function tb(){return{lang:localStorage.gdsq_tb_lang||'th',tab:0,msg:'',active:null,scoreA:'',scoreB:'',battle:{name:'GDSQ Team Battle',venue:'',teamCount:2,rounds:2},players:[],teams:[],matches:[],form:{name:'',rating:3},steps:['setup','players','teams','matches','summary'],d:{th:{new:'NEW',setup:'ตั้งค่า',players:'ผู้เล่น',teams:'ทีม',matches:'แมตช์',summary:'สรุปผล',setupTitle:'ตั้งค่า Team Battle',setupHelp:'แบ่งทีมสี รวมคะแนนทีม เหมาะกับกิจกรรมคลับ',name:'ชื่อกิจกรรม',venue:'สถานที่',teamsCount:'จำนวนทีมสี',rounds:'จำนวนรอบต่อคู่ทีม',saveNext:'บันทึก / ต่อ',how:'ใช้งานยังไง?',how1:'1. เพิ่มผู้เล่นและ rating',how2:'2. ระบบแบ่งทีมสีให้ใกล้เคียงกัน',how3:'3. กรอกคะแนนแล้วรวมคะแนนทีม',playerName:'ชื่อผู้เล่น',addPlayer:'+ เพิ่มผู้เล่น',autoTeams:'แบ่งทีมอัตโนมัติ',playerList:'รายชื่อผู้เล่น',teamsHelp:'ระบบจัดทีมแบบเฉลี่ย rating ให้ใกล้เคียงกัน',createMatches:'สร้างแมตช์',score:'ใส่คะแนน',scoreControl:'ควบคุมคะแนน',selectMatch:'เลือกแมตช์ทางซ้าย',confirm:'ยืนยันผล',ranking:'อันดับทีม',copy:'คัดลอกสรุป'},en:{new:'NEW',setup:'Setup',players:'Players',teams:'Teams',matches:'Matches',summary:'Summary',setupTitle:'Team Battle Setup',setupHelp:'Color-team club activity with team scoring.',name:'Battle name',venue:'Venue',teamsCount:'Color teams',rounds:'Rounds per team pair',saveNext:'Save / Next',how:'How it works',how1:'1. Add players and ratings',how2:'2. Auto-balance color teams',how3:'3. Enter scores and rank teams',playerName:'Player name',addPlayer:'+ Add Player',autoTeams:'Auto Teams',playerList:'Player List',teamsHelp:'Players are balanced by rating.',createMatches:'Create Matches',score:'Score',scoreControl:'Score Control',selectMatch:'Select a match on the left',confirm:'Confirm Result',ranking:'Team Ranking',copy:'Copy Summary'}},init(){let raw=localStorage.gdsq_team_battle_simple;if(raw){try{Object.assign(this,JSON.parse(raw))}catch(e){}}},t(k){return this.d[this.lang][k]||k},toggle(){this.lang=this.lang==='th'?'en':'th';localStorage.gdsq_tb_lang=this.lang},save(){localStorage.gdsq_team_battle_simple=JSON.stringify({battle:this.battle,players:this.players,teams:this.teams,matches:this.matches})},resetAll(){if(confirm('New Team Battle?')){localStorage.removeItem('gdsq_team_battle_simple');location.reload()}},flash(m){this.msg=m;setTimeout(()=>this.msg='',2500)},addPlayer(){let n=this.form.name.trim();if(!n)return this.flash('Player name?');this.players.push({id:crypto.randomUUID(),name:n,rating:+this.form.rating,team:null});this.form={name:'',rating:3};this.matches=[];this.save()},removePlayer(id){this.players=this.players.filter(p=>p.id!==id);this.matches=[];this.save()},demo(){['Bank','Aom','Top','Mint','Golf','Beer','Ploy','Art','May','Keng','Nun','First','Jane','Win','Mook','Nara'].forEach((n,i)=>{if(!this.players.find(p=>p.name===n))this.players.push({id:crypto.randomUUID(),name:n,rating:2.5+(i%4)*.5,team:null})});this.save()},teamName(id){return this.teams.find(t=>t.id===id)?.name||'-'},baseTeams(){return ['Lime','Navy','Orange','White'].slice(0,this.battle.teamCount).map(x=>({id:x.toLowerCase(),name:'Team '+x}))},balance(){if(this.players.length<4)return this.flash('Need 4+ players');this.teams=this.baseTeams();let sorted=[...this.players].sort((a,b)=>b.rating-a.rating);let order=[...Array(this.teams.length).keys()],seq=[];for(let i=0;i<sorted.length;i+=this.teams.length){let o=[...order];if((i/this.teams.length)%2)o.reverse();seq.push(...o)}sorted.forEach((p,i)=>p.team=this.teams[seq[i]].id);this.players=sorted;this.matches=[];this.save();this.tab=2},teamPlayers(id){return this.players.filter(p=>p.team===id)},avg(id){let ps=this.teamPlayers(id);return ps.length?ps.reduce((s,p)=>s+p.rating,0)/ps.length:0},makeMatches(){if(!this.teams.length)this.balance();if(this.teams.some(t=>this.teamPlayers(t.id).length<1))return this.flash('Not enough players');this.matches=[];let no=1;for(let i=0;i<this.teams.length;i++)for(let j=i+1;j<this.teams.length;j++)for(let r=0;r<this.battle.rounds;r++)this.matches.push({id:crypto.randomUUID(),no:no++,a:this.teams[i].id,b:this.teams[j].id,sa:null,sb:null,w:null,status:'scheduled'});this.save();this.tab=3},select(m){this.active=m;this.scoreA=m.sa??'';this.scoreB=m.sb??''},scoreLine(m){return m.sa!==null?`(${m.sa}-${m.sb})`:''},confirm(){let m=this.active;if(!m||this.scoreA===''||this.scoreB===''||+this.scoreA===+this.scoreB)return this.flash('Invalid score');m.sa=+this.scoreA;m.sb=+this.scoreB;m.w=m.sa>m.sb?m.a:m.b;m.status='completed';this.active=null;this.save()},done(){return this.matches.filter(m=>m.status==='completed')},standings(){let rows=this.teams.map(t=>({id:t.id,name:t.name,w:0,l:0,pf:0,pa:0,diff:0}));this.done().forEach(m=>{let a=rows.find(r=>r.id===m.a),b=rows.find(r=>r.id===m.b);a.pf+=m.sa;a.pa+=m.sb;b.pf+=m.sb;b.pa+=m.sa;if(m.w===m.a){a.w++;b.l++}else{b.w++;a.l++}});rows.forEach(r=>r.diff=r.pf-r.pa);return rows.sort((a,b)=>b.w-a.w||b.diff-a.diff)},winner(){return this.standings()[0]},summaryText(){return`🏆 ${this.battle.name}\n${this.battle.venue||'-'}\nPlayers: ${this.players.length}\nMatches: ${this.done().length}/${this.matches.length}\nChampion Team: ${this.winner()?.name||'-'}\n\nRanking:\n${this.standings().map((s,i)=>`${i+1}. ${s.name} · W${s.w}/L${s.l} · Diff ${s.diff}`).join('\n')}`},copy(){navigator.clipboard.writeText(this.summaryText());this.flash('Copied')}}}
</script>
</body>
</html>
