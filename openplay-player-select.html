<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OpenPlay Event Select</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d1217;--card:#202832;--line:#37424d;--lime:#c7ff2e;--muted:#94a3b8}*{box-sizing:border-box}body{margin:0;min-height:100svh;background:radial-gradient(circle at 0 0,rgba(199,255,46,.18),transparent 30%),linear-gradient(180deg,#0d1217,#111820);color:white;font-family:system-ui,'Noto Sans Thai',sans-serif}.wrap{max-width:560px;margin:0 auto;padding:18px 14px 40px}.card{background:rgba(32,40,50,.96);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 18px 50px rgba(0,0,0,.28)}.logo{width:54px;height:54px;border-radius:18px;background:var(--lime);color:#111;display:grid;place-items:center;font-weight:1000;font-size:22px}.head{display:flex;gap:12px;align-items:center;margin-bottom:16px}.eyebrow{font-size:11px;letter-spacing:.22em;color:var(--lime);font-weight:1000}.title{font-size:24px;font-weight:1000;margin:2px 0}.mini{font-size:12px;color:var(--muted);line-height:1.45}.label{display:block;margin:16px 0 8px;color:var(--muted);font-size:12px;font-weight:900}select,button{width:100%;border:0;border-radius:18px;padding:15px 14px;font-size:16px;font-weight:900}select{background:#10151b;color:white;border:1px solid #3a424a}button{background:var(--lime);color:#111;margin-top:14px}button.secondary{background:rgba(255,255,255,.08);color:white;border:1px solid rgba(255,255,255,.12)}.eventCard{margin-top:12px;border-radius:18px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);padding:13px}.eventCard b{display:block;color:#eaffb7}.msg{margin-top:14px;padding:12px;border-radius:16px;background:rgba(199,255,46,.08);border:1px solid rgba(199,255,46,.28);color:#eaffb7}.err{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#fecaca}.hide{display:none}.foot{text-align:center;color:#d9f99d;font-size:11px;margin-top:14px;opacity:.8}
</style>
</head>
<body>
<main class="wrap">
  <div class="card">
    <div class="head"><div class="logo">OP</div><div><div class="eyebrow">OPENPLAY</div><div class="title">เลือกอีเว้นท์</div><div class="mini">สำหรับผู้เล่นบนมือถือ เลือกอีเว้นท์ก่อนเข้า Player Card</div></div></div>
    <label class="label">Event / อีเว้นท์</label>
    <select id="eventSelect"><option>Loading...</option></select>
    <div id="eventInfo" class="eventCard mini">Loading...</div>
    <button onclick="goPlayer()">เข้า Player ของอีเว้นท์นี้</button>
    <button class="secondary" onclick="clearPlayerAndGo()">เริ่มลงทะเบียนใหม่ในอีเว้นท์นี้</button>
    <div id="msg" class="msg hide"></div>
  </div>
  <div class="foot">GDSQ OpenPlay · Mobile Event Selector</div>
</main>
<script>
const db=supabase.createClient('https://zzeikmrrlfvwnwsprmjy.supabase.co','sb_publishable_xSAZX5dgZ_3Qr3nzoOtqYA_Z0l8yOaX');
const eventSelect=document.getElementById('eventSelect');
const eventInfo=document.getElementById('eventInfo');
let events=[];
function nameOf(e){return e?(e.name_th||e.name_en||'OpenPlay'):'-'}
function esc(v){return String(v??'').replace(/[&<>\"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}
function show(m,bad=false){const box=document.getElementById('msg');box.textContent=m;box.className='msg'+(bad?' err':'');box.classList.remove('hide')}
function render(){
  if(!events.length){eventSelect.innerHTML='<option value="">ไม่พบอีเว้นท์</option>';eventInfo.innerHTML='ยังไม่มีอีเว้นท์ให้เลือก';return}
  const current=localStorage.op_event_id || new URLSearchParams(location.search).get('event') || events[0].id;
  eventSelect.innerHTML=events.map(e=>`<option value="${e.id}">${esc(nameOf(e))} ${e.status?`· ${esc(e.status)}`:''}</option>`).join('');
  if(events.some(e=>e.id===current)) eventSelect.value=current;
  updateInfo();
}
function updateInfo(){
  const e=events.find(x=>x.id===eventSelect.value);
  if(!e){eventInfo.innerHTML='-';return}
  eventInfo.innerHTML=`<b>${esc(nameOf(e))}</b><div>${esc(e.event_time||'-')} · ${esc(e.venue||'-')} · ${e.courts_count||1} courts</div><div>Status: ${esc(e.status||'-')}</div>`;
}
eventSelect.addEventListener('change',updateInfo);
function playerUrl(clear=false){
  const e=events.find(x=>x.id===eventSelect.value);
  if(!e) return null;
  localStorage.op_event_id=e.id;
  const url=new URL('./openplay-player.html',location.href);
  url.searchParams.set('event',e.id);
  url.searchParams.set('v','event-select-01');
  if(!clear){
    const row=localStorage.op_player_row_id;
    if(row) url.searchParams.set('player',row);
  }
  return url.toString();
}
function goPlayer(){const url=playerUrl(false);if(url) location.href=url;else show('ไม่พบอีเว้นท์',true)}
function clearPlayerAndGo(){
  localStorage.removeItem('op_player_row_id');
  const url=playerUrl(true);
  if(url) location.href=url; else show('ไม่พบอีเว้นท์',true);
}
async function load(){
  const r=await db.from('psh_events').select('*').order('created_at',{ascending:false}).limit(30);
  if(r.error){show(r.error.message,true);return}
  events=r.data||[];
  render();
}
load();
</script>
</body>
</html>
