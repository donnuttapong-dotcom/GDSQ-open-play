<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>GDSQ Open Play</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#11161b;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif}.cut{clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}.card{background:#222931;border:1px solid #39434d}.lime{color:#c7ff2e}.btn{border:1px solid rgba(255,255,255,.14);font-weight:900}.mini{font-size:12px;color:#94a3b8}.soft{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.1);border-radius:16px}
</style>
</head>
<body>
<header class="sticky top-0 z-50 bg-[#0d1217]/95 border-b border-white/10 p-4">
  <div class="max-w-4xl mx-auto flex justify-between items-center gap-3">
    <a class="cut bg-[#c7ff2e] text-black px-4 py-2 font-black" href="./">← HOME</a>
    <div class="text-right"><div class="text-[10px] tracking-[.25em] lime">GDSQ PICKLEBALL</div><b>OPEN PLAY</b></div>
  </div>
</header>
<main id="loader" class="max-w-4xl mx-auto p-4">
  <section class="cut card p-6 text-center">
    <div class="text-[11px] tracking-[.25em] lime">OPEN PLAY</div>
    <h1 class="text-4xl font-black mt-3">กำลังโหลด Open Play</h1>
    <p class="text-slate-300 mt-3">ถ้าไม่เปิดอัตโนมัติ ให้กดปุ่มด้านล่าง</p>
    <a class="cut bg-[#c7ff2e] text-black p-4 mt-6 block font-black" href="https://raw.githack.com/donnuttapong-dotcom/GDSQ-open-play/282209e/index.html">ENTER OPEN PLAY</a>
    <a class="cut btn bg-white/5 p-4 mt-3 block" href="./">กลับ HOME</a>
    <div id="err" class="soft p-3 mt-4 mini text-left hidden"></div>
  </section>
</main>
<script>
(async function(){
  const raw='https://raw.githubusercontent.com/donnuttapong-dotcom/GDSQ-open-play/282209e/index.html';
  const fallback='https://raw.githack.com/donnuttapong-dotcom/GDSQ-open-play/282209e/index.html';
  try{
    const r=await fetch(raw,{cache:'no-store'});
    if(!r.ok) throw new Error('raw fetch '+r.status);
    let html=await r.text();
    html=html.replace('<body>','<body><div style="position:sticky;top:0;z-index:9999;background:#0d1217;border-bottom:1px solid rgba(255,255,255,.12);padding:8px 12px;display:flex;justify-content:space-between;align-items:center"><a href=\"./\" style=\"background:#c7ff2e;color:#111;font-weight:900;padding:8px 12px;text-decoration:none;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)\">← HOME</a><b style=\"color:#fff;font-family:system-ui\">OPEN PLAY</b></div>');
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').classList.remove('hidden');
    document.getElementById('err').textContent='โหลดอัตโนมัติไม่สำเร็จ: '+e.message+' — กด ENTER OPEN PLAY เพื่อเปิดด้วย fallback';
    setTimeout(()=>{location.href=fallback},1200);
  }
})();
</script>
</body>
</html>
