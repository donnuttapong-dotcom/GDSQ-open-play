<!doctype html>
<html lang="th" x-data="app()" x-init="init()">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GDSQ Open Play</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{background:#11161b;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif}.cut{clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px)}.card{background:#222931;border:1px solid #39434d}.soft{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.1);border-radius:16px}.lime{color:#c7ff2e}.bg-lime{background:#c7ff2e;color:#111}.btn{border:1px solid rgba(255,255,255,.14);font-weight:900}input,select{background:#10151b!important;color:#fff!important;border-color:#3a424a!important}.mini{font-size:12px;color:#94a3b8}.chip{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px;text-align:center}.dot{width:12px;height:12px;border-radius:999px;display:inline-block}[x-cloak]{display:none!important}</style>
</head>
<body>
<header class="sticky top-0 z-50 bg-[#0d1217]/95 border-b border-white/10 p-3"><div class="max-w-7xl mx-auto flex justify-between items-center gap-2"><div class="flex items-center gap-2"><a class="cut bg-lime px-3 py-2 font-black" href="./">← HOME</a><div><div class="text-[10px] tracking-[.25em] lime">GDSQ PICKLEBALL</div><b>OPEN PLAY</b></div></div><button class="cut bg-orange-400 text-black px-4 py-2 font-black" @click="toggle()" x-text="lang==='th'?'EN':'TH'"></button></div></header>
<main class="max-w-7xl mx-auto p-3">
<nav class="grid grid-cols-4 gap-2 text-xs font-black text-center mb-4"><template x-for="n in tabs" :key="n"><button class="cut btn py-3" :class="tab===n?'bg-lime':'bg-white/5'" @click="tab=n" x-text="tx(n)"></button></template></nav>
<div x-show="msg" class="mb-3 p-3 rounded-xl border border-lime-300/40 bg-lime-300/10 text-lime-200 whitespace-pre-wrap" x-text="msg"></div>
<section x-show="tab==='events'" x-cloak><div class="flex flex-wrap justify-between items-end gap-3 mb-4"><div><h1 class="text-3xl font-black" x-text="tx('events')"></h1><p class="mini">Live events / Past events</p></div><div class="flex gap-2"><button class="cut btn px-3 py-2" :class="filter==='live'?'bg-lime':'bg-white/5'" @click="filter='live'" x-text="tx('live')"></button><button class="cut btn px-3 py-2" :class="filter==='completed'?'bg-lime':'bg-white/5'" @click="filter='completed'" x-text="tx('completed')"></button><button class="cut btn bg-white/5 px-3 py-2" @click="load()">REFRESH</button></div></div><div class="grid md:grid-cols-3 gap-4"><template x-for="e in filteredEvents()" :key="e.id"><div class="cut card p-4" :class="eventId===e.id?'ring-2 ring-lime-300':''"><div class="flex justify-between text-xs"><span class="rounded-full px-2 py-1 font-black" :class="e.status==='completed'?'bg-slate-600':'bg-lime text-black'" x-text="statusLabel(e.status)"></span><span x-text="(e.courts_count||1)+' courts'"></span></div><h2 class="text-xl font-black mt-3" x-text="e.name_th||e.name_en"></h2><p class="text-sm text-slate-300" x-text="(e.event_time||'-')+' · '+(e.venue||'-')"></p><p class="mini" x-text="'Round '+(e.current_round||0)"></p><div class="grid grid-cols-2 gap-2 mt-4"><button class="cut bg-lime p-3 font-black" @click="pick(e.id);tab=e.status==='completed'?'stats':'join'" x-text="e.status==='completed'?tx('history'):tx('joinEvent')"></button><button class="cut btn bg-white/5 p-3" @click="pick(e.id);tab='manage'" x-text="tx('manage')"></button></div></div></template></div></section>
<section x-show="tab==='join'" x-cloak><div class="grid lg:grid-cols-[1fr_.85fr] gap-4"><div class="cut card p-4"><h2 class="text-2xl font-black" x-text="tx('joinTitle')"></h2><p class="lime" x-text="event?event.name_th:'-' "></p><div class="grid sm:grid-cols-2 gap-3 mt-4"><input class="rounded-lg border p-3" x-model="join.nick" :placeholder="tx('nickname')"><select class="rounded-lg border p-3" x-model.number="join.level"><template x-for="l in levels" :key="l"><option :value="l" x-text="l.toFixed(1)"></option></template></select></div><button class="cut bg-lime w-full p-4 mt-4 font-black" @click="savePlayer()" x-text="tx('saveReady')"></button></div><div class="cut card p-4"><h3 class="text-xl font-black" x-text="tx('queue')"></h3><template x-for="(p,i) in readyPlayers()" :key="p.id"><div class="soft p-3 mt-2"><b x-text="(i+1)+'. '+p.nickname"></b><div class="mini" x-text="levelName(p.estimated_level)+' · '+statusName(p.status)+' · '+(p.matches_played||0)+' games'"></div></div></template></div></div></section>
<section x-show="tab==='manage'" x-cloak><div class="space-y-4"><div class="cut card p-4"><div class="flex flex-wrap justify-between gap-2"><div><h2 class="text-2xl font-black" x-text="tx('eventControl')"></h2><p class="mini" x-text="event?(event.name_th||event.name_en):'-'"></p></div><button class="cut btn bg-white/5 px-3 py-2" @click="load()">REFRESH</button></div><select class="w-full rounded-lg border p-3 mt-3" x-model="eventId" @change="pick(eventId)"><template x-for="e in events" :key="e.id"><option :value="e.id" x-text="(e.status==='completed'?'[ENDED] ':'[LIVE] ')+(e.name_th||e.name_en)"></option></template></select><div class="grid sm:grid-cols-[1fr_120px] gap-3 mt-3"><select class="rounded-lg border p-3" x-model="mode"><option value="auto">Auto Match</option><option value="manual">Manual Pick</option></select><input class="rounded-lg border p-3 text-center" type="number" min="1" max="12" x-model.number="courts"></div><div class="grid grid-cols-2 sm:grid-cols-5 gap-2 mt-4 text-xs font-black"><div class="chip">Players<br><b class="text-xl" x-text="players.length"></b></div><div class="chip">Ready<br><b class="text-xl lime" x-text="readyPlayers().length"></b></div><div class="chip">Playing<br><b class="text-xl text-orange-300" x-text="activeMatches().length"></b></div><div class="chip">Done<br><b class="text-xl" x-text="doneMatches().length"></b></div><div class="chip">Mode<br><b class="text-sm" x-text="mode"></b></div></div></div><div class="grid xl:grid-cols-[.95fr_1.05fr] gap-4"><div class="space-y-4"><div class="cut card p-4"><h3 class="font-black text-lime-300">MATCH CONTROL</h3><button x-show="mode==='auto'" class="cut bg-lime p-4 font-black w-full mt-3 disabled:opacity-50" :disabled="busy" @click="createAutoMatch()">GENERATE NEXT MATCH</button><div x-show="mode==='manual'" class="mt-3"><div class="grid sm:grid-cols-2 gap-2"><template x-for="i in [0,1,2,3]" :key="i"><select class="rounded-lg border p-3" x-model="manual[i]"><option value="">- Select player -</option><template x-for="p in manualOptions(i)" :key="p.id"><option :value="p.id" x-text="p.nickname+' · '+levelName(p.estimated_level)"></option></template></select></template></div><button class="cut bg-yellow-300 text-black p-4 font-black w-full mt-3" @click="createManualMatch()">CREATE MANUAL MATCH</button></div></div><div class="cut card p-4"><h3 class="font-black" x-text="tx('createEvent')"></h3><div class="grid sm:grid-cols-2 gap-2 mt-2"><input class="rounded-lg border p-3" x-model="newEvent.name" :placeholder="tx('eventName')"><input class="rounded-lg border p-3" x-model="newEvent.time" :placeholder="tx('eventTime')"><input class="rounded-lg border p-3" x-model="newEvent.venue" :placeholder="tx('venue')"><button class="cut bg-lime p-3 font-black" @click="createEvent()">CREATE</button></div></div><div class="cut card p-4"><h3 class="font-black text-red-300" x-text="tx('eventActions')"></h3><div class="grid grid-cols-2 gap-2 mt-3"><button class="cut bg-cyan-300 text-black p-3 font-black" @click="finishEvent()" x-text="tx('finishEvent')"></button><button class="cut btn bg-white/5 p-3" @click="reopenEvent()" x-text="tx('reopenEvent')"></button><button class="cut bg-red-500 p-3 font-black col-span-2" @click="deleteEvent()" x-text="tx('deleteEvent')"></button></div></div></div><div class="space-y-4"><div class="cut card p-4"><h3 class="text-xl font-black lime">LIVE COURTS</h3><div class="grid md:grid-cols-2 gap-3 mt-3"><template x-for="m in activeMatches()" :key="m.id"><div class="cut card p-4 bg-[#1a2028]"><div class="flex justify-between mb-3"><h3 class="text-xl font-black" x-text="'COURT '+(m.court_number||1)"></h3><span class="lime" x-text="elapsed(m)"></span></div><div class="grid grid-cols-2 gap-3"><div class="rounded-xl border border-orange-400/40 bg-orange-500/10 p-3"><b class="text-orange-300">TEAM A</b><template x-for="p in team(m,'A')" :key="p.id"><div x-text="p.nickname"></div></template></div><div class="rounded-xl border border-lime-300/40 bg-lime-500/10 p-3"><b class="lime">TEAM B</b><template x-for="p in team(m,'B')" :key="p.id"><div x-text="p.nickname"></div></template></div></div><div class="grid grid-cols-2 gap-2 mt-3"><input class="rounded-lg border p-3 text-center text-xl font-black" type="number" x-model.number="scores[m.id].a" placeholder="A"><input class="rounded-lg border p-3 text-center text-xl font-black" type="number" x-model.number="scores[m.id].b" placeholder="B"></div><button class="cut bg-lime p-3 font-black w-full mt-2" @click="confirmScore(m)">CONFIRM</button><button class="cut btn bg-white/5 p-3 w-full mt-2" @click="cancelMatch(m)">CANCEL</button></div></template></div></div><div class="cut card p-4"><h3 class="font-black" x-text="tx('allPlayers')"></h3><div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-2 mt-3"><template x-for="p in players" :key="p.id"><div class="soft p-2"><div class="flex justify-between gap-2"><div><b class="text-sm" x-text="p.nickname"></b><div class="mini" x-text="statusName(p.status)+' · '+(p.matches_played||0)+' games'"></div></div><button class="rounded bg-red-500 px-2 text-xs font-black" @click="removePlayer(p)">X</button></div><div class="grid grid-cols-2 gap-1 mt-2"><button class="rounded bg-lime text-black py-1 text-xs font-black" @click="setStatus(p,'ready')">READY</button><button class="rounded bg-yellow-400 text-black py-1 text-xs font-black" @click="setStatus(p,'waiting')">QUEUE</button><button class="rounded bg-sky-400 text-black py-1 text-xs font-black" @click="setStatus(p,'paused')">PAUSE</button><button class="rounded bg-red-500 py-1 text-xs font-black" @click="setStatus(p,'left')">LEFT</button></div></div></template></div></div></div></div></div></section>
<section x-show="tab==='stats'" x-cloak><div class="grid lg:grid-cols-[.8fr_1.2fr] gap-4"><div class="space-y-4"><div class="cut card p-4 border-lime-300/30"><h2 class="text-xl font-black lime">PAST EVENTS / อีเวนท์ที่ผ่านมา</h2><select class="w-full rounded-lg border p-3 mt-3" x-model="eventId" @change="pick(eventId)"><option value="">- Select event -</option><template x-for="e in completedEvents()" :key="e.id"><option :value="e.id" x-text="(e.name_th||e.name_en)+' · '+(e.event_time||'-')"></option></template></select><button class="cut bg-lime p-3 font-black w-full mt-3" @click="copySummary()">COPY SUMMARY</button></div><div class="cut card p-4"><h2 class="text-xl font-black" x-text="tx('summary')"></h2><pre class="mt-3 rounded-xl bg-black/30 p-3 text-sm whitespace-pre-wrap" x-text="summary()"></pre></div></div><div class="space-y-4"><div class="cut card p-4"><h2 class="text-2xl font-black" x-text="tx('ranking')"></h2><div class="overflow-auto"><table class="mt-3 w-full min-w-[620px] text-sm text-left"><thead class="text-slate-400 text-xs"><tr><th>#</th><th>Player</th><th>Score</th><th>W-L</th><th>Win%</th><th>Diff</th><th>Played</th><th>Skill</th></tr></thead><tbody><template x-for="(p,i) in ranking()" :key="p.id"><tr class="border-t border-white/10"><td class="py-3" x-text="i+1"></td><td class="font-bold" x-text="p.nickname"></td><td class="lime font-black" x-text="eventScore(p)"></td><td x-text="(p.wins||0)+'-'+(p.losses||0)"></td><td x-text="winRate(p)+'%'"></td><td x-text="diff(p)"></td><td x-text="p.matches_played||0"></td><td x-text="levelName(p.estimated_level)"></td></tr></template></tbody></table></div></div><div class="cut card p-4"><h2 class="text-2xl font-black" x-text="tx('matchHistory')"></h2><div class="grid gap-3 mt-3"><template x-for="m in doneMatches()" :key="m.id"><div class="soft p-3"><div class="flex justify-between"><b x-text="'Court '+(m.court_number||'-')+' · R '+(m.round_number||'-')"></b><div class="text-xl font-black lime" x-text="(m.team_a_score??'-')+' - '+(m.team_b_score??'-')"></div></div><div class="grid md:grid-cols-2 gap-2 mt-3"><div class="rounded-lg border border-orange-400/40 p-3"><b class="text-orange-300 text-xs">TEAM A</b><div x-text="teamNames(m,'A')"></div></div><div class="rounded-lg border border-lime-300/40 p-3"><b class="lime text-xs">TEAM B</b><div x-text="teamNames(m,'B')"></div></div></div></div></template></div></div></div></div></section>
</main>
<script>

tgres_changes',{event:'*',schema:'public'},()=>this.load(false)).subscribe()},async load(show=true){try{let ev=await this.chk('load events',this.db.from('psh_events').select('*').order('created_at',{ascending:false}));this.events=ev.data||[];if(!this.eventId&&this.events[0])this.eventId=this.events[0].id;if(this.eventId)await this.pick(this.eventId,false);if(show)this.flash('Loaded')}catch(e){}},filteredEvents(){return this.events.filter(e=>this.filter==='completed'?e.status==='completed':e.status!=='completed')},completedEvents(){return this.events.filter(e=>e.status==='completed')},statusLabel(s){return s==='completed'?(this.lang==='th'?'จบแล้ว':'Completed'):(this.lang==='th'?'กำลังเล่น':'Live')},statusName(s){let m={ready:['พร้อม','Ready'],waiting:['รอคิว','Waiting'],playing:['กำลังเล่น','Playing'],paused:['พัก','Paused'],left:['ออกแล้ว','Left']};return(m[s]||[s,s])[this.lang==='th'?0:1]},levelName(v){return (+v||2.5).toFixed(1)},async pick(id,show=true){this.eventId=id;localStorage.psh_event=id;this.event=this.events.find(e=>e.id===id)||null;if(!this.event){let e=await this.db.from('psh_events').select('*').eq('id',id).single();this.event=e.data}this.courts=this.event?.courts_count||1;let p=await this.chk('load players',this.db.from('psh_event_players').select('*').eq('event_id',id).order('queue_joined_at',{ascending:true}));this.players=p.data||[];let m=await this.chk('load matches',this.db.from('psh_matches').select('*').eq('event_id',id).order('created_at',{ascending:false}));this.matches=m.data||[];let mp=await this.chk('load match players',this.db.from('psh_match_players').select('*').in('match_id',this.matches.map(x=>x.id).length?this.matches.map(x=>x.id):['00000000-0000-0000-0000-000000000000']));this.mps=mp.data||[];this.matches.forEach(x=>{if(!this.scores[x.id])this.scores[x.id]={a:x.team_a_score??'',b:x.team_b_score??''}});if(show)this.flash('Event loaded')},readyPlayers(){return this.players.filter(p=>p.status==='ready'||p.status==='waiting')},activeMatches(){return this.matches.filter(m=>m.status==='playing')},doneMatches(){return this.matches.filter(m=>m.status==='confirmed'||m.status==='completed').sort((a,b)=>new Date(b.ended_at||b.created_at)-new Date(a.ended_at||a.created_at))},team(m,t){return this.mps.filter(x=>x.match_id===m.id&&x.team===t).map(x=>this.players.find(p=>p.id===x.event_player_id)||{}).filter(x=>x.id)},teamNames(m,t){return this.team(m,t).map(p=>p.nickname).join(' + ')||'-'},elapsed(m){let s=m.started_at?Math.max(0,Math.floor((Date.now()-new Date(m.started_at))/1000)):0;return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')},manualOptions(i){let chosen=this.manual.filter((x,idx)=>idx!==i&&x);return this.readyPlayers().filter(p=>!chosen.includes(p.id))},async savePlayer(){if(!this.eventId)return this.flash('Select event first');let nick=(this.join.nick||'').trim();if(!nick)return this.flash('Nickname?');let key=nick.toLowerCase().replace(/\s+/g,'');let pl=await this.chk('save player',this.db.from('psh_players').upsert({nickname:nick,nickname_key:key},{onConflict:'nickname_key'}).select().single());let ex=await this.db.from('psh_event_players').select('*').eq('event_id',this.eventId).eq('player_id',pl.data.id).maybeSingle();if(ex.data){await this.chk('update event player',this.db.from('psh_event_players').update({nickname:nick,self_rating:this.join.level,estimated_level:this.join.level,status:'ready',updated_at:new Date().toISOString()}).eq('id',ex.data.id))}else{await this.chk('join event',this.db.from('psh_event_players').insert({event_id:this.eventId,player_id:pl.data.id,nickname:nick,self_rating:this.join.level,estimated_level:this.join.level,status:'ready'}))}localStorage.last_nick=nick;await this.pick(this.eventId);this.flash('Ready')},async setStatus(p,status){await this.chk('status',this.db.from('psh_event_players').update({status,updated_at:new Date().toISOString()}).eq('id',p.id));await this.pick(this.eventId,false)},async removePlayer(p){if(!confirm('Remove player?'))return;await this.chk('remove player',this.db.from('psh_event_players').delete().eq('id',p.id));await this.pick(this.eventId)},pairScore(a,b){return Math.abs((+a[0].estimated_level + +a[1].estimated_level)-(+b[0].estimated_level + +b[1].estimated_level))},bestTeams(list){let p=list.slice(0,4),best=null;[[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]].forEach(c=>{let A=[p[c[0][0]],p[c[0][1]]],B=[p[c[1][0]],p[c[1][1]]],s=this.pairScore(A,B);if(!best||s<best.s)best={A,B,s}});return best},async createAutoMatch(){let r=this.readyPlayers().sort((a,b)=>(a.matches_played||0)-(b.matches_played||0)||(+a.estimated_level)-(+b.estimated_level));if(r.length<4)return this.flash('Need 4 ready players');let best=this.bestTeams(r);await this.createMatch(best.A,best.B,'fair')},async createManualMatch(){let ids=this.manual.filter(Boolean);if(new Set(ids).size!==4)return this.flash('Select 4 players');let A=[this.players.find(p=>p.id===ids[0]),this.players.find(p=>p.id===ids[1])],B=[this.players.find(p=>p.id===ids[2]),this.players.find(p=>p.id===ids[3])];await this.createMatch(A,B,'special');this.manual=['','','','']},async createMatch(A,B,type){this.busy=true;try{let court=this.freeCourt();let round=(this.event?.current_round||0)+1;let m=await this.chk('create match',this.db.from('psh_matches').insert({event_id:this.eventId,court_number:court,status:'playing',match_type:type,round_number:round,started_at:new Date().toISOString(),matchmaking_mode:this.mode}).select().single());let rows=[...A.map(p=>({match_id:m.data.id,event_player_id:p.id,team:'A',rating_before:p.estimated_level})),...B.map(p=>({match_id:m.data.id,event_player_id:p.id,team:'B',rating_before:p.estimated_level}))];await this.chk('match players',this.db.from('psh_match_players').insert(rows));await this.chk('set playing',this.db.from('psh_event_players').update({status:'playing'}).in('id',rows.map(x=>x.event_player_id)));await this.chk('round',this.db.from('psh_events').update({current_round:round,courts_count:this.courts}).eq('id',this.eventId));await this.pick(this.eventId);this.tab='manage'}finally{this.busy=false}},freeCourt(){let used=this.activeMatches().map(m=>m.court_number);for(let i=1;i<=this.courts;i++)if(!used.includes(i))return i;return 1},async confirmScore(m){let s=this.scores[m.id]||{};if(s.a===''||s.b===''||+s.a===+s.b)return this.flash('Invalid score');let A=this.team(m,'A'),B=this.team(m,'B'),aw=+s.a>+s.b;await this.chk('finish match',this.db.from('psh_matches').update({status:'confirmed',team_a_score:+s.a,team_b_score:+s.b,ended_at:new Date().toISOString(),duration_seconds:Math.max(0,Math.floor((Date.now()-new Date(m.started_at))/1000))}).eq('id',m.id));for(const p of [...A,...B]){let win=(aw&&A.some(x=>x.id===p.id))||(!aw&&B.some(x=>x.id===p.id));await this.db.from('psh_event_players').update({status:'ready',matches_played:(p.matches_played||0)+1,wins:(p.wins||0)+(win?1:0),losses:(p.losses||0)+(win?0:1),points_for:(p.points_for||0)+(A.some(x=>x.id===p.id)?+s.a:+s.b),points_against:(p.points_against||0)+(A.some(x=>x.id===p.id)?+s.b:+s.a),last_played_round:m.round_number}).eq('id',p.id);await this.db.from('psh_match_players').update({result:win?'W':'L',points_for:A.some(x=>x.id===p.id)?+s.a:+s.b,points_against:A.some(x=>x.id===p.id)?+s.b:+s.a}).eq('match_id',m.id).eq('event_player_id',p.id)}await this.pick(this.eventId)},async cancelMatch(m){if(!confirm('Cancel match?'))return;let ps=this.mps.filter(x=>x.match_id===m.id).map(x=>x.event_player_id);await this.db.from('psh_matches').update({status:'cancelled'}).eq('id',m.id);await this.db.from('psh_event_players').update({status:'ready'}).in('id',ps);await this.pick(this.eventId)},eventScore(p){return (p.wins||0)*3+(p.points_for||0)-(p.points_against||0)},diff(p){return (p.points_for||0)-(p.points_against||0)},winRate(p){return p.matches_played?Math.round((p.wins||0)/p.matches_played*100):0},ranking(){return [...this.players].sort((a,b)=>this.eventScore(b)-this.eventScore(a)||this.diff(b)-this.diff(a))},summary(){let e=this.event,top=this.ranking().slice(0,5);return`🏓 ${e?(e.name_th||e.name_en):'-'}\n${e?.venue||'-'} ${e?.event_time||''}\nPlayers: ${this.players.length}\nMatches: ${this.doneMatches().length}\n\nRanking:\n${top.map((p,i)=>`${i+1}. ${p.nickname} · ${p.wins||0}-${p.losses||0} · Diff ${this.diff(p)}`).join('\n')}`},copySummary(){navigator.clipboard.writeText(this.summary());this.flash('Copied')},async createEvent(){let n=(this.newEvent.name||'').trim();if(!n)return this.flash('Event name?');let slug='gdsq-'+Date.now();let r=await this.chk('create event',this.db.from('psh_events').insert({slug,name_th:n,name_en:n,event_time:this.newEvent.time||'',venue:this.newEvent.venue||'',status:'live',courts_count:this.courts||1,event_mode:'social'}).select().single());this.events.unshift(r.data);this.newEvent={name:'',time:'',venue:''};await this.pick(r.data.id);this.tab='manage'},async finishEvent(){if(!this.eventId||!confirm('Finish event?'))return;await this.chk('finish event',this.db.from('psh_events').update({status:'completed',completed_at:new Date().toISOString(),summary_json:{summary:this.summary()}}).eq('id',this.eventId));await this.load();this.tab='stats'},async reopenEvent(){await this.chk('reopen',this.db.from('psh_events').update({status:'live'}).eq('id',this.eventId));await this.load();this.tab='manage'},async deleteEvent(){if(!this.eventId||!confirm('Delete event and all data?'))return;await this.db.from('psh_match_players').delete().in('match_id',this.matches.map(m=>m.id).length?this.matches.map(m=>m.id):['00000000-0000-0000-0000-000000000000']);await this.db.from('psh_matches').delete().eq('event_id',this.eventId);await this.db.from('psh_event_players').delete().eq('event_id',this.eventId);await this.db.from('psh_events').delete().eq('id',this.eventId);this.eventId='';await this.load();this.tab='events'}}}
