<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OpenPlay Check-in · Level 0.25</title>
<style>
html,body{margin:0;width:100%;height:100dvh;min-height:100svh;background:#0d1217;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif;overflow:hidden}iframe{width:100%;height:100%;border:0;background:#0d1217}.badge{position:fixed;right:12px;bottom:12px;z-index:999999;background:#c7ff2e;color:#111;border-radius:999px;padding:7px 10px;font:900 11px system-ui;box-shadow:0 10px 30px rgba(0,0,0,.35)}
</style>
</head>
<body>
<iframe id="checkinFrame"></iframe>
<div class="badge">QR → LEVEL 0.25</div>
<script>
const frame=document.getElementById('checkinFrame');
const q=new URLSearchParams(location.search);q.set('v','level025-checkin-base');frame.src='./openplay-checkin.html?'+q.toString();
function patch(){
  try{
    const w=frame.contentWindow,doc=frame.contentDocument;
    if(!w||!doc)return;
    w.playerUrl=function(){
      const eid=doc.getElementById('eventSelect')?.value||'';
      return w.location.origin+w.location.pathname.replace('openplay-checkin.html','openplay-player-level025.html')+'?event='+eid+'&v=level025-qr';
    };
    if(w.setQr)w.setQr(w.playerUrl());
    const join=doc.getElementById('joinLink');
    const txt=doc.getElementById('joinUrlText');
    if(join)join.href=w.playerUrl();
    if(txt)txt.textContent=w.playerUrl();
    const note=doc.getElementById('note');
    if(note)note.textContent='Live screen · QR links to Player Level 0.25';
    const title=doc.querySelector('.title');
    if(title&&!title.dataset.level025){title.dataset.level025='1';title.textContent='OpenPlay Check-in · Level 0.25';}
  }catch(e){}
}
frame.addEventListener('load',()=>{patch();setInterval(patch,1000)});
setInterval(patch,2500);
</script>
</body>
</html>
