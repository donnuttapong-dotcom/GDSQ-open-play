<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>OpenPlay Check-in · Level 0.25</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d1217;--card:#222931;--line:#39434d;--lime:#c7ff2e;--muted:#94a3b8;--red:#ef4444}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(199,255,46,.16),transparent 34%),linear-gradient(180deg,#0d1217,#10161d);color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif;min-height:100svh}.wrap{max-width:1100px;margin:auto;padding:18px}.card{background:rgba(34,41,49,.95);border:1px solid var(--line);border-radius:28px;box-shadow:0 20px 70px rgba(0,0,0,.3)}header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px}.brand{display:flex;gap:12px;align-items:center}.logo{width:58px;height:58px;border-radius:20px;background:var(--lime);color:#111;display:grid;place-items:center;font-weight:1000;font-size:22px}.eyebrow{font-size:11px;letter-spacing:.24em;color:var(--lime);font-weight:900}.title{font-size:32px;font-weight:1000}.grid{display:grid;gap:16px}.main{grid-template-columns:1fr .85fr}.stats{grid-template-columns:repeat(4,1fr)}select,a{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:white;border-radius:999px;padding:11px 14px;font-weight:1000;text-decoration:none}a{background:var(--lime);color:#111;display:inline-flex;justify-content:center}.hero{padding:24px;min-height:calc(100svh - 126px)}.event{font-size:54px;line-height:1.02;font-weight:1000;margin:8px 0}.meta{font-size:22px;color:#cbd5e1}.pill{display:inline-block;border:1px solid rgba(199,255,46,.4);border-radius:999px;background:rgba(199,255,46,.12);color:#d9f99d;padding:9px 12px;font-size:13px;font-weight:1000}.stat{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.09);border-radius:22px;padding:16px}.stat small{display:block;color:var(--muted);font-size:12px}.stat b{font-size:34px}.step{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:14px;font-weight:900}.num{display:inline-grid;place-items:center;width:32px;height:32px;border-radius:99px;background:var(--lime);color:#111;margin-right:10px}.qr{display:grid;place-items:center;text-align:center}.qrbox{background:white;border-radius:34px;padding:22px;box-shadow:0 16px 46px rgba(0,0,0,.34)}.qr img{width:min(42vw,420px);height:min(42vw,420px);display:block}.qrtitle{font-size:42px;line-height:1.02;font-weight:1000;margin-top:16px}.sub{font-size:21px;color:#cbd5e1;font-weight:800}.urlbox{font-size:11px;color:#cbd5e1;word-break:break-all;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:10px;margin-top:10px}.foot{text-align:center;color:#d9f99d;font-size:12px;opacity:.8;margin-top:10px}.err{padding:12px;border-radius:16px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#fecaca;margin-bottom:12px}.hide{display:none}@media(max-width:900px){.main,.stats{grid-template-columns:1fr}.title{font-size:24px}.event{font-size:34px}.qr img{width:260px;height:260px}.qrtitle{font-size:28px}header{display:block}select{margin-top:12px;width:100%}}
</style></head>
<body><main class="wrap"><div id="err" class="err hide"></div><header><div class="brand"><div class="logo">OP</div><div><div class="eyebrow">GDSQ PICKLEBALL</div><div class="title">OpenPlay Check-in · Level 0.25</div></div></div><select id="eventSelect"></select></header><section class="card hero"><div class="grid main"><div><span class="pill">REGISTRATION OPEN · LEVEL 0.25</span><div class="event" id="eventName">OpenPlay</div><div class="meta" id="eventMeta">-</div><div class="grid stats" style="margin-top:18px"><div class="stat"><small>Players Joined</small><b id="joined">0</b></div><div class="stat"><small>Courts</small><b id="courts">-</b></div><div class="stat"><small>Waiting</small><b id="waiting">0</b></div><div class="stat"><small>Playing</small><b id="playing">0</b></div></div><div class="grid" style="margin-top:18px"><div class="step"><span class="num">1</span>Scan QR</div><div class="step"><span class="num">2</span>Choose event</div><div class="step"><span class="num">3</span>Enter nickname + level 0.25</div><div class="step"><span class="num">4</span>View queue and stats</div></div></div><div class="qr"><div><div class="qrbox"><img id="qrImg" alt="Join QR"></div><div class="qrtitle">SCAN TO JOIN</div><div class="sub">สแกนเพื่อลงชื่อเข้าเล่น</div><div class="grid" style="margin-top:12px"><a id="joinLink" href="#" target="_blank" rel="noopener">Open Join Page</a><div class="urlbox" id="joinUrlText">-</div></div></div></div></div></section><div class="foot">QR links to Player Level 0.25</div></main>
<script>
const db=supabase.createClient('https://zzeikmrrlfvwnwsprmjy.supabase.co','sb_publishable_xSAZX5dgZ_3Qr3nzoOtqYA_Z0l8yOaX');const q=new URLSearchParams(location.search);const fixed=q.get('event');let events=[],event=null,players=[];
function esc(v){return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}function label(e){return e?(e.name_th||e.name_en||e.name||'OpenPlay'):'OpenPlay'}function show(e){err.textContent=e;err.classList.remove('hide')}function playerUrl(){return location.origin+location.pathname.replace('openplay-checkin.html','openplay-player-compact.html')+'?event='+(event?.id||'')+'&v=level025-qr'}function setQr(url){joinLink.href=url;joinUrlText.textContent=url;const primary='https://api.qrserver.com/v1/create-qr-code/?size=420x420&data='+encodeURIComponent(url);const backup='https://quickchart.io/qr?size=420&text='+encodeURIComponent(url);qrImg.onerror=()=>{qrImg.onerror=null;qrImg.src=backup};qrImg.src=primary}
async function load(){const ev=await db.from('psh_events').select('id,name_th,name_en,name,event_time,venue,status,courts_count,created_at').order('created_at',{ascending:false});if(ev.error)return show(ev.error.message);events=(ev.data||[]).filter(e=>e.status!=='completed');event=events.find(e=>e.id===(fixed||localStorage.op_checkin_event))||events[0]||null;if(event)localStorage.op_checkin_event=event.id;eventSelect.innerHTML=events.map(e=>`<option value="${e.id}">${esc(label(e))}</option>`).join('');if(event)eventSelect.value=event.id;await loadData()}eventSelect.onchange=async()=>{event=events.find(e=>e.id===eventSelect.value);localStorage.op_checkin_event=event.id;await loadData()};async function loadData(){if(!event)return render();const p=await db.from('psh_event_players').select('*').eq('event_id',event.id).order('queue_joined_at',{ascending:true});if(p.error)return show(p.error.message);players=p.data||[];render()}function render(){if(!event){eventName.textContent='OpenPlay';eventMeta.textContent='-';setQr(playerUrl());return}eventName.textContent=label(event);eventMeta.textContent=(event.venue||'-')+' · '+(event.event_time||'-')+' · '+(event.courts_count||1)+' courts';courts.textContent=event.courts_count||1;joined.textContent=players.length;waiting.textContent=players.filter(p=>['waiting','ready'].includes(p.status||'waiting')).length;playing.textContent=players.filter(p=>p.status==='playing').length;setQr(playerUrl())}
load();setInterval(loadData,7000);
</script></body></html>
