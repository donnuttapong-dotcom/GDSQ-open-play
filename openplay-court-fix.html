<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GDSQ Open Play · Court Fix</title>
  <style>
    html,body{margin:0;width:100%;height:100dvh;min-height:100svh;background:#0d1217;color:#fff;font-family:system-ui,'Noto Sans Thai',sans-serif;overflow:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior:none}
    iframe{width:100%;height:100dvh;min-height:100svh;border:0;display:block;background:#11161b}
    .badge{position:fixed;right:max(12px,env(safe-area-inset-right));bottom:max(12px,env(safe-area-inset-bottom));z-index:999999;background:#c7ff2e;color:#111;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900;box-shadow:0 6px 20px rgba(0,0,0,.35);opacity:.92}
    @media (min-width:768px) and (max-width:1180px){.badge{font-size:11px;padding:7px 10px}}
  </style>
</head>
<body>
  <iframe id="appFrame" src="./openplay.html?v=end-event-archive-051a97b-court-fix-clock-ipad"></iframe>
  <div class="badge" id="badge">COURT FIX LOADING</div>

  <script>
    const frame = document.getElementById('appFrame');
    const badge = document.getElementById('badge');
    const COURT_MIN = 1;
    const COURT_MAX = 10;

    function clampCourt(value){
      const n = Math.floor(Number(value) || 1);
      return Math.max(COURT_MIN, Math.min(COURT_MAX, n));
    }

    function getApp(){
      try{
        const win = frame.contentWindow;
        const doc = frame.contentDocument;
        if(!win || !doc || !win.Alpine) return null;
        const root = doc.querySelector('html[x-data]');
        if(!root || !win.Alpine.$data) return null;
        return win.Alpine.$data(root);
      }catch(e){
        return null;
      }
    }

    function elapsedClock(start, now){
      const startMs = new Date(start || 0).getTime();
      if(!Number.isFinite(startMs) || startMs <= 0) return '-';
      const totalSeconds = Math.max(0, Math.floor((now - startMs) / 1000));
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      if(m < 60) return m + ':' + String(s).padStart(2,'0');
      const h = Math.floor(m / 60);
      const mm = m % 60;
      return h + ':' + String(mm).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }

    function applyIpadStyle(doc){
      if(!doc || doc.getElementById('gdsq-ipad-style')) return;
      const style = doc.createElement('style');
      style.id = 'gdsq-ipad-style';
      style.textContent = `
        html,body{min-height:100dvh!important;-webkit-text-size-adjust:100%!important;text-size-adjust:100%!important;overscroll-behavior:none!important;}
        button,input,select,textarea{font-size:16px!important;}
        input,select,textarea{touch-action:manipulation!important;}
        main{width:100%!important;}
        @media (min-width:768px) and (max-width:1180px){
          body{overflow-x:hidden!important;}
          header{padding-left:max(12px,env(safe-area-inset-left))!important;padding-right:max(12px,env(safe-area-inset-right))!important;}
          main{padding-left:max(12px,env(safe-area-inset-left))!important;padding-right:max(12px,env(safe-area-inset-right))!important;max-width:100%!important;}
          .card,.soft,.chip{box-sizing:border-box!important;}
          nav button{min-height:52px!important;}
        }
      `;
      doc.head.appendChild(style);
    }

    function applyCourtFix(){
      const app = getApp();
      const doc = frame.contentDocument;
      if(!app || !doc) return false;
      applyIpadStyle(doc);

      const keyFor = () => app.eventId ? 'psh_courts_' + app.eventId : 'psh_courts_global';

      if(!app.__courtFixPatched){
        const originalPick = app.pick ? app.pick.bind(app) : null;
        const originalLoadCurrent = app.loadCurrent ? app.loadCurrent.bind(app) : null;

        app.clampCourtCount = clampCourt;
        app.__courtClock = Date.now();

        app.elapsed = function(m){
          return elapsedClock(m?.started_at || m?.created_at, this.__courtClock || Date.now());
        };

        app.courtNums = function(){
          const count = clampCourt(this.courts || this.event?.courts_count || 1);
          this.courts = count;
          return Array.from({length:count}, (_,i)=>i+1);
        };

        app.freeCourts = function(){
          return this.courtNums().filter(c=>!this.courtMatch(c) && !this.previews.some(p=>p.court===c));
        };

        app.maxPreviewCount = function(){
          if(this.isEventCompleted && this.isEventCompleted()) return 0;
          const courtLimit = clampCourt(this.courts || this.event?.courts_count || 1);
          const playerLimit = Math.floor((this.readyPlayers ? this.readyPlayers().length : 0) / 4);
          const freeLimit = this.freeCourts ? this.freeCourts().length : courtLimit;
          return Math.max(0, Math.min(courtLimit, playerLimit, freeLimit));
        };

        app.saveCourtSettings = async function(){
          if(!this.eventId || (this.isEventCompleted && this.isEventCompleted())) return;
          const n = clampCourt(this.courts);
          this.courts = n;
          if(this.event) this.event.courts_count = n;
          localStorage.setItem(keyFor(), String(n));
          this.previews = (this.previews || []).filter(p => Number(p.court) <= n);
          this.__courtFixSaving = true;
          try{
            await this.chk('courts', this.db.from('psh_events').update({courts_count:n}).eq('id', this.eventId));
            if(this.event) this.event.courts_count = n;
            this.flash('Courts saved: '+n+' / บันทึกจำนวนคอร์ทแล้ว');
          }catch(e){
            this.flash('Courts save failed: '+(e.message || e));
          }finally{
            setTimeout(()=>{ this.__courtFixSaving = false; }, 1200);
          }
        };

        if(originalPick){
          app.pick = async function(id, show=true){
            const savedBefore = localStorage.getItem('psh_courts_' + id);
            await originalPick(id, show);
            const savedAfter = localStorage.getItem('psh_courts_' + id) || savedBefore;
            const n = clampCourt(savedAfter || this.event?.courts_count || this.courts || 1);
            this.courts = n;
            if(this.event) this.event.courts_count = n;
          };
        }

        if(originalLoadCurrent){
          app.loadCurrent = async function(show=true){
            const keep = this.eventId ? localStorage.getItem('psh_courts_' + this.eventId) : null;
            await originalLoadCurrent(show);
            if(keep){
              const n = clampCourt(keep);
              this.courts = n;
              if(this.event) this.event.courts_count = n;
            }
          };
        }

        app.__courtFixPatched = true;
      }

      if(!app.__courtClockInterval){
        app.__courtClockInterval = setInterval(() => {
          app.__courtClock = Date.now();
        }, 1000);
      }

      const input = [...doc.querySelectorAll('input[type="number"]')].find(el => {
        const m = el.getAttribute('x-model.number') || el.getAttribute('x-model') || '';
        return m === 'courts';
      });

      if(input && !input.__courtFixInput){
        input.setAttribute('min','1');
        input.setAttribute('max','10');
        input.setAttribute('step','1');
        input.addEventListener('input', () => {
          const n = clampCourt(input.value);
          app.courts = n;
          if(app.event) app.event.courts_count = n;
          localStorage.setItem(keyFor(), String(n));
        });
        input.addEventListener('blur', () => app.saveCourtSettings && app.saveCourtSettings());
        input.addEventListener('change', () => app.saveCourtSettings && app.saveCourtSettings());
        input.__courtFixInput = true;
      }

      badge.textContent = 'IPAD + COURT + CLOCK ACTIVE';
      return true;
    }

    function startPatchLoop(){
      let tries = 0;
      const timer = setInterval(() => {
        tries++;
        const ok = applyCourtFix();
        if(ok && tries > 4) clearInterval(timer);
        if(tries > 40 && !ok) badge.textContent = 'COURT FIX WAITING';
      }, 500);
    }

    frame.addEventListener('load', startPatchLoop);
    startPatchLoop();
  </script>
</body>
</html>
